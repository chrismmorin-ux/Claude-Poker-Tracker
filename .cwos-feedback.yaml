# CWOS Feedback & Friction Log
# Dual feedback: user-driven (deliberate) + automatic (friction detection)
# Read by /fleet feedback for cross-repo aggregation

schema_version: "1"
repo_name: Claude-Poker-Tracker
platform: win32
adoption_level: L1
repo_archetype: frontend

# Section A: User-driven feedback
# Captured via /feedback command or when Claude detects user expressing concerns
user_feedback:
  - id: fb-001
    timestamp: "2026-05-20T00:00:00Z"
    session_id: "session-2026-05-20-next"
    category: concern
    summary: "Verify ticket premise against current code DURING /next composition, before approval — not mid-execution"
    detail: >
      SPR-095's two anchors were authored by a Gate-2 blind-spot audit and both
      had premises that didn't match the code: WS-206 assumed LSW line nodes
      store an asserted-equity number to validate against (none exists — equity
      is prose-only), forcing a mid-sprint reframe + an extra founder decision;
      WS-205 risked duplicating existing equity infra (computeComboEquityDistribution).
      The approval option also said "~68 nodes" when only 5 were parity-eligible.
      This is the SAME pattern flagged one sprint earlier (SPR-094: WS-204 was a
      duplicate of pre-existing work) — now a confirmed RECURRING failure mode of
      audit-authored tickets. Fix: /next composition should spend ~2 min checking
      each anchor's core assumption (does the data structure exist? is the work
      already done? what's the real scope/count?) against the codebase BEFORE
      presenting for approval, so reframes/scope-corrections happen upfront in one
      accurate proposal instead of as mid-flight interruptions.
    resolved: false
    resolution: null
  - id: fb-002
    timestamp: "2026-05-20T00:00:00Z"
    session_id: "session-2026-05-20-next"
    category: concern
    summary: "/next resume-check only looks for status:active — misses approved-but-unexecuted sprints"
    detail: >
      SPR-095 was status:approved with items_done:0 (a prior session composed +
      got it approved, then stopped before executing). /next Step 1 only scans for
      status:active, so a freshly-approved-but-unstarted sprint is invisible to the
      resume path and a new /next would stack a second sprint on top, orphaning the
      approved work. Caught only by luck (reading a sprint file for schema reference).
      Fix: Step 1 resume-check should also surface sprints where status==approved AND
      completed_at==null (especially items_done<item_count) and offer to resume them.
    resolved: false
    resolution: null
  - id: fb-003
    timestamp: "2026-05-20T00:00:00Z"
    session_id: "session-2026-05-20-next"
    category: concern
    summary: "queue-index drift + soft-block flag absent from index make /next ranking unreliable"
    detail: >
      queue-index.yaml disagreed with the WS-*.yaml files: WS-205/206 showed
      status:backlog in the index but were claimed in their files; WS-185 showed
      backlog but was done. Separately, the index summary does NOT carry
      blocked_by_note, so soft-blocked items (the P=22 monetization cluster, WS-191,
      WS-047, WS-092) surfaced at full priority in the first-pass ranking until each
      WS file was opened. Both stem from the absent cwos-reconcile.js (no automated
      index rebuild) — see fr-002/fr-011. Fix: install the reconcile suite, OR
      mirror blocked_by_note into the index, OR have /next read candidate WS files
      before ranking (slower but correct).
    resolved: false
    resolution: null
