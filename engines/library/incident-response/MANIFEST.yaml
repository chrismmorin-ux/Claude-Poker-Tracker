# Engine Extension Pack Manifest
engine_id: incident-response
name: Incident Response
description: Production issue diagnosis, auto-recovery, escalation paths, and post-incident learning
archetypes: [saas, api-service]
install_conditions: deployed/production service detected
programs: [infrastructure]
personas_required: [operations-engineer]
files:
  - SKILL.md

# --- Registry fields (used by /adopt to generate engine entries) ---
skill_path: .claude/commands/incident-response.md
category: analysis
impact: changes-state
procedure: null  # custom 3-layer recovery tree
extends: context-gather
trigger: manual
inputs: [codebase, system_model, incident_description]
outputs: [finding, fix, state-update]
chains:
  on_complete: null
  on_finding: create_work_item
finding_severities:
  critical: 90
  high: 72
  medium: 54
  low: 36
  info: 18
