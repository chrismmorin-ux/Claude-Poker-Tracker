      queue_index_valid: true          # index count matches file count (120)
      programs_scope_valid: true       # 7 programs registered with scope
      programs_introduced: true        # 5-workstream master plan ratified 2026-04-30
    suggestions:
      - "I've been finding things that could use attention — TODOs, potential bugs, improvements. But without a queue, those observations disappear between sessions. Setting up a work queue means when you ask 'what's next?', I can give you the highest-impact answer. This also enables **programs** — permanent monitors that watch key areas of your project (security, code quality, your domain logic) so nothing drifts silently. Want me to create a starter queue from what I see?"
      - "Your programs are installed but could be calibrated more precisely. I can run a quick analysis to customize each one to your specific project — verify file scopes, tailor the domain correctness program to your actual business logic, and run initial baseline checks. One-time setup, about 5 minutes. Want me to do it?"

  m4_first_engine_run:
    description: "First deep engine run complete — findings pipeline active, registry validated."
    done_looks_like: "runs/ has at least 1 RUN entry; findings/ has at least 1 FIND entry; every registered engine's skill_path points to a real file."
    status: complete
    completed_at: "2026-05-01T15:42:57Z"
    checks:
      engine_run_completed: true       # eng-engine ran for domain-correctness baseline
      findings_exist: true             # 21 FIND-*.yaml entries
      engine_registry_valid: true      # standard engines (eng-engine, health-check, preflight, persona-validator, briefings) all resolve
    suggestions:
      - "Your system is set up and your queue is active. The next step is a deep analysis — multiple expert perspectives examine your codebase for real issues you might not see. This is where CWOS shifts from organizing your work to actively finding problems before they find you. It takes about 5 minutes and doesn't change any code. Want to try it?"
      - "I found some engine entries pointing to missing files — this means certain analyses would fail silently. Let me clean those up so everything works when you need it."

  m5_steady_state:
    description: "Steady state — every active program has been audited and session handoffs are routine."
    done_looks_like: "Every active program has last_run.date set; at least 1 session file has non-empty handoff_notes."
    status: pending
    completed_at: null
    checks:
      all_programs_audited: false      # every active program has last_run.date != null
      session_handoff_written: false   # at least 1 session with handoff notes
    suggestions:
      - "You're nearly at steady state — the point where CWOS fades into the background and just works. A few programs haven't had their first audit yet, which means there are parts of your codebase I haven't examined deeply. One quick run fills those gaps. Want me to do it?"
      - "The last piece is a session handoff — notes that help you (or me) pick up exactly where you left off next time. It's a small thing that prevents the 'wait, what was I doing?' problem. Want to wrap up this session with handoff notes?"

# Archetype-specific requirements
# /adopt adjusts these based on repo_archetype
# Defaults per archetype:
#   saas                  → min_programs: 3, min_invariants: 3, required_engines: [eng-engine, health-check, financial-audit]
#   frontend              → min_programs: 2, min_invariants: 2, required_engines: [eng-engine, health-check, ux-audit]
#   data-platform         → min_programs: 2, min_invariants: 2, required_engines: [eng-engine, health-check]
#   dev-tool              → min_programs: 1, min_invariants: 1, required_engines: [eng-engine, health-check]
#   research              → min_programs: 1, min_invariants: 1, required_engines: [eng-engine]
#   research-clinical     → min_programs: 3, min_invariants: 4, required_engines: [eng-engine, health-check] — claims-policy mandatory; stricter invariant floor due to evidence requirements
#   research-mathematical → min_programs: 2, min_invariants: 3, required_engines: [eng-engine] — anti-hallucination elevated
#   research-empirical    → min_programs: 2, min_invariants: 2, required_engines: [eng-engine, health-check] — data-provenance mandatory
#   api-service           → min_programs: 2, min_invariants: 2, required_engines: [eng-engine, health-check]
archetype_requirements:
  min_programs: 1
  min_invariants: 1
  required_engines: []     # populated by /adopt based on repo_archetype

