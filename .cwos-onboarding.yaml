has_ai_evaluator: false

# Capability state (ADR-016)
# User-owned dimension that governs /next scoring and /discover surfaces.
# Five capabilities mirror kit/MANIFEST.yaml install groups.
# State enum: enabled | intended | declined | unconfigured
#   - enabled:      user accepted, setup complete   → items score normally
#   - intended:     user said yes, setup pending    → setup items boosted, staleness raises priority
#   - declined:     user said no                    → items suppressed entirely
#   - unconfigured: user not yet asked              → default scoring until /discover runs
# /adopt seeds all five as unconfigured, then flips `core` to enabled before exit.
# /discover writes captured_at and note when state moves out of unconfigured.
capabilities:
  core:
    state: enabled
    captured_at: "2026-05-01T03:46:43.573Z"
    note: null
  workstream:
    state: enabled
    captured_at: "2026-05-01T04:03:02.920Z"
    note: "Owner intends CWOS as primary architecture; scaffolding installed"
  engines:
    state: enabled
    captured_at: "2026-05-01T04:03:02.920Z"
    note: "engines/standard + base + procedures + personas + rules installed from HomeBase kit-v3.5.0"
  governance:
    state: enabled
    captured_at: "2026-05-01T04:03:02.920Z"
    note: "/pulse + /audit installed; 7 programs registered (engineering, anti-hallucination, change-management, design, domain-correctness=Poker Theory Integrity, methodology-integrity, launch); domain-correctness customized for poker per POKER_THEORY.md"
  autonomous:
    state: enabled
    captured_at: "2026-05-01T04:03:02.920Z"
    note: "/plan + /verify + /decide installed from kit; system/decisions.md already populated with 361 lines of real ADRs"

# Deferred Installation Manifest
# Commands are grouped and installed on first use. The preamble's Progressive
# Onboarding section triggers installation when the user needs a capability.
# Each group installs its commands + any dependencies (personas, scaffolding).
deferred_commands:
  core:
    level: L1
    commands: [status, session-start, session-end, welcome]
    dependencies: []
    installed: true
  workstream:
    level: L2
    commands: [next, workstream]
    dependencies:
      - directory: .claude/workstream
        scaffolding: [config.yaml, queue-index.yaml, findings-index.yaml, engines/registry.yaml, programs/registry.yaml]
        subdirs: [queue, queue/archive, findings, findings/archive, engines, programs, enhancements, readiness]
      - files_from: kit/templates/system
        targets: [invariants.md, constraints.md, decisions.md, failures.md, context.md, scoring.md]
    installed: true
  engines:
    level: L3
    commands: [engine, build-engine]
    dependencies:
      # Personas (core + domain) are now tracked in kit/MANIFEST.yaml
      # and installed automatically as part of the engines group.
      - engines_from: engines/standard
      - rules_from: kit/templates/rules
    installed: true
  governance:
    level: L4
    commands: [pulse, audit]
    dependencies: []
    installed: true
  autonomous:
    level: L5
    commands: [plan, verify, decide]
    dependencies: []
    installed: true

# Deferred Tool Installation
# Tools from docs/TOOL-CATALOG.md, assessed during /adopt Step 3b.
# Each tool has a detection trigger; /adopt populates this section based on
# which triggers matched. Tools are installed at their declared milestone.
# "repo_has_better" means the repo already built this tool more sophisticatedly
# than the CWOS template — CWOS learns from the repo instead of installing.
