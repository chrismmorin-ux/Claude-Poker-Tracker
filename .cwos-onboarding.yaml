  m2_system_population:
    description: "System populated — vital signs wired to real commands, invariants and constraints captured, business context recorded."
    done_looks_like: "state.md vital signs run real commands; invariants.md, constraints.md, and context.md have real rows (no template placeholders)."
    status: complete
    completed_at: "2026-05-01T03:48:48.050Z"
    checks:
      vital_signs_configured: false    # state.md has real commands, no placeholders
      vital_signs_passing: false       # at least 1 check ran successfully
      invariants_populated: false      # at least 1 real invariant (not template placeholder)
      constraints_populated: false     # at least 1 real constraint
      context_has_active_item: false   # at least 1 active business context item
      config_customized: false         # .cwos-config.yaml reviewed and adjusted by user
    # Suggestions follow understanding-first pattern:
    # [what you have] + [what the gap is] + [what this enables] + [ask]
    suggestions:
      - "Your project has tests and a build process, but right now there's no way to know when they break between sessions. Health monitoring watches for that automatically — takes about 2 minutes to set up. Want me to do it?"
      - "Your codebase has patterns and rules that should always hold — like 'never commit API keys' or 'all routes need auth.' Right now those rules live in your head. Writing them down means I can check them for you automatically. Want me to find the obvious ones?"
      - "I can be more helpful when I know what you're working toward — deadlines, customer issues, goals. Right now I'm guessing at priority. A quick context update changes that. What's top of mind for you?"
      - "Your .cwos-config.yaml controls how much structure I apply — sprint sizes, engine output detail, session ceremony. The defaults are sensible, but a quick review lets you tune CWOS to how you actually work. Want to walk through it?"

  m3_workstream_active:
    description: "Workstream active — queue holds real items, programs scoped to real file paths, user has seen programs introduced."
    done_looks_like: "queue-index.yaml has at least 3 items; at least one program's scope.file_patterns matches real files in the repo."
    status: complete
    completed_at: "2026-05-01T15:42:57Z"
    checks:
