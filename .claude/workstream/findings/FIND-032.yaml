description: |
  Two live-low-stakes exploit tells are missing:
  (a) Sizing-tell calibration is STUBBED — villainProfileBuilder.js:446-451 hard-codes
      sizingTells.detected = false ("reserved for future showdown calibration"). No
      module regresses shown-hand strength on bet_size_pct, despite §3.5/§5.9 calling
      it the most exploitable tell. The data IS captured (showdowns store
      {bet_size_pct, hand_shown}) — this is a wiring gap, not a data gap.
  (b) Timing tells are absent AND the raw data isn't recorded — no time-to-act /
      tookMs field on action records in gameConstants.js. Requires a data-model change
      before any engine work (the Ignition extension could capture it precisely).
  Returns "no tell" rather than wrong output, so low severity (incomplete, not wrong).
affected_files:
