  - "src/constants/gameConstants.js"
recommended_fix: |
  (a) Per villain, regress shown-hand strength on bet_size_pct per street; emit
  sizingTells:{correlation:+/0/-, confidence}; feed into bluff-catch thresholds. N-gated.
  (b) Add optional tookMs to action records (auto in extension, best-effort manual);
  build a timing-tell trait. Defer (b) until (a) proves the showdown-calibration pattern.
