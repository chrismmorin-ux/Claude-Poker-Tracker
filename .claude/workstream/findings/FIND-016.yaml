  date: "2026-05-01"
description: |
  rangeEngine/bayesianUpdater.js:116-124: effective frequency is computed once per (position, action) then applied uniformly: `ranges[action][i] = Math.min(1.0, prior[i] * ratio)`. When observed freq >> prior freq, all in-prior cells saturate to 1.0 and lose relative ordering. No per-cell credible interval to defend against this.
affected_files:
  - "src/utils/rangeEngine/bayesianUpdater.js"
recommended_fix: |
  Track per-cell observation counts (or maintain Beta(α,β) per cell when showdowns exist) so showdown anchors don't get washed out by frequency rescaling.
