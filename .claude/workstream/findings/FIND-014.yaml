description: |
  gameTreeContext.js:235-241: `styleFallback[b] = BUCKET_EQUITY_ANCHORS[b] * (1 + (popFold - styleFold) * 0.3)` — bucket EQUITY anchors (a property of cards on a board) are scaled by villain's style fold tendency. Equity is a function of cards; folding tendency belongs in fold-rate computation.
affected_files:
