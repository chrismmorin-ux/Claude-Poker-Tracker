description: |
  replayAnalysis.js:24-30 returns `handEquity > 0.5 ? 'value' : 'bluff'` over equities computed by `handVsRange(..., { trials: 500 })`. 500 trials at p≈0.5 gives ~±4.4% margin of error at 95% — easily flips the verdict for borderline equities. The classifier is presented to the user as authoritative.
affected_files:
  - "src/utils/handAnalysis/replayAnalysis.js"
recommended_fix: |
  Either raise trial count to ≥3000 or return a banded classification (`'value' | 'thin' | 'bluff'`) centered on 0.5 ± MoE; plumb the MoE into the classifier so confidence reflects sample size.
