description: |
  gameTreeEquity.js:574-575 (`multiwayFoldPct`): when no villainModel exists, fold rate is read directly from `STYLE_FOLD_DEFAULTS[opp.playerStats.style]` with no consideration of bet size, pot odds, board texture, or villain equity vs hero's bet. Style label drives the rate alone.
