description: |
  foldEquityCalculator.js calcBluffEV (57-73) accepts rakeAmount = 0 but never uses
  it. The semi-bluff branch computes heroEquity * totalPotIfCalled - betSize with no
  rake deduction, even though §11.3 and calcFoldEquity (line 33) net rake out of the
  showdown pot. A called semi-bluff goes to showdown and pays rake, so its EV is
  overstated in raked games. (Pure-bluff branch is correct — no showdown when villain
  folds.) Clear, localized, small fix.
affected_files:
  - "src/utils/exploitEngine/foldEquityCalculator.js"
recommended_fix: |
  In the heroEquity > 0 branch, subtract rake from the won-pot term:
  heroEquity * (totalPotIfCalled - rakeAmount) - betSize.
