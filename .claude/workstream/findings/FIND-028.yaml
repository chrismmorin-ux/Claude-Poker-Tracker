id: "FIND-028"
title: "calcBluffEV semi-bluff branch omits rake while value/optimal paths include it"
severity: MEDIUM
status: resolved
resolved_at: "2026-06-20T00:00:00Z"
resolved_by: "WS-246"
resolution: |
  calcBluffEV semi-bluff branch now nets rake: heroEquity*(totalPotIfCalled - rakeAmount)
  - betSize. Math is correct; note it is currently LATENT (no caller passes rakeAmount yet
  — decisionTreeBuilder omits it), so no behavior change today but correct when rake is
  threaded. exploitEngine suite green.
category: "game-tree"
