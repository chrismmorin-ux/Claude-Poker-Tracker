description: |
  Two low-priority verification items from the blind-spot run:
  (a) The Bayesian confidence MATH is solid (bayesianConfidence.js, PRIOR_WEIGHT=10,
      consequence-weighted tiers in exploitValidator.js), but verify it reaches the
      live-advice UI as an explicit "N=4, low confidence" signal rather than a bare
