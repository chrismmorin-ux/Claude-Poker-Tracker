      live advisor uses hand-vs-range (correct, hero knows their cards). The missing
      piece is using board-favors-which-range (range/nut advantage, §3.2) to set bet
      sizing live. Verify heroActionBuilder's advantage object comes from a real
      range-vs-range computation, not a heuristic.
