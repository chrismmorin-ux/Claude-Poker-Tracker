description: |
  replayAnalysis.js:36-82 (`assessEV`) uses hard thresholds (`valuePct > 50`, `valuePct < 25 && drawPct < 20`) to produce verdict labels. No `dataQuality` or sample-size check before the verdict is returned; small-sample range estimates produce confident-looking labels.
affected_files:
  - "src/utils/handAnalysis/replayAnalysis.js"
recommended_fix: |
  Gate the verdict on the underlying range profile's `handsProcessed` (or `confidence`); below threshold, return `verdict: 'unknown'` with reason 'insufficient data'.
