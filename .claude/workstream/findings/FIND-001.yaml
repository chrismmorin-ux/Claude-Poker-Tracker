description: |
  tendencyCalculations.js:343-358 builds `intervals = { vpip, pfr, threeBet, cbet, foldToCbet, foldTo3Bet }` via credibleInterval(...) and returns them on the stat object. A repository-wide grep for `credibleInterval`, `ciLower`, `ciUpper`, or `intervals.vpip` against `src/components/` returns zero matches. Sample-size uncertainty is computed but the user only sees point estimates.
affected_files:
  - "src/utils/tendencyCalculations.js"
  - "src/components/views/PlayerAnalysisPanel.jsx"
  - "src/components/views/OnlineView.jsx"
  - "src/components/views/HandReplay/**"
recommended_fix: |
  Wire `stats.intervals.{stat}.lower/upper` through the props chain into PlayerAnalysisPanel, OnlineView seat annotations, and HandReplay ReviewPanel so the user sees the credible band, not just the mean.
