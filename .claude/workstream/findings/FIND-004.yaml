description: |
  preflopAdvisor.js:147-154 applies a style-conditioned multiplier (priorMean *= styleFoldRate / popFoldRate) gated on `dataSourceWhenNoObserved !== 'model'`. preflopAdvisor.js:158-162 then unconditionally applies `pfrRatio > 0.5 ? *= 0.90 : pfrRatio < 0.3 ? *= 1.08`. Both adjustments encode the same passive-vs-aggressive opener signal — the very stats that classify the style. This is double-counting forbidden by POKER_THEORY.md §7.4.
affected_files:
  - "src/utils/exploitEngine/preflopAdvisor.js"
recommended_fix: |
  Gate the PFR-ratio block under the same `dataSourceWhenNoObserved !== 'model'` guard AND skip when the style adjustment was already applied. Use one or the other as the fold-prior modifier, never both in the same fallback path.
