id: "FIND-027"
title: "comboBetFilter and computeVillainBetProb disagree ~2x on early-street bluff frequency"
severity: MEDIUM
status: resolved
resolved_at: "2026-06-20T00:00:00Z"
resolved_by: "WS-248"
resolution: |
  Unified on a single exported villainBluffFreq(equity, street) in gameTreeEquity.js used
  by both comboBetFilter and computeVillainBetProb (no more duplicate inline formula).
  Threaded street into comboBetFilter/comboCheckBackFilter + the 3 gameTreeEvaluator call
  sites. Tests added; full exploitEngine + rangeEngine suites green (2648 tests).
category: "game-tree"
