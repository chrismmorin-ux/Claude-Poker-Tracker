  date: "2026-06-20"
description: |
  Two functions model "villain bets when checked to" and disagree. comboBetFilter
  (gameTreeEquity.js:360-365) gives air a flat bluffFreq = villainEquity < 0.20 ? 0.08
  with NO street guard. The parallel, more-used computeVillainBetProb
  (gameTreeDepth2.js:354-385) gives flop/turn air up to ~0.15 and river air 0.08.
  So early-street bluff content differs ~2x depending on which path an evaluation
  takes — changing the hero check-EV and the bluff-catch recommendation for the same
  spot (§3.5 / value-vs-bluff content drives the decision).
affected_files:
  - "src/utils/exploitEngine/gameTreeEquity.js"
  - "src/utils/exploitEngine/gameTreeDepth2.js"
recommended_fix: |
  Unify on a single estimator: have comboBetFilter delegate to computeVillainBetProb
  (passing street), or document why the approximation deliberately diverges.
