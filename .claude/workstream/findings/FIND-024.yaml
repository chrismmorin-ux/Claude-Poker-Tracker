description: |
  The highest-stakes surface (live in-hand HUD) has the weakest attribution. The Ignition side
  panel computes villain VPIP/PFR via a PARALLEL implementation
  (ignition-poker-tracker/shared/stats-engine.js:computePlayerStats) that does NOT use the main
  app's Bayesian credible intervals — it emits raw percentages with NO sample size shown. So the
  "same data viewed from different paths" (Data-Consistency class) shows differently: main app
  surfaces (TendencyStats.jsx / SeatGrid.jsx, per FIND-001/WS-116) show ±band; the HUD shows a bare
  number. Registered as DP-008 in the provenance chain map. A live decision is made on the
  least-attributed value in the system.
affected_files:
  - "ignition-poker-tracker/shared/stats-engine.js"
recommended_fix: |
  Surface sample size (and ideally the same ±band / DATA-PARTIAL-EST badge pattern from
  LiveAdviceBar fold% DP-004) on HUD villain stats. Longer term: reconcile the parallel
  stats-engine with the main-app tendency pipeline so the two paths cannot diverge (single source
  of computation), or document why a separate path is required and assert parity in tests.
