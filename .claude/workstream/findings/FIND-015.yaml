description: |
  bayesianConfidence.js:241-262 signature is `(n, priorAlpha=1, priorBeta=1)` and JSDoc says 'effective sample size (prior + observed)' but the body ignores both params and returns `f(n) = 0.10 + 0.83 * (1 - exp(-n / 12))`. Used by decisionAccumulator.js:497 and elsewhere — the priors don't participate.
affected_files:
  - "src/utils/exploitEngine/bayesianConfidence.js"
recommended_fix: |
  Either remove the unused params + update JSDoc, or make confidence a function of effective `n_eff = n + α + β` so prior strength meaningfully participates.
