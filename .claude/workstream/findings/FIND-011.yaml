id: "FIND-011"
title: "detectPositionallyAware uses raw frequentist ratios with min-N=5 gate"
severity: MEDIUM
status: resolved
resolved_at: "2026-06-20T00:00:00Z"
resolved_by: "WS-241"
resolution: |
  detectPositionallyAware now computes posterior = P(LP open rate > 1.5x EP open
  rate) via a two-rate Beta-posterior comparison (exact quadrature, no z/normal
  approx), with a firm Beta(6,24) RFI prior replacing the hard n<5 gate. Small
  samples shrink toward 0.5 and stay below the >0.5 detection gate; the cited
  one-extra-open-at-n=5 swing no longer flips the verdict. Beta primitives moved to
  pokerCore/betaMath.js (rangeEngine cannot import exploitEngine). Tests + 3,430
  exploitEngine tests green.
category: "bayesian-confidence"
program: "domain-correctness"
problem_class: "Range estimation correctness"
source:
  engine: "eng-engine"
  protocol: "baseline"
  run_id: "run-domain-correctness-baseline-2026-05-01"
  date: "2026-05-01"
description: |
  rangeEngine/traitDetector.js:119-142: gates on `earlyOpp < 5 || lateOpp < 5`, then computes `Math.round((earlyOpens / earlyOpp) * 100)` and triggers when `lateOpenPct > earlyOpenPct * 1.5`. With n=5 and one extra open, the percentage moves 20%+ — false positives from MC-level noise. No Beta posterior comparison of the two rates.
affected_files:
  - "src/utils/rangeEngine/traitDetector.js"
recommended_fix: |
  Replace with `bayesianDeviationTest` (or pairwise `betaPosterior`-difference probability) requiring posterior P(LP > 1.5×EP) > 0.85; move the 5-hand floor into the prior as STAT_PRIORS.
