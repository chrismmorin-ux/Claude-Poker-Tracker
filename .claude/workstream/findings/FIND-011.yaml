description: |
  rangeEngine/traitDetector.js:119-142: gates on `earlyOpp < 5 || lateOpp < 5`, then computes `Math.round((earlyOpens / earlyOpp) * 100)` and triggers when `lateOpenPct > earlyOpenPct * 1.5`. With n=5 and one extra open, the percentage moves 20%+ — false positives from MC-level noise. No Beta posterior comparison of the two rates.
affected_files:
  - "src/utils/rangeEngine/traitDetector.js"
recommended_fix: |
  Replace with `bayesianDeviationTest` (or pairwise `betaPosterior`-difference probability) requiring posterior P(LP > 1.5×EP) > 0.85; move the 5-hand floor into the prior as STAT_PRIORS.
