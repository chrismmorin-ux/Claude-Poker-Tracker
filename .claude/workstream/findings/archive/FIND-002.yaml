resolution: |
  classifyAction() in src/utils/handAnalysis/replayAnalysis.js rebuilt with MoE-symmetric banding around 0.5 (POKER_THEORY.md §181 'Thin Value betting' alignment). New return shape: { class: 'value'|'thin'|'bluff', equity, moe } | null. MoE wired through from existing handVsRange.ciHalf field — no recomputation, ciHalf was already in the contract per monteCarloEquity.js:152. Backward-compat preserved via no-MoE → binary fallback. 3 UI consumers updated (ReviewPanel + VillainAnalysisSection + ReviewObservations) — three-class badge with yellow 'thin value' tier + ±X.X% MoE suffix.
  Verification: 9,448-test full suite green; build clean. Visual verification deferred (bounded change scope; defensive guards in all consumers).
