description: |
  Resolve docs/HERO_STATE_DESIGN.md §7.6 open question: caching strategy for
  HeroState beyond the current "re-derive on demand" v1 default.

  THIS TICKET IS EVENT-DRIVEN — do NOT claim proactively. Only claim once
  production HSP usage surfaces a perf issue. Premature optimization here
  violates working principle "premature optimization of code that runs once
  a day" (per .claude/rules/performance-baseline.md).

  Trigger conditions for claiming:
    - HandReplay review render measurably slow (>100ms for HeroStateSection)
    - Live advisor (when wired in v2 consumer ticket) needs sub-frame HeroState
    - Batch-mode SCF leak detector traverses many hands and recompute dominates
    - Memory pressure from naïve caching (counter-trigger — bound the cache)

  Likely strategy when trigger fires:
    1. Decision-key hash cache — cache by (gameStateHash + heroHandHash +
       villainModelHash). LRU bounded.
    2. Per-archetype memoization for narrative interpolation only (cheaper
       than caching full HeroState).
    3. Streaming derivation — if SCF batch hits this, build incrementally
       across streets rather than recomputing from scratch each street.

  Per first-principles guard: caching never changes the semantic output. Any
  cached HeroState must be byte-equivalent to the re-derived value. Cache
  invalidation tied to inputs only.

  Output: docs/HERO_STATE_DESIGN.md §7.6 resolution + benchmark report
  documenting the trigger + chosen strategy + measured improvement.
