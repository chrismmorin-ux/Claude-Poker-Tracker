description: |
  Gate 1 Q5 (open since 2026-04-23). Pre-Session Drill (PSD) Gate 2
  surfaced this as a YELLOW condition required to clear before Gate 4.

  Two competing active-recall patterns:
    - **Flip-card**: front shows spot, tap to reveal back. More game-like;
      satisfies the recognition-primed-decisions (RPD) literature's
      "predict then verify" loop more cleanly. Standard spaced-repetition
      software (Anki, etc.) uses this pattern. Higher per-card cognitive
      gate.
    - **Side-by-side**: spot + masked answer that reveals on tap (or on
      time-out). Faster for high-volume drill blocks (PSD's 30-min variant
      could plausibly serve 10-15 cards). Lower friction; weaker
      enforcement of active prediction.

  Output: /decide ADR documenting choice + rationale + adversarial
  considerations from Gate 2 Stage E (E-A1 dominant tap target, E-A2
  no-destructive-skip, E-A3 state-aware primary action labels).

  ADR informs WS-199 (Gate 4 surface spec) layout decisions.
