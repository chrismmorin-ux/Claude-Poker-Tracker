description: |
  Mobile-portrait surface variant for Pre-Session Drill (PSD). Per founder
  D2 ratification (2026-05-19), landscape 1600×720 is v1 baseline; mobile-
  portrait is a separate Gate 4 deliverable so it does not block landscape
  v1 ship.

  Gate 2 Stage C surfaced this as a YELLOW finding (C-A1): the
  presession-preparer persona explicitly lists phone-in-cab and walking as
  the primary context. Shipping landscape-only without a mobile follow-up
  would silently downgrade the persona's primary context (anti-pattern 1
  in ROUNDTABLES.md — persona stretching).

  Scope:
    - Surface variant authored in postflop-drills.md (mobile-portrait
      section) OR separate surfaces/postflop-drills-mobile.md if portrait
      reflow is dramatic enough to warrant its own page.
    - Reflow card layout for portrait (single-column-stack; flip-card area
      remains dominant tap target; bottom-of-screen primary action).
    - Confirm card-back content discipline still works at portrait width
      (falsifier headline must remain above-fold; citation paragraph may
      need scroll).
    - Touch targets ≥44 DOM-px at common phone DPR (Galaxy A22 baseline
      already documented in INV-DENSITY register).
    - Hand-off-to-landscape behavior: if user rotates mid-drill, current
      card state is preserved.

  Does NOT block landscape v1 (WS-199). Owner can authorize WS-199 ship
  and WS-200 follow.

  Honors `feedback_portrait_mode_player_screens.md` boundary —
  portrait-native is reserved for PIO-line identification surfaces; PSD
  is a study surface, so portrait is a *variant*, not the primary mode.
