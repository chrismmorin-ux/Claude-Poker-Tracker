description: |
  Resolve docs/HERO_STATE_DESIGN.md §7.2 open question: how do tendency-adjusted
  deltas compose when multiple tendencies fire on the same decision?

  Example: villain is BOTH "calling station" (sizingMultiplier 1.3, polarize,
  bluffFreq 0.3) AND "short-stacked" (different sizing/bluff implications).
  Current v1 builder applies adjustments serially; rule for combining them
  isn't specified.

  Three candidate rules to evaluate:
    1. PRECEDENCE-BY-MAGNITUDE — keep the largest delta per axis; discard
       smaller. Simple, deterministic, but may underweight cumulative effects.
    2. MULTIPLY — for multiplicative deltas (sizingMultiplier, bluffFreq),
       compose by multiplication; for additive flags (polarize), OR them.
       Captures cumulative effects but can over-shoot on stacking.
    3. SUM — average or weighted-sum the deltas. Conservative middle ground;
       loses the "extreme tendency dominates" intuition.

  Likely answer: HYBRID — different composition rules per axis. Sizing
  multipliers compose multiplicatively but with a clamp; boolean flags OR;
  bluff-freq sets to MIN (any bluff-discouraging tendency wins). Author
  composeAdjustments(adjustments[]) → finalDelta with explicit per-axis rules.

  Per first-principles guard: composition rules must derive from the underlying
  poker-theory rationale, not be picked for code convenience. Document the
  derivation per axis in HERO_STATE_DESIGN.md §7.2 resolution.

  Tests: unit tests with synthetic adjustment combinations + assertion on
  expected composition. Include adversarial cases (calling station + nit
  stacking, contradicting deltas, all-firing edge case).
