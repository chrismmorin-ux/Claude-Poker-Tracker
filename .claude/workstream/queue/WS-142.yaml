description: |
  Implement src/utils/heroState/buildHeroState.js — orchestrator that composes
  existing primitives into a full HeroState object.

  Inputs: gameState, heroHand, villainModel, sessionStats (for tendency adjustments).
  Output: HeroState per src/utils/heroState/types.js.

  Steps:
    1. Call classifyArchetype() → archetypeId
    2. Derive situation (street, actionContext, positionClass, sprZone, pot, effStack, rake)
    3. Derive handContext (handClass, handStrength, rangeAdvantage, nutAdvantage, boardTexture)
    4. Compute equity:
       - overall via rangeEngine
       - vsRangeParts via heroState/equityVsRangeParts.js (WS-144) — role-translator
         that composes rangeSegmenter + villainProfile + polarization signal
       - realization via existing realization logic (potCalculator + texture-aware adj)
    5. Compute plan via gameTreeEvaluator depth-2/3 — primary action + branches
    6. Generate adjustments from villainProfile (style/tendency posterior)
    7. Render narrative by interpolating archetype template (loaded from
       docs/design/hero-state-templates/) with computed values

  First-principles guard: plans come from gameTreeEvaluator, not from archetypeId
  lookup. Templates only render — they don't decide.

  Caching: per §7.6 open question — likely cache by decision-key hash. If perf
  measurements during dev show recompute is fine, skip caching.
