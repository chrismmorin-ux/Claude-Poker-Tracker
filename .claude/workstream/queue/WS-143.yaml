description: |
  Wire HeroState into HandReplay review as the first consumer surface. Lowest-risk
  surface (post-hand only, no live perf concerns, full visibility into template
  rendering quality).

  Per design-program guardrail: this is a UX-touching change. Gate 1 (Entry) and
  Gate 4 (Design) required before implementation:
    - Gate 1: scope classification, personas (Chris live-player as primary),
      JTBD identification, gap analysis (GREEN/YELLOW/RED)
    - Gate 4: surface artifact at docs/design/surfaces/hero-state-handreplay.md

  Implementation: render HeroState narrative (headline + body + branchSummary) in
  HandReplayView ReviewPanel — likely a new collapsible "Frame" section above
  VillainAnalysisSection. Side-by-side with hero's actual action so the user can
  see canonical-vs-actual.

  This wiring also serves as the SCF baseline (workstream D in master plan) —
  once HeroState is rendered post-hand, SCF can compare hero's actual play
  against plan.primary to surface leak candidates.
