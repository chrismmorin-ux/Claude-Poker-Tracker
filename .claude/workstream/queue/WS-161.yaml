description: |
  Native phone-camera capture pipeline per
  `docs/design/surfaces/camera-capture-modal.md`. 2-stage flow:
    1. Native `<input type="file" accept="image/*" capture="environment">`
       → viewfinder via URL.createObjectURL; 1:1 frame CSS overlay; Shutter button.
    2. Auto-crop center 1:1 via canvas API; preview; Retake / Accept.

  On Accept: single IDB transaction writes `playerPhotos` blob +
  `players.photoBlobId` reference (atomic per camera-capture-modal.md
  §Atomic-txn binding).

  Phone-only approach (no MediaDevices/getUserMedia). Master toggle gates
  visibility (Settings `photoCaptureEnabled` from WS-165).
