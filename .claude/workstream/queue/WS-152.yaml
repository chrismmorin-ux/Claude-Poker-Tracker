description: |
  Define the river archetype taxonomy and author the templates. Mirrors v1
  WS-138/139 shape; populates HERO_STATE_DESIGN.md §4.5 (currently marked
  "defer to v2").

  Provisional taxonomy (~8; finalize during ticket):
    - RIVER_TRIPLE_BARREL_IP       — bet flop, bet turn, bet river IP
    - RIVER_TRIPLE_BARREL_OOP      — bet flop, bet turn, bet river OOP
    - RIVER_VS_TRIPLE_BARREL_IP    — called flop+turn, facing river bet IP
    - RIVER_VS_TRIPLE_BARREL_OOP   — called flop+turn, facing river bet OOP
    - RIVER_BLOCK_BET              — small lead OOP for thin value / bluff catch
    - RIVER_VS_BLOCK_BET           — facing block bet (raise/call/fold matrix)
    - RIVER_BLUFF_CATCHER          — checking down with showdown value, must
                                      decide call vs fold vs raise on bet
    - RIVER_THIN_VALUE             — value bet at river, sizing-to-value-region
                                      decision

  River-specific concerns (call out in templates):
    - No draws — equity is binary (have it / don't); polarized vs merged ranges
      dominate
    - Blocker reasoning matters more than on earlier streets
    - MDF + bluff-to-value ratio drives bluff-catcher decisions
    - Per-combo equity is exact (no MC needed) — narratives can be precise

  Output location: docs/design/hero-state-templates/river/*.md.

  Match v1 §5 voice. CONVENTIONS.md compliance.
