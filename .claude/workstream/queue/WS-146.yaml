spr109_claim_notes: |
  SPR-109 sixth claim (2026-06-08): shipped TWO rules (founder ratified "Both"
  via AskUserQuestion), catalog 7/25 → 9/25, capitalizing on the SPR-108
  decision-bucket substrate with NO further substrate work. Substrate
  re-verification (the SPR-046-blocker guard) PASSED in plan mode: both rules
  derive cleanly from existing deriveSituationKey primitives; zero migration of
  the 6 shipped 8-axis fold-rate rules.

  SHIPPED:
    - Substrate generalization: deriveSituationKey gains deriveTurnBarrelDecision
      + deriveRfiDecision + a DECISION_DERIVERS registry; heroDecisionAccumulator
      iterates the registry (existing flop:cbet-decision behavior byte-identical).
    - hero-turn-barrel-frequency — OVER-frequency decision rule
      (turn:barrel-decision:hu; baseline ~0.50; mirrors heroMultiwayBluffFrequency).
      Hero PFA + bet flop + first-in turn → aggress(bet)/pass(check). Turn-barrel
      category 0/3 → 1/3.
    - hero-pf-open-overfold — FIRST UNDER-frequency decision-bucket rule; RESOLVES
      the deferral open since SPR-046. preflop:rfi-decision:{EARLY|MIDDLE|LATE|
      BUTTON}; position-split baselines 0.15/0.19/0.26/0.42; folded-to-hero
      first-in (limp/blinds excluded v1) → open(raise)/fold. Detect gate inverted
      (delta = baseline − observed; CI upper must clear baseline). Preflop
      fold-equity category CLOSED 3/4 → 4/4.
    - Concepts: rfi-discipline-cluster (tier 2) + 4 position children WITH
      SITUATION_KEY_TO_CONCEPT resolution; turn-barrel-discipline-cluster (tier 5)
      + 2 anticipated children (umbrella absorbs fire-state, coarse bucket).
    - Lessons authored for both umbrellas (CD-5-compliant, factual; no graded/
      shame/engagement copy). Catalog duplicate hero-pf-open-overfold entries
      reconciled to one SHIPPED record + a forensic resolution note.
    - 5 new solver baselines.
  +60 net tests (heroTurnBarrelFrequency 14 + heroPfOpenOverfold 17 + accumulator
  derivers 17 + solverBaselines 2 + conceptMastery/baseline count bumps).
  skillAssessment 316/316 green. Full app 12,067 passing / 20 skipped / 1
  load-flake (RangeLabExplorer — PostflopDrillsView UI timeout under concurrent
  load; passes isolated in 2.8s; outside impact zone). Production build clean (6.40s).
  First-principles guard preserved (aggress/pass labels are OUTPUTS; observed-vs-
  baseline comparison; no label-as-input). No new UI surface.

  SUBSTRATE NOW UNBLOCKS (next claims, no further substrate work): HU under-cbet
  mirror, multiway turn barrel (turn:barrel-decision:mw). Remaining blocked
  classes still need their own axes (sizing leaks → sizing axis; position-
  discipline / thin-value / capped → hand-strength axis).

spr108_claim_notes: |
  SPR-108 fifth claim (2026-06-06): shipped hero-multiway-bluff-frequency
  (catalog 6/25 → 7/25). FOUNDER-RATIFIED SCOPE EXPANSION M → L+ via
  AskUserQuestion ("Frequency + multiway axis") after plan-mode substrate
  verification discovered the WS-146 premise hit a boundary:

  FINDING — the 6 prior shipped rules consumed ALL catalog entries that fit
  the 8-axis fold-rate-over-a-vs-bet-defense substrate. Every remaining
  PLANNED entry needs a NEW situation-key axis (playersRemaining / sizing /
  hand-strength) OR a frequency-of-aggression accumulator path (cbet+check
  route to different contextAction buckets — the same blocker that deferred
  hero-pf-open-overfold since SPR-046) OR is FUTURE-RESEARCH. No further rule
  was authorable as a pure single-file addition.

  SHIPPED (substrate + rule, additive — zero migration of the 6 shipped rules):
    - deriveSituationKey.deriveCbetDecision() — derives a coarse decision key
      flop:cbet-decision:{hu|mw} (mw = ≥2 villains remaining) classifying
      hero-as-PFA first-in flop actions as aggress (cbet) / pass (check).
      playersRemaining dimension lives ONLY in this new bucket type.
    - heroDecisionAccumulator — parallel `decisionBuckets` output with
      aggressFrequency + Wilson CI (catalog resolution option b).
    - heroLeakDetector — `bucketType: 'decision'` routing; iterates
      decisionBuckets for opt-in rules; action rules untouched, backward-compat.
    - leakRules/heroMultiwayBluffFrequency.js — FIRST decision-bucket
      (aggression-frequency) rule. Fires on OVER-cbetting multiway (baseline
      ~25%, conf 0.70; fold equity = ∏ fold rates per §7.4).
    - solverBaselines flop:cbet-decision:mw; tierConceptMap umbrella
      multiway-cbet-discipline-cluster (tier 5) + 2 anticipated children;
      lesson multiway-cbet-discipline-cluster.md; leak-catalog SHIPPED status.
  +24 net tests (14 rule + 6 accumulator decision-bucket + 4 detector).
  Full smart-test-runner 11,952 passing / 20 skipped / 2 pre-existing flakes
  (conceptMastery.test.js:120 date-aged + slow-EV-timeout-under-load — both
  confirmed reproduce on pre-change main). Production build clean (11.14s).
  First-principles guard preserved (decision label is OUTPUT; rule compares
  OBSERVED frequency to a hardcoded baseline, no label-as-input).

  SUBSTRATE NOW UNBLOCKS (next claims, no further substrate work): turn
  barrel-frequency, RFI open-fold (the deferred hero-pf-open-overfold — same
  frequency-of-aggression path), HU under-cbet mirror. Other blocked classes
  still need their own axes (sizing leaks → sizing axis; position-discipline
  / thin-value / capped → hand-strength axis).
