    - 6 baseline entries + 2 umbrella concepts + 6 sub-concepts +
      10 SITUATION_KEY_TO_CONCEPT entries + 2 umbrella lessons.

  Catalog progress: 4/25 → 6/25 shipped. Preflop fold-equity 1/4 → 3/4
