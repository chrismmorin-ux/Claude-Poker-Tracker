description: |
  Engineering Phase-0 prerequisite for Range Lab DS-54 (per-street
  range evolution). Output of SPR-093 Gate 2 Blind-Spot Roundtable
  Stage C (C-A1).

  Without caching, DS-54 multi-street narrowing requires per-frame
  recompute: 47 turn cards × 46 river cards × ~1000 combos ×
  per-combo equity update. With Float64Array per-combo cache computed
  at flop-paint-finalize, turn/river narrowing becomes a filter+weight
  operation rather than a recompute → ~10ms per turn card render.

  Sibling pattern to PSD WS-198 (hands ↔ upper-surface-node-ID
  cross-reference) — both are engineering Phase-0 work that ships
  independently of design gates and unblocks downstream feature
  function.

  Architecture sketch:
    - At flop-paint-finalize, compute equity per villain combo vs
      hero range on the 3-card flop. Store as Float64Array[1326] keyed
      by combo index.
    - On turn card reveal, filter combos that have card collision
      with turn (~50 combos blocked) + update remaining combos'
      equity via incremental recompute (1-card runout, not full
      runout).
    - On river card reveal, similar incremental update from turn.
    - Memoize per (preflop context + flop + villain range archetype)
      key so re-entering RL with same state hits cache.
    - Cache TTL: session-scoped (cleared on app reload).

  INV-RL-DETERMINISM (per C-A4 / Stage E): deterministic seed for
  any Monte Carlo path in RL (exact enumeration preferred for ≤5-card
  boards; Monte Carlo only when exact is intractable, with fixed
  seed).

