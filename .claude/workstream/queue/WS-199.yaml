description: |
  Pre-Session Drill (PSD) Gate 4 design deliverable. Output of SPR-090
  Gate 2 Blind-Spot Roundtable. PSD ships as a new mode inside
  PostflopDrillsView (not a new routed view — per Gate 1 + Drills
  Consolidation rejection).

  Surface spec content (per Gate 2 Stage E + Stage C findings):
    - **Mode placement** inside PostflopDrillsView mode-bar (alongside
      Drill / Explorer / Line modes).
    - **Card layout** per WS-196 ADR (flip-card vs side-by-side).
      Dominant tap target (E-A1); card-back skim discipline (C-A2):
      falsifier headline → citation paragraph → anchor links.
    - **State-aware primary actions** (E-A3): "Flip" → "Got it / Partial /
      Missed" → "Next". No generic "Continue."
    - **Tri-state self-grade** (E-A4) with retract until card closes;
      no destructive binary commit.
    - **Mood-aware SELECTION** (C-A3) — stuck-mode biases winnable spots,
      heater-mode biases edge cases. Surface TONE stays neutral.
      Until mood auto-detection validates (WS-201), ship user-declared
      toggle.
    - **Time-budget variants** 5 / 15 / 30 min: card-count adapts (3 /
      5-7 / 10-15). 30-min depth cap (C-A4): adds count, not depth.
    - **Phone-sleep recovery** (C-A5): missed card → not-attempted →
      retry-later queue.
    - **No destructive skip** (E-A2): "next" mid-prediction auto-marks
      not-attempted.
    - **Neutral chrome** (E-A5): no streaks / mastery scores /
      leaderboards / tier badges / shame copy / congratulatory inflation.
      Citation strings only.
    - **Anchor-trace navigation** per WS-197 ADR.
    - **SessionsView entry point** (D-P2): additive affordance to
      surfaces/sessions-view.md.
    - **HandReplayView cross-link** (D-P3): additive affordance to
      surfaces/hand-replay-view.md.

  Do NOT author `docs/design/surfaces/pre-session-drill.md` — rejected
  by Gate 1 unless Drills Consolidation reverses (it has not).

  Mobile-portrait variant is a SEPARATE Gate 4 ticket (WS-200) — this
  ticket covers 1600×720 landscape v1 only (per founder D2 ratification).
