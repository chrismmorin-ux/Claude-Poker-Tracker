status_note: |
  SHIPPED 2026-05-19 SPR-092 as singleton plan-first sprint. Zero src/ diff.

  Authored:
    - docs/design/surfaces/postflop-drills.md — new "Pre-Session mode (PSD Gate 4 extension, 2026-05-19)" section (~280 lines). Covers all Stage E heuristics (E-A1..E-A6) + Stage C adjustments (C-A1..C-A6): card layout (flip-card per ADR-005), state-aware primary actions, tri-state self-grade, mood-aware selection (mix not framing), time-budget variants (5/15/30 with depth cap on 30-min), phone-sleep recovery, neutral chrome (E-A5 + A-AP1 binding), anchor-trace navigation via in-app bundle (ADR-006), card-back content discipline, selection algorithm (recency × frequency × mood), state machine, mode entry points, adjacent surface dependencies, test-coverage expectations. Mode-bar updated to put [Pre-Session] in leftmost slot (founder ratification 2026-05-19 plan-mode). JTBD list extended (SE-01/02/03 + DS-62/DS-63). Personas extended (presession-preparer as situational primary).

    - docs/design/surfaces/sessions-view.md — inline [Pre-Session Drill] button added to primary action row between [Import] and [Backup]. Persona list extended with presession-preparer (sibling of post-session-chris per Gate 3 A-R1). JTBD-SE-01 entry path documented. Key interactions list extended. Related surfaces gains postflop-drills (Pre-Session mode) cross-link. Founder ratification 2026-05-19 plan-mode: inline button (split with HandReplay overflow-menu, matching workflow asymmetry — SessionsView opens PSD; HandReplay flags spots for PSD).

    - docs/design/surfaces/hand-replay-view.md — new "PSD review-mode entry-point wire" section (~110 lines). Per-step overflow menu (⋮) on ReviewPanel with [Open in HandReview…] + [Open in HRP modal] + NEW [Queue for tomorrow's PSD]. Disabled state for no-analog spots (spot-resolver returns no match). Toast with Undo. Anti-pattern + autonomy compliance (red lines #5 + #8 + A-AP1 binding inherited). Test-coverage expectations. Anatomy diagram updated. JTBDs grew (SE-02 partial — producer half of prep↔session↔review loop). Personas extended (presession-preparer review-mode-feeder). Related surfaces gains postflop-drills (Pre-Session mode).

  Verified against accept_criteria — all 8 met. Zero src/ diff (Gate 4 is documentation/spec). Gate 5 implementation work tracked separately.

  Unblocks: WS-200 (mobile-portrait variant), WS-198 (Phase-0 engineering — hands ↔ node-ID cross-reference; ships in parallel; DS-62 functions with frequency-only fallback pre-WS-198). PSD Gate 5 (implementation) authorable as next /next cycle composition.
