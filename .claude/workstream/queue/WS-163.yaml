description: |
  Two surface extensions per `docs/design/surfaces/players-view.md`
  §PIO-G4-PV (lines 169–216) + `player-editor.md` §PIO-G4-PEX:

  **PlayerEditor extensions:**
  - AgeDecade radio (5-bin: <20s, 20s, 30s, 40s, 50s+)
  - Ethnicity tag input (reuses Table-Build EthnicityTagInput)
  - Wardrobe palette chips (multi-select)
  - Jewelry palette chips (multi-select)
  - Logo palette chips (multi-select)
  - Camera entry button (gated by Settings photoCaptureEnabled from WS-165 — opens camera modal from WS-161)

  **PlayersView extensions:**
  - New filter chips: AgeDecade, Wardrobe, Jewelry, Logo
  - Row-tap routing change: row tap → PlayerProfileView (was PlayerEditor)
  - Edit button on row stays available (one-tap-to-edit alternative)

  Note: PlayersView seat-grid is NOT touched (Table-Build owns it post-Gate 4
  supersession). Only the database-browser portion is extended.
