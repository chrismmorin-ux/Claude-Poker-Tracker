description: |
  Two display-layer verdicts emit confident-looking categorical output over noisy
  small-sample estimates, with no confidence gate (POKER_THEORY §6.5):

  FIND-009: replayAnalysis.js assessEV uses hard bucket-pct thresholds
    (valuePct > 50, valuePct < 25 && drawPct < 20, ...) to emit +EV/-EV/neutral
    with no dataQuality/handsProcessed/confidence gate.
  FIND-010: pipCalculator.js active-tier count uses a hard WEIGHT_THRESHOLD = 0.3
    cutoff over Float64 weights and emits an integer pip delta (formatPips) with no
    uncertainty attribution.

  Both are display/heuristic layer (lower consequence than engine math), but both
  present precision the sample size doesn't support.
accept_criteria: |
  - assessEV gates on the range profile's handsProcessed/confidence; below threshold
    returns verdict 'unknown' with reason 'insufficient data'.
  - pipCalculator attaches { pips, confidence } per position via
    bayesianSampleConfidence; formatPips renders a confidence badge.
  - Tests cover the low-sample -> unknown/low-confidence path; build clean.
