description: |
  **Gate 2 blind-spot roundtable for the drills surface**

  Surfaced by WS-083 (DCOMP Wave 3 drills audit, 2026-06-13). That audit found the
  drill tabs have all matured to functional, navigable surfaces with real content — so
  the original "WIP tab fate decision" is moot. The one clause of WS-083 left genuinely
  open was "Gate 2 for drills", which was never run. WS-083 closed as substantially
  complete; this ticket carries the remaining Gate 2 work.

  Run a Gate 2 Blind-Spot Roundtable (per docs/design/ROUNDTABLES.md) on the drills
  surface as a whole: PostflopDrillsView (6 tabs) + PreflopDrillsView (8 tabs). Focus on
  blind spots the existing framework can't self-see — persona coverage for the drilling
  workflow, pedagogical coherence across the two views' parallel tab structures, and
  whether the tab proliferation (Line/Explorer/Estimate/Framework/Library/Lessons/...)
  serves the JTBD or fragments it.
