completion_notes: |
  SHIPPED 2026-06-10 (SPR-116). Root fix inside the shared reader
  (kit/scripts/lib/cwos-utils.js): new quote-aware stripInlineComment() helper
  cuts at the first '#' preceded by whitespace outside quoted spans. Applied
  (1) at top of parseScalar — covers mapping scalars, block-sequence items,
  sequence-of-mapping values, inline-array elements; (2) on afterColon in
  parseMapping before branch dispatch — fixes `key: [a, b]  # note` corrupting
  the last array element. Block-scalar content untouched (readBlockScalar never
  routes through parseScalar). Bonus fix beyond accept criteria:
  `key: "val"  # note` now properly unquotes (previously returned the raw
  string with quotes). Leading-# values (`key: #fff`) deliberately unchanged —
  minimal scope. cwos-next.js loadConfig toInt() guard retained as
  defense-in-depth.
  Tests: scripts/__tests__/cwos-utils-yaml.test.js (12 cases incl. SPR-113
  reproduction + quoted/unquoted/block-scalar/inline-array coverage), all green.
  Verification: gate parses caps as numbers {max_items: 5, max_effort_sessions: 2};
  candidates parses queue cleanly. Full suite 12,297/12,320 passing — 2 failures
  are pre-existing full-suite-load flakes (gameTreeDepth2 green in isolation;
  src/ has zero imports of kit code, so the reader change cannot affect app tests).
