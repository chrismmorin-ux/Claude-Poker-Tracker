description: |
  SPR-084 (WS-042) shipped three SLS Stream B2 section components inside
  HandReplayView's ReviewPanel — EquityDistributionCurveSection,
  SpirePolarizationSection, SizingCurveTagSection. All three accept
  null data props today (`villainAnalysis.perCombo`,
  `villainAnalysis.evByFraction`) and render null per
  INV-SLS-B2-SECTION-NULL-DEGRADATION because the analysis pipeline
  doesn't yet produce those fields.

  Wiring is a localized change in the analysis pipeline:

  1. `src/utils/handAnalysis/replayAnalysis.js` already computes
     `villainRange`, `board`, `heroCards` per postflop hero-action
     decision (lines ~290-330 in `buildCounterfactualTree`'s inputs).
     Need to extend with a call to
     `computeComboEquityDistribution(heroCards, board, segCombos, ...)`
     from `src/utils/exploitEngine/gameTreeEquity.js:273` (per
     SPR-084 Decision C — `shapeLanguage/` ↔ `exploitEngine/`
     asymmetric import rule already established; this wiring lives
     in `handAnalysis/`, neutral domain).

  2. Attach `result.perCombo` (and `result.evByFraction` derived from
     `recommendations[]` per-sizing entries if multi-sizing emits) to
     the analysis result object so `villainAnalysis` carries them
     through to ReviewPanel.

  3. Section props in ReviewPanel.jsx already read
     `villainAnalysis?.perCombo` / `villainAnalysis?.evByFraction` —
     no UI changes required once data lands.

  Plan-mode decisions to surface to founder:

  - perCombo attachment location: sibling of `bucketEquities` (flat on
    analysis result) vs nested under `counterfactualTree`.
  - evByFraction derivation strategy: extract from existing
    `recommendations[]` per-sizing entries (cheap; assumes game tree
    emits multi-sizing) vs add explicit multi-sizing eval pass
    (expensive). If multi-sizing extraction doesn't yield data,
    defer Sizing Curve Tag wiring to a follow-up ticket and ship EDC
    + Spire+Polarization only this sprint.

  Lights up SPR-084 work in production. Closes the "shipped-but-inert"
  carry-over flagged at SPR-084 + SPR-085 sprint summaries.
