description: |
  Owner request 2026-05-11: 'I want the avatars of players to be their seat
  image at the table. It will give a better visual check to the user being
  able to see and transform the configuration into the app or from the app.'

  **Direction change.** Player Entry Overhaul (PEO, 2026-04-16) ratified
  custom-SVG feature-avatars as the load-bearing identification representation
  (`src/components/ui/IdentityAvatar.jsx` + `AvatarRenderer.jsx`); photo was
  added later (SPR-036 / WS-161) as an optional `photoOverlay` BADGE in the
  bottom-right corner of the SVG avatar. This WS proposes inverting that
  priority: **photo is primary when present; SVG fallback when absent**.

  **Why it's not a simple fix:** PEO's ratifications are still binding for
  the editor / picker / identification math surfaces (PIO-line work per
  `feedback_pio_identification_utility_first.md`). PIO uses identification
  fields (skin/hair/beard/glasses/hat) for matching, search, and adjacency-
  range filtering. Photos can't replace identification fields in cold-read
  contexts (no photo yet). So the photo-primary direction applies to the
  TABLE VIEW use case ('visual mirror of the room') NOT the editor/picker.

  **Pre-decision /decide ADR is mandatory** because this inverts a previously-
  ratified contract (PEO + PIO). Options to present back to owner:

    - **D-A — Photo-primary on TableView, SVG-primary on PlayerEditor/PlayerPicker.**
      Two surfaces, two priorities. TableView seat avatars use
      `<img src=photoBlobUrl />` when `photoBlobId != null`, else
      `<IdentityAvatar />`. PIO line stays SVG-primary.
      RECOMMENDED.

    - **D-B — Photo-when-present everywhere.** TableView, PlayerEditor,
      PlayerPicker all use photo if present. SVG only when no photo. Picker
      filters still operate on identification fields (the filter axes are
      cold-read scaffolding — not the avatar rendering). Simpler mental
      model; loses identification-utility clarity on the editor.

    - **D-C — Status quo + photo zoom-on-tap.** Keep current SVG-primary +
      photo-overlay shape; add tap-to-zoom on the overlay badge to bring
      the photo to full size. No direction change; small ergonomic win.
      Not what owner asked for, but safest.

  **Why not just implement D-A:** PEO + PIO are program-scoped, owner-
  ratified directions with multi-session work behind them. A /decide ADR
  formally records the inversion + scope (TableView only vs everywhere) +
  the rationale (visual table mirror beats synthesized SVG for
  configuration-recognition use case).

