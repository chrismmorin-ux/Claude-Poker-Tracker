description: |
  In the SHOVE case, computeRiskPremium is called with riskChips: heroChips
  (hero's full stack) while winChips = min(heroChips, villainStack). The lose
  branch then removes heroChips from hero and credits heroChips to villain via
  cloneWithTransfer. When the contested villain is SHORTER than hero (a covered
  shove), hero cannot lose their full stack — only min(hero, villain) — and the
  villain cannot receive more than they had. The transfer over-debits hero and
  over-credits villain in the lose branch, distorting heroLose and the derived
  risk premium.

  Masked in normal use: first-in jams are gated to <=15bb effective and target
  the chip leader (assessPushFoldSetup picks the biggest opponent), so villain >=
  hero almost always and riskChips == winChips == heroChips. Bites only when the
  selected villain is shorter than hero. cloneWithTransfer's Math.max(0,...) keeps
  stacks non-negative but villain's resulting stack is still inflated.

  Source: domain-correctness delta run 2026-06-20 (new LOW finding).
accept_criteria: |
  - SHOVE path passes riskChips: min(heroChips, villainStack) (effective amount at
    risk), matching winChips. CALL path already correct — leave unchanged.
  - Add a test exercising a covered shove (villain shorter than hero) asserting the
    risk premium matches the effective-stack computation, not the full-stack one.
  - icmEngine + pushFoldEngine test suites pass; Malmuth-Harville conservation
    assertions still hold; build clean.
