completion_note: |
  Fixed the covered-shove asymmetry in usePushFold.js: the SHOVE ICM payload now
  passes riskChips = winChips = effectiveAllIn = min(hero, villain) instead of
  riskChips: heroChips (full stack). When hero covers a shorter villain, hero can
  lose only the effective amount, not their whole stack — the old code over-debited
  the ICM lose branch. riskPremium.js itself was already correct (it uses whatever
  amounts the caller supplies; computeHeroPressure already passed the effective
  min). Added an icmEngine regression test: a 100-vs-40 covered shove keeps hero at
  60 chips in the lose branch (matches modeling hero at 60 directly), strictly more
  $EV than the full-stack bust computation. icmEngine + pushFold suites green (36).
