completion_note: |
  VERIFIED NOT A DEFECT. buildRangeProfile (index.js:24) creates a FRESH createEmptyProfile
  each call, runs updateProfileFromActions exactly once (counts from 0, grids overwritten
  via '=', anchors applied once per extraction), THEN normalizeAllPositions runs AFTER
  anchoring (line 31) — so anchored grids are tamed and rebuilds cannot accumulate. Anchor
  additivity is within a single rebuild (intentional: more showdowns = more evidence).
  Added a rebuild-idempotency regression test (two rebuilds from identical showdown-bearing
  data produce byte-identical grids; anchored hand stays bounded). No production change needed.
