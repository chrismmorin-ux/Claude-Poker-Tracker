description: |
  Latent ReferenceError in `src/components/views/AnalysisView/PlayerAnalysisPanel.jsx:473`:

    const WeaknessesSection = ({ tendency }) => {
      const weaknesses = tendency?.weaknesses || [];
      if (!playerId || weaknesses.length === 0) return null;  // ← `playerId` undeclared
      // ...
    };

  `playerId` is not destructured from props, not a closure variable
  (component is module-level), not a global. JS evaluates `!playerId`
  first regardless of `||` short-circuit, so ReferenceError is thrown
  on every render of `<WeaknessesSection>`.

  Trigger path: `<WeaknessesSection tendency={playerTendency} />` at
  line 438 renders unconditionally inside Panel 3 (Action
  Recommendations + Weaknesses). Panel 3 is gated by `selectedPlayerId`
  truthy. → AnalysisView Panel 3 crashes whenever a player is selected.

  Bug age: introduced commit 4093b4b (2026-03-09 — "feat: TendencyProvider,
  pokerCore extraction, weakness detection, dead code cleanup"). Bug went
  undetected because:
    - No tests exist for `src/components/views/AnalysisView/` (zero
      coverage; no __tests__/ directory)
    - User may rarely enter AnalysisView with a player selected, or the
      crash is being absorbed by an ErrorBoundary higher in the tree

  Discovered SPR-063 substrate-map fork (out-of-scope finding) and
  investigated 2026-05-09 at owner request.

