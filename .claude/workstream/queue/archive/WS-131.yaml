notes: |
  normalizePositionToCategory mapping:
    - EARLY/MIDDLE/LATE/SB/BB → pass through (already category)
    - UTG/UTG+1/UTG+2 → EARLY
    - MP/LJ/HJ → MIDDLE
    - CO/BTN/BU → LATE
    - unknown → upper-cased pass-through (lookup fails naturally → population
      fallback, preserves prior behavior for genuinely unrecognized inputs)

  Applied at:
    - preflopAdvisor.js Tier 0.5 (4bet table lookup)
    - preflopAdvisor.js Tier 1 (3bet table lookup)

  Note: BTN_vs_CO normalizes to LATE_vs_LATE which is NOT in the table by
  design (table only encodes hero-position-stronger matchups; intra-category
  uses population). Updated PFA-FT-006 fixture to use BTN/UTG (→ LATE/EARLY,
  which IS in the table) to actually exercise the fix path.
