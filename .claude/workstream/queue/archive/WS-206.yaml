status_note: |
  DONE 2026-05-20 (SPR-095). REFRAMED from charter (founder-ratified): the ticket
  assumed each LSW node carries an *asserted equity* number to validate the engine
  against — verified in code that NO such field exists (equity is prose-only; the
  nodes were authored qualitatively). Same Gate-2-premise-vs-code mismatch SPR-094
  flagged. Reframed to a DRIFT-PIN: INV-LSW-RL-EQUITY-PARITY pins the ENGINE's
  hero-vs-range equity for each authored node to a committed, reviewed baseline;
  CI fails if any node drifts >0.5%, catching silent engine drift on teaching spots.
  Equity source = pokerCore exactComboEquity (WS-205 kernel) — one equity source of
  truth shared with RL cache. Files: src/utils/rangeEngine/__tests__/lswRlParity.test.js
  + lswRlParityBaseline.js (4 pinned nodes + 1 documented-degenerate); INV-LSW-RL-EQUITY-PARITY-1..3
  in system/invariants.md. CI trigger satisfied by ci.yml `npm test` (full suite runs every
  commit — superset of path-scoped trigger; no workflow edit needed).
  Decision flag resolved: full corpus (all eligible nodes), not 3-random — deterministic
  exact enumeration makes full coverage cheap + seeding moot.
  COVERAGE NOTE: only 5 nodes (the flop_root of each line) are parity-eligible — the other
  ~63 nodes lack the structured (single-combo heroView + resolvable baseRangeId) binding
  (turn/river/terminal/multiway). Coverage auto-expands as nodes gain the binding.
  FINDING: invariant immediately caught a real content bug — utg-vs-btn-4bp-deep::flop_root
  declares hero A♥K♦ on board A♠K♦2♠ (K♦ duplicated = impossible holding). Tracked in
  KNOWN_DEGENERATE_NODES + follow-up ticket WS-209."
