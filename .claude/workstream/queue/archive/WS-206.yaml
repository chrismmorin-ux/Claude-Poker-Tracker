description: |
  Author **INV-LSW-RL-EQUITY-PARITY** in `system/invariants.md` + CI
  test. Output of SPR-093 Gate 2 Blind-Spot Roundtable Stage D (D-P6).

  When LSW invokes Range Lab via cross-link, the equity numbers RL
  surfaces MUST match the equity numbers LSW asserted in its line-audit.
  If they differ, the line-audit had stale assumptions OR RL has a
  computation bug. RL is the validator of LSW content (DS-55 JTBD).

  **Invariant statement:** For the same input (preflop context + board
  + villain range archetype + hero combo), LSW's asserted equity AND
  RL's computed equity MUST agree to ±0.5% (Monte Carlo variance floor)
  OR within exact-enumeration tolerance.

  **CI test design:**
  - Sample 3 random LSW nodes from the existing 8 authored lines
    (~85 nodes total).
  - For each sampled node: extract preflop context + board + villain
    range archetype + hero combo from the line node.
  - Recompute equity in RL using the same inputs.
  - Assert ±0.5% match (Monte Carlo) OR exact-tolerance (≤5-card board
    exact enumeration).
  - Run in CI on every commit that touches `src/utils/rangeEngine/` OR
    `src/utils/drillContent/lines.js` OR `docs/upper-surface/*`.

  **Anti-pattern bound by this invariant:** silent drift between LSW
  content and engine output. Without the invariant, an engine change
  could break LSW correctness without any test failure. With the
  invariant, the test fires on any commit touching either side of the
  contract.

  Cross-program note: this lives in domain-correctness (Poker Theory
  Integrity) because it enforces theoretical consistency between two
  surfaces. Mirrors POKER_THEORY.md guardrail discipline.

