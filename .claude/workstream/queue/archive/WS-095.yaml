description: |
  **Multiway bucket-EV engine for `BucketEVPanel`** (H3-F1 finding). Today `computeBucketEVs` calls `handVsRange(villainRange, ...)` against a single villain range; the MW lines (`btn-vs-bb-sb-srp-mw-j85`, `co-vs-btn-bb-srp-mw-oop`) have two villains. Rendering bucket EV on those lines with a HU-calibrated computation would produce misleading numbers and is worse than not rendering at all. **Scope:** extend `drillModeEngine.computeBucketEV` + pinned-combo + domination paths to accept `villains: [{range, position}]`; compute per-villain equity; compute cascading fold probability across the villain sequence (parallels `foldEquityCalc`'s MW model). Domination map should segment against the combined range or render one disclosure per villain (design call during impl). **Blocker for:** LSW-B1 widening on J85 + Q53 MW flop roots. Does not block B1 on the 4 HU flop roots.
