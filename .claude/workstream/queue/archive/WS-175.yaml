description: |
  Reassigned from PMC Gate 2 close-out (SPR-065, 2026-05-09). PMC's
  Charter Open Question Q6 — "When do showdown reveals trigger range-engine
  Bayesian updates per RANGE_ENGINE_DESIGN §4.5? Every showdown / batch by
  session-close / require N showdowns before updating?" — was originally
  scoped to PMC Phase 5e.

  Under REPLACEMENT (predictionAudit IS PMC) Phase 5e is cancelled. But the
  underlying RANGE_ENGINE_DESIGN §4.5 update path continues to operate
  independently of predictionAudit. Q6 belongs to range-engine, not PMC.

  Authoring needed:
    - Read existing RANGE_ENGINE_DESIGN.md §4.5 Bayesian update path
    - Read `src/utils/rangeEngine/bayesianUpdater.js` (or §4.5 equivalent)
    - Determine current update gating behavior (likely: every showdown
      writes immediately to rangeProfiles store; verify this)
    - Decide gating policy answering Q6
    - Document decision in RANGE_ENGINE_DESIGN.md or POKER_THEORY.md
    - Wire any code change required

  Cross-references:
    - FM-SEL-01 in PMC failure-mode-taxonomy.md — showdown selection bias
      (MNAR) — Bayesian updates from showdowns systematically over-weight
      value-and-stubborn-bluff range portions. Update gating MUST account
      for this OR the policy must explicitly accept the bias.
    - Range-engine theorist persona's ordering concern (Stage D, sprint 1/2):
      semantic-boost path is order-dependent in current bayesianUpdater.
      Update gating decision must NOT exacerbate this.
