description: |
  SPR-085 / WS-067 shipped HRP Gate 4 surface specs — `hand-review-modal.md`
  authored, `hand-replay-view.md` extended with the ledger-link chip,
  `analysis-view.md` extended with HandBrowser flag affordances,
  `showdown-view.md` extended with HE-17 producer. The hand-review-modal
  consumes a `SpotMatch` from a planned `spotResolver/` module that
  doesn't yet exist; without the engine, the chip can never fire strong
  or partial matches and the modal can never open with linked artifact
  content.

  Per the SPOT-KEY feasibility spike (`docs/projects/played-hand-review-
  protocol/spot-key-spike.md`, 2026-04-23, verdict GREEN), the proposed
  architecture is 7 files + golden-test corpus:

  - `src/utils/spotResolver/CLAUDE.md` — module rules (pure, no writes,
    pokerCore-only imports)
  - `src/utils/spotResolver/index.js` — public `resolveSpot(hand,
    decisionIndex) → SpotMatch` API
  - `src/utils/spotResolver/spotKeyExtractor.js` — extract 8-dim spot
    descriptor (position, IP/OOP, texture, stack, SPR, action history,
    cards, hero combo)
  - `src/utils/spotResolver/potTypeInference.js` — preflop-raise-count
    → potType
  - `src/utils/spotResolver/boardShorthand.js` — cards → 'T96ss' /
    'Q72r' / 'K77'
  - `src/utils/spotResolver/nodeClassifier.js` — street + action
    prefix + board transition → canonical node_id
  - `src/utils/spotResolver/corpusIndex.js` — in-memory index of
    upper-surface + LSW nodes, built at PWA boot
  - `src/utils/spotResolver/matchScorer.js` — descriptor × corpus →
    scored matches
  - `src/utils/spotResolver/__tests__/` — 30+ golden-test corpus
    entries

  Estimate per spike: ~200 LoC core + ~150 LoC golden-test corpus.
  "1-2 sessions of focused work."

  Plan-mode decisions to surface to founder:

  - Corpus loading strategy: build at PWA boot via `import.meta.glob`
    (matches `lessonRegistry.js` pattern) vs lazy-load per query.
    Recommendation: PWA boot (offline corpus availability is a
    Stage C rule from HRP Gate 2).
  - Node-id classification source: hand-authored code (decision-tree
    in `nodeClassifier.js`) vs data-driven (JSON corpus importing
    LSW/Upper-Surface manifests). Recommendation: code-first; the
    decision tree is small enough that data-driven gives no clarity
    win.
  - Match-scorer scoring weights: per-dimension weights for the 8-dim
    spot descriptor. Recommendation: equal-weight baseline; golden-
    test corpus drives any future re-tuning (mirrors
    silhouettePrototypes.js calibration discipline — calibrated, not
    learned, per `feedback_first_principles_decisions.md`).

  Unblocks HRP Stream U (Phases 6-8 — HandBrowser flag filter, hand-
  review-modal component implementation, ShowdownView producer button).
  After this engine ships, the modal contract from
  `hand-review-modal.md` becomes implementable.

accept_criteria:
  - "`src/utils/spotResolver/` directory created with all 7 modules per spike architecture (CLAUDE.md + index + spotKeyExtractor + potTypeInference + boardShorthand + nodeClassifier + corpusIndex + matchScorer)."
  - "`resolveSpot(hand, decisionIndex) → SpotMatch` returns `{confidence: 'strong' | 'partial' | 'no-analog', artifactId?, reason?, descriptor, scoredMatches}` shape matching the contract `hand-review-modal.md` consumes."
  - "Corpus index loads at PWA boot via `import.meta.glob`; cold-start path tested (no on-demand load latency)."
  - "≥30 golden-test corpus entries pass — coverage targets per spike: ~40-50% strong match, ~20-30% partial, ~15-25% no-analog. The corpus encodes both positive (strong-match) and negative (no-analog) examples."
  - "Cross-domain guard: spotResolver imports from `pokerCore/` only — NO imports from `exploitEngine/`, `rangeEngine/`, or `shapeLanguage/`. Grep verifies."
  - "smart-test-runner.sh green. Vite build clean."
  - "HRP project doc Phase 4 → DONE, Phase 5 → CURRENT; Session Log entry added."

