description: |
  Author the SelfCoachView Curriculum surface — the user-facing entry
  point for browsing concepts, viewing per-concept mastery, toggling
  signal sources, and exploring the next-teachable-concept recommendation.

  The infrastructure landed in WS-148 / SPR-033:
    - tierConceptMap.js (concept registry, 3-kind architecture)
    - conceptMastery.js (per-concept signals)
    - composite.js (next-teachable selector with configurable weights)
    - learningStateDescriber.js (general/specific descriptor with composition transparency)
    - settings.selfCoach.{signalToggles,signalWeights,ownerTier} (state only; UI = this ticket)

  This ticket adds the SURFACE that consumes the infrastructure. Per the
  design framework guardrail (CLAUDE.md §Design Program Guardrail):
  this is a NEW surface, so it MUST start with Gate 1 (Entry audit) +
  Gate 4 (surface spec).

  Scope:
    - Gate 1 entry audit (docs/design/audits/YYYY-MM-DD-entry-self-coach-view.md)
    - Gate 2 (Blind-Spot Roundtable) only if Gate 1 yields YELLOW or RED
    - Gate 4 surface spec (docs/design/surfaces/self-coach-view.md)
    - Implementation: SelfCoachView.jsx + curriculum tab + composition-inspect panel + signal-toggle UI + signal-weight sliders + owner-tier radio (per AP-SCF-03 owner-set only)
    - Tests + Playwright visual verification (mobile + desktop layouts)

  Per `feedback_scf_learning_state_not_tier_rank.md`:
    - NEVER renders ownerTier / inferred tier as a single-word rank label
    - Renders learning-state DESCRIPTOR with click-to-inspect composition (CD-5)
    - Tier names ('novice'..'pro') only appear in the owner-set radio UI

  Per `chris-live-player.md` autonomy red lines:
    - #5: no shame copy, no engagement-pressure (no streak counters, no level-up notifications)
    - #8: source-util-policy whitelist already includes SelfCoachView; no live-table contamination

