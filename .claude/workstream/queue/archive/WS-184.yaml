status_note: |
  DONE 2026-05-13 in SPR-076. FSM rewrite of CameraCaptureModal shipped
  per all 5 ratified decisions (full FSM / dev-mode telemetry / ship
  without Bug D repro / 1500×1500 downscale / "Couldn't process this
  photo. Try again..." failure copy).

  Net change:
    - NEW src/utils/playerMatching/downscaleImageBlob.js (~70 LoC pure
      bounding-box downscale; returns original Blob if already-small)
    - NEW src/utils/playerMatching/__tests__/downscaleImageBlob.test.js
      (9 tests covering downscale-when-large, no-op-when-small, custom
      maxEdge, landscape/portrait aspect, error paths, URL.revokeObjectURL
      cleanup)
    - REWRITE src/components/views/PlayerEditorView/CameraCaptureModal.jsx
      (useReducer FSM: source / preparing / cropping / saving stages +
      orthogonal error field; named transitions; dev-mode logTransition)
    - EDIT src/components/views/PlayerEditorView/__tests__/CameraCaptureModal.test.jsx
      (extended from 3 smoke tests to 12 tests: source-stage init, FSM
      mount stage, file-pick downscale success/failure, Accept button
      disabled gate, save-success onSaved+onClose chain with photoUrl,
      save-failure standard copy + raw-message NOT leaked, concurrent
      tap impossible, Retake clears error, override path no-IDB)
    - EDIT src/components/views/PlayerFinderView/PlayerFinderView.jsx
      (added onSaved callback for production path; updated capturedPreviewUrl
      from blobUrl returned by modal; documented chain in code comment
      per AC #6)

  Bugs closed (5):
    A — OOM: downscale at file-pick (1500×1500) keeps Cropper + crop op
        under ~9MB. OOM path becomes structurally rare, not routine.
    B — silent fail after save: success path explicitly fires onSaved +
        onClose. Modal unmounts. No "Saving…" forever.
    C — silent dropped accept tap: button-disabled is the sole gate;
        early-return removed; concurrent tap impossible by disabled
        attribute (asserted in test).
    D — active errors with raw text: all errors funnel through one
        dispatch → fixed user-facing copy. Raw err.message in dev console only.
    E — avatar doesn't refresh: onSaved(blobId, photoUrl) signature
        passes the in-memory blob URL back; PlayerFinderView writes it
        to capturedPreviewUrl; IdentityAvatar photoOverlay re-renders.

  Tests: 21 NEW (modal 12 + downscale 9) + all 61 touched-area tests
  green (PlayerEditorView + PlayerFinderView + playerMatching). Build
  clean (15.41s). Smart-test-runner full pass had a single 10s-timeout
  flake on PlayerFinderView.smoke (passes in isolation in 6.96s — pre-
  existing borderline-against-default-timeout flake, not introduced).

  Out-of-scope follow-ups noted:
    - docs/design/surfaces/camera-capture-modal.md still describes the
      spec'd 2-stage flow (auto-crop) not the shipped 3-stage flow
      (manual crop via react-easy-crop). Doc-update is a design-program
      task, not WS-184. Author a separate WS to refresh that surface doc.
    - PlayerFinderView.smoke.test.jsx is brittle near 10s default timeout;
      consider raising to 20s OR splitting the smoke test off the heavy
      module-graph. Out-of-scope for this WS.

  Enables WS-187 (avatar = photo direction change) — capture path now
  works reliably.
