description: |
  `npx vitest run --project unit src/utils/persistence/__tests__/migrationV21.test.js`
  fails with 14 errors in the `telemetryConsentStore CRUD` describe block:
    - round-trips a written record
    - replaces an existing record on put
    - throws when userId missing on put
    - deletes a record
    - does not throw when deleting an unknown user
    (and ~9 others in the same suite)

  Surfaced 2026-05-01 during SPR-003 close-out unit-suite run. Reproduces in
  isolation — NOT introduced by ICP-1 (only test files added; persistence layer
  not touched per `git diff src/utils/persistence/`).

  Vital signs in `system/state.md` claim "Tests: GREEN" but reality has 14
  failing tests. Either:
    a) Tests have been silently broken for some prior period (drift)
    b) Environmental flake under specific conditions (fake-indexeddb concurrency,
       teardown ordering, etc.)
    c) Real persistence-layer regression that telemetryConsentStore exercises

  Triage scope: identify root cause and disposition (fix vs skip-with-reason
  vs accept). Out of scope: any structural rewrite of telemetryConsentStore or
  migration v21. If root cause is a real persistence-layer issue, file a
  follow-on WS for the fix.
