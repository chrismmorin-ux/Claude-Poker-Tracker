notes: |
  **Disposition: fix-now (1-line + import swap, AUDIT-ONLY in test file).**

  **Root cause:** migrationV21.test.js called `initDB()` directly to obtain a
  DB handle for assertions. `initDB` (database.js:108) does NOT attach an
  `onversionchange` handler to the returned DB — only `getDB` (database.js:166-180)
  does (via `db.onversionchange = () => { db.close(); cachedDb = null; };`).

  Sequence of failure:
    1. Test 1 calls `initDB()`, holds DB connection in local var
    2. Connection has no onversionchange handler
    3. Test 1 ends; afterEach closes cachedDb (which is null — `initDB` doesn't
       populate the cache, only `getDB` does)
    4. Open connection from test 1 leaks across to test 2
    5. Test 2 beforeEach calls `indexedDB.deleteDatabase(DB_NAME)` — fake-indexeddb
       sees the open connection and waits for it to close (would normally fire
       onblocked, but with onsuccess/onerror listeners present, the request hangs)
    6. `await deleteEntireDB()` never resolves → hook timeout at 10s
    7. All subsequent tests fail with hook-timeout cascade (12 of 14 fail)

  **Fix applied:** swapped `initDB()` calls (15 sites) for `getDB()`. Mirrors
  working sister test refresherMigration.test.js. database.test.js works with
  initDB directly because IT swaps the entire IDBFactory in beforeEach
  (`globalThis.indexedDB = new IDBFactory()`) — sidesteps connection re-use.

  **Audit-only discipline:** zero production source changes. Only
  src/utils/persistence/__tests__/migrationV21.test.js modified.

  **Verification:** all 14 tests pass in 32ms (was 12 failing + 116-second hang).

  **Follow-on consideration (not done in this triage):** `initDB` is exported
  and would benefit from defensive `onversionchange` attachment so direct
  callers don't get the footgun. Production has only 2 `initDB` callers (the
  no-await side-effect-init in usePersistence.js and 2 dev-only handSimulator
  uses), so this is low-priority hardening — open a separate WS if pursued.
status_note: "RESOLVED 2026-05-01 — root cause was test-side initDB-vs-getDB misuse, not a real persistence bug"
