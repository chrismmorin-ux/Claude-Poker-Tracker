description: |
  Gate 1 Q6 (open since 2026-04-23). Pre-Session Drill (PSD) Gate 2
  surfaced this as a YELLOW condition required to clear before Gate 4.

  DS-58: "Anchor-trace from drill card to deep artifact when curious"
  (one-tap navigation from card → source upper-surface artifact section).

  Four options:
    (a) **In-app rendering**: bundle docs/upper-surface/ into the app.
        Robust offline; bundle-size cost ~15 artifacts × ~10KB ≈ 150KB.
    (b) **External link**: opens hosted docs in browser. No bundle cost;
        network dependency (Stage D Mobile-Context Skeptic flagged this
        as risky for cab/bad-signal pre-session use).
    (c) **Inline expansion**: truncated section appears in-card, full
        artifact not accessible. No surface deferral; UX cost (information
        density rises).
    (d) **Defer to Range Lab** (WS-053+). If Range Lab Gate 4 brings
        artifact rendering into the app, PSD inherits the renderer. If
        Range Lab does not, PSD reverts to (a) / (b) / (c).

  Per Stage D D-P5: (a) or (c) recommended for v1; (b) is mobile-fragile.

  Output: /decide ADR documenting choice + rationale + bundle-size
  impact + cross-surface ownership (coordinate with WS-053 Range Lab
  Gate 2 closure).

  ADR informs WS-199 (Gate 4 surface spec) navigation section + WS-195
  (Gate 3) DS-58 JTBD domain placement (cross-cutting vs drills-and-study).
