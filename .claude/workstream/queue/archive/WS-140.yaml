description: |
  Define the HeroState type schema in src/utils/heroState/types.js as JSDoc
  typedefs (the codebase is JS, not TS).

  Schema per docs/HERO_STATE_DESIGN.md §3 (strawman):
    - HeroState (top-level)
    - Situation (coarse axes)
    - HandContext (fine axes)
    - Equity (overall + vsRangeParts + realization)
    - Plan (primary + branches + rangeConfig)
    - Adjustment (condition + delta + rationale)
    - Narrative (headline + body + branchSummary)

  Plus enums for:
    - archetypeFamily (PREFLOP_OPEN | PREFLOP_VS_OPEN | FLOP_HU_CBET | ...)
    - actionContext (OPEN | VS_OPEN | 3BET | VS_3BET | SQUEEZE | CBET | VS_CBET | ...)
    - positionClass (EP | MP | HJ | CO | BTN | SB | BB)
    - sprZone (MICRO | LOW | MEDIUM | HIGH | DEEP — already in potCalculator; reuse)
    - handClass / handStrength / boardTexture / rangeAdvantage / nutAdvantage

  No runtime yet — just type definitions. Validates the data shape before
  implementing classifier/builder.
