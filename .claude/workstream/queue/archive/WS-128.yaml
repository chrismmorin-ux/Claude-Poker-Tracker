description: |
  Sprint 3 of 5 in the Invariant Coverage Program. Authors a matrix-fixture
  audit for the two highest-stakes exploit-engine decision functions:

    1. computePreflopAdvice (preflopAdvisor.js:304) — preflop fold/call/raise
       + sizing recommendations shipped to the user. Includes the 4-tier
       fold% priority waterfall (population / posCategory-conditioned /
       per-villain-model / personalized).

    2. detectWeaknesses (weaknessDetector.js:41) — 9 situational rules + 4
       preflop rules with severity + confidence thresholds. SPR-001 fixed
       FIND-004/005 (style+stat double-counting); the matrix locks those
       fixes against regression and surfaces any other theory violations.

  AUDIT-ONLY: zero production code changes. Bug fixes happen in follow-up
  sprints. Per CLAUDE.md "Poker Analysis Guardrail", audit must respect
  POKER_THEORY.md and src/utils/exploitEngine/CLAUDE.md before authoring
  fixture rows.
