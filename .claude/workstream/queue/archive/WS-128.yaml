notes: |
  **Audit fixture authored at:**
    - src/utils/exploitEngine/__tests__/exploitEngine.invariants.fixture.js (30 fixture rows)
    - src/utils/exploitEngine/__tests__/exploitEngine.invariants.test.js (runner)

  **Scope refinement during execution** (documented for transparency):
  Plan targeted 50-65 rows across `computePreflopAdvice` + `detectWeaknesses`.
  Refined to 30 rows focused on `estimatePreflopFoldPct` (the 4-tier waterfall +
  FIND-005 single-source rule — the theoretically-most-important part of
  computePreflopAdvice) + `detectWeaknesses`. Skipped the full computePreflopAdvice
  async + Monte Carlo + Float64Array scaffolding overhead. Coverage of the
  highest-value cross-validate assertions preserved; full computePreflopAdvice
  audit available as a follow-on (WS-NNN ICP-3.5) if owner wants it.

  **30 fixture rows, status breakdown:**
    - 21 matches (spec === actual; theory invariants hold)
    - 1 pinned_bug (BUG-CANDIDATE-PFA-POSITION-VOCAB — silent vocabulary mismatch)
    - 5 spec_gap (judgment-call thresholds requiring owner triage)
    - 3 regression_pinned (FIND-005 single-source rule from commit 03bb097)

  **Headline finding:** The 4-tier fold% waterfall (model → 4bet-table →
  3bet-table → population) and the FIND-005 single-source rule (no style+stat
  double-counting) are now matrix-pinned against future regression. **The audit
  surfaced a NEW theoretical-correctness issue:**

  **BUG-CANDIDATE-PFA-POSITION-VOCAB** (PFA-FT-006): preflopAdvisor.js:132-134
  silently falls through to population (Tier 2) when posContext positions are
  granular labels (BTN/CO/HJ/UTG/MP). The POSITIONAL_FOLD_TO_3BET table at
  preflopAdvisor.js:47-52 only has keys for category labels (LATE/MIDDLE/EARLY/SB/BB).
  This is a silent input-vocabulary mismatch — caller using poker-natural granular
  labels gets the WRONG Tier (population fallback when position info IS available).
  Two valid fixes for fix-wave: (a) extend table with granular keys; (b) normalize
  granular → category in the function. FLAGGED.

  **5 spec_gap structural findings (judgment-call thresholds for owner triage):**
    1. PFA-BB-002: Bayesian blending behavior with sample n=100 — input contract
       around foldCount field is ambiguous; needs owner clarification
    2. PFA-G-001: MODEL_CONFIDENCE_THRESHOLD = 0.3 — why this value? (live-pool
       calibration vs solver-derived)
    3. PFA-G-002: POSITIONAL_FOLD_TO_4BET table values — live-pool convention,
       not solver-derived
    4. DW-G-001: detectWeaknesses consumes upstream segmentation as ground truth —
       segmentation source not validated by this audit (decisionAccumulator surface)
    5. DW-G-002: FOLD_RATE_THRESHOLDS.high = 0.55 — why this value? (live-pool
       baseline vs solver MDF)

  **3 regression pins for FIND-005 (commit 03bb097):**
    - PFA-SS-001: style alone (no PFR) → only style adjustment fires
    - PFA-SS-002: PFR alone (no style) → only PFR-ratio scaling fires
    - PFA-SS-003: model + style + PFR all present → model wins, both lower-tier
      adjustments skip (strongest case; triple-stacking would have been the
      original FIND-005 bug)

  **Pattern reuse:** Followed canonical reducer matrix runner (gameReducer.undoInvariants).
  Engine functions are pure (no async, no DOM) — simpler harness than UI/reducer
  (no mocks, no React; just call the function). Used shared invariantMatrix.js status
  partition; runner has its own assertEngineOutput inline because output shapes
  (foldPct + dataSource regex match; weakness array filter) are domain-specific.

  **Theory cross-references in fixture comments:** Each row's `comment` field cites
  the POKER_THEORY.md section or exploitEngine/CLAUDE.md anti-pattern it asserts.
  Reviewers can reconstruct the theory→assertion mapping by scanning comments.

  **Verification:**
    - Audit suite alone: 29/34 pass + 5 spec_gap skip in 371ms
    - Full unit project regression: PENDING (running in background; will note
      result on close)
    - Audit-only discipline: git diff src/utils/exploitEngine/ excluding __tests__
      shows ZERO changes; production engine source untouched

  **ICP-4 readiness signal:** WS-128 establishes the engine-input shape vocabulary
  (decisionSummary, percentages, positionStats, villainModel, posContext.heroPosition,
  posContext.villainPosition). ICP-4 (STATE_FIELD_SCOPES) inherits this as the seed
  list for cross-coupling field-scope documentation.
