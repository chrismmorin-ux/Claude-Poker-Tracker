status_note: |
  SHIPPED 2026-05-20 SPR-094. ADR-007 authored at docs/adr/ADR-007-rl-paint-primitive.md.
  Decision: tap-to-toggle + long-press-for-weight per founder ratification 2026-05-20.
  Alternatives considered + rejected: tap-and-hold-for-weight (conflates two semantic
  actions under timing), slider-per-cell (visually noisy, mobile-portrait infeasible),
  hybrid mode-toggle (defers decision instead of answering). Scale-aware ergonomics
  documented (long-press-required mode at small scales). Heuristic compliance verified
  inline (H-N03, H-N05, H-PLT06, H-ML06). Cross-references Gate 2 audit Stage E E-A1.
  Companion to ADR-008 (per-stroke undo composes cleanly with per-cell action atomicity).
  Unblocks WS-055 (Gate 4 surface spec) — paint UX section can now be authored.
