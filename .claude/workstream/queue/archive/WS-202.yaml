description: |
  Gate-4 ADR documenting the Range Lab paint primitive decision.
  Output of SPR-093 Gate 2 Blind-Spot Roundtable Stage E (E-A1).

  Three primitive options enumerated in Stage B + Stage E:
    1. Tap-to-toggle for in/out + long-press for weight slider
       (RECOMMENDED — matches existing app gesture vocabulary;
       weight is opt-in for users who want granularity)
    2. Tap-and-hold for weight (tap = include @ 100%, hold = slider
       in-place)
    3. Slider-per-cell (every cell shows a slider; tap = full;
       drag = partial weight)

  ADR documents recommended choice + alternatives considered (pros/
  cons each) + heuristic compliance verification (H-N03 undo,
  H-N05 error prevention, H-PLT06 misclick absorption, H-ML06 touch
  target). Mirrors ADR-005 (PSD active-recall flip-card) pattern.

  Choice shapes WS-055 Gate 4 surface spec (paint UX) + WS-203
  undo-stack ADR (per-stroke vs per-session depends on primitive).

