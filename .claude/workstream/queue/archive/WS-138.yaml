description: |
  Author the 8 preflop archetype templates from docs/HERO_STATE_DESIGN.md §4.2:
    1. PF_OPEN_RFI         — Hero opens unopened pot
    2. PF_VS_OPEN_BB       — Hero in BB facing single open
    3. PF_VS_OPEN_SB       — Hero in SB facing single open
    4. PF_VS_OPEN_IP       — Hero IP cold-call vs single open
    5. PF_3BET             — Hero 3bets a single open
    6. PF_SQUEEZE          — Hero 3bets open + caller(s)
    7. PF_VS_3BET          — Hero opened, faces 3bet
    8. PF_LIMP_NAV         — Hero acts after 1+ limpers

  Each template is a parametric narrative with slots that interpolate values from
  HeroState.equity, plan.primary, plan.branches, adjustments at render time.
  Voice: first-person plural ("we"), pedagogical, concise. Match §5 examples
  (especially 5.1 AJo HJ and 5.3 SB vs CO).

  Output location: docs/design/hero-state-templates/preflop/*.md (one file per
  archetype) — separate from HERO_STATE_DESIGN.md to keep the design doc focused.

  Authorship convention: §8 of HERO_STATE_DESIGN.md (no hardcoded numbers,
  interpolate from equity.* and plan.*.ev).
