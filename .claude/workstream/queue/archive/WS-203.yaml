status_note: |
  SHIPPED 2026-05-20 SPR-094. ADR-008 authored at docs/adr/ADR-008-rl-undo-stack.md.
  Decision: per-stroke undo (each cell action = one stack entry) per founder ratification
  2026-05-20. Per-session alternative rejected (loses H-PLT06 misclick absorption for
  in-session errors). Cmd-Z / Cmd-Shift-Z bindings standard. Session-scoped stack
  (cleared on reload). "Clear all" intentionally bypasses undo stack as separate
  destructive action with confirmation modal. Heuristic compliance verified inline
  (H-N03, H-PLT06, H-N04 industry-tool consistency). Composes with ADR-007 (atomic
  actions defined there are the per-stroke entries this stack tracks). Unblocks
  WS-055 (Gate 4 surface spec).
