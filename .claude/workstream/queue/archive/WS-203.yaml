description: |
  Gate-4 ADR documenting the Range Lab undo-stack design decision.
  Output of SPR-093 Gate 2 Blind-Spot Roundtable Stage E (E-A2).

  Two designs enumerated in Stage E:
    1. Per-stroke — each cell tap = one undo-stack entry
       (RECOMMENDED — granular control; matches H-PLT06 misclick
       absorption; consistent with paint primitive granularity)
    2. Per-session — each "Start paint" → "Finalize paint" = one entry
       (simpler implementation; lower undo granularity; rejected
       for misclick absorption weakness)

  ADR documents recommended choice + alternative considered + heuristic
  compliance (H-N03 undo, H-PLT06 misclick absorption) + interaction
  with "Clear all" destructive confirmation (E-A3).

  "Clear all" is a separate destructive action with confirmation modal;
  it bypasses the undo stack (intentional — Clear All requires explicit
  user intent, not undo-recoverable accident).

