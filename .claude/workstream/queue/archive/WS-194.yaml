description: |
  SPR-088 plan-mode (2026-05-18) owner correction: at the river, equity
  per villain combo is binary (showdown is deterministic â€” cards are
  known). There is no continuous variance to compute across runouts.
  The correct primitive for river-decision math (Basin classifier,
  future river-bluff-catch frequency, river thin-value sizing, etc.)
  is the **showdown-outcome distribution** of villain's range, with
  per-combo strength-tier bucketing computed against the public board
  (not vs hero) â€” because the strength-tier mix exposes potential bluff
  content.

  Today `gameTreeEquity.computeComboEquityDistribution` gives `perCombo`
  with per-combo `heroEquity` (0 / 0.5 / 1 at river). What is missing:
  for each combo, a `villainStrengthBucket` âˆˆ {nuts, very-strong,
  strong, marginal, weak-or-bluff} computed against the current board
  alone (independent of hero's cards).

  This is the prereq for Basin (SLS catalog row 6, currently deferred
  behind SPR-088). Without it, Basin cannot classify the showdown
  distribution shape; with it, Basin becomes a clean classifier on the
  strength-tier histogram.

  Per the memory entry `feedback_river_equity_is_showdown_outcome.md`,
  the rule generalizes: any future river-decision exploit code or
  descriptor should consume the strength-tier histogram, not reach for
  a variance metric.

  **Scope:**
  1. Add a pure helper `classifyVillainCombo(combo, board)` in
     `src/utils/pokerCore/` (or `exploitEngine/gameTreeEquity.js`) that
     returns a `strengthBucket` âˆˆ the 5-tier enumeration.
  2. Thread the bucket onto each `perCombo` entry at river street;
     decide whether to also expose it on earlier streets for
     consistency (flop / turn â€” the strength-bucket vs the current
     board is still meaningful, just less load-bearing because future
     cards will reshape it).
  3. Add tests covering each 5-tier classification on representative
     boards (paired board, flush board, monotone, straight-textured).
  4. Update `INV-PERSIST` / cross-domain rules as appropriate.

  **Out of scope for this ticket:** the Basin classifier itself
  (downstream consumer); the Sankey rendering (SessionsView
  Gate-4-blocked); IDB persistence of analysis output (separate
  decision).

