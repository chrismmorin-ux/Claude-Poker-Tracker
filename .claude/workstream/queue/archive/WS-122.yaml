notes: |
  22 fixture rows: 17 matches + 1 pinned_bug (BUG-CANDIDATE-UNDO-STREET-DESYNC) +
  3 spec_gap (UNDO across NEXT_HAND; absentSeats-actionSequence drift; potOverride independence)
  + 1 regression_pinned (state-ref identity for rejected UNDO).

  Headline finding: **gameReducer UNDO is a single-slice operation by design** — pin rows
  confirm playerReducer.seatPlayers and uiReducer.selectedPlayers are independent and not
  cascaded by UNDO_BATCH or UNDO_LAST_ACTION. This is correct spec but was previously
  undocumented; the matrix now asserts it as an invariant.

  1 candidate bug for fix-wave triage: BUG-CANDIDATE-UNDO-STREET-DESYNC — when UNDO_BATCH
  removes ALL actions for the current street, currentStreet stays at the empty street
  (e.g., 'flop' with no flop entries left). Subsequent button rendering and next-action
  computation operate against an inconsistent state. Owner triage: should UNDO that erases
  a street auto-rewind currentStreet?

  3 structural gaps for follow-on tickets:
    1. No "undo NEXT_HAND" — accidental hand advance is unrecoverable
    2. absentSeats and actionSequence can drift; UNDO does not validate consistency
    3. potOverride independent of actionSequence; undo of bet-bearing actions does not
       clear a manually-set pot

  Pattern transferred cleanly off UI surface. The shared runner at src/test/invariantMatrix.js
  handled standard rows; cross-coupling rows used dedicated test blocks (custom assertions
  beyond what the generic runner can express). The same-ref regression pin (UNDO-R-001)
  used a third dedicated block (toBe, not toEqual). This 3-block structure is now the
  template for any future audit that needs cross-slice or identity assertions.

  Verification: 22 passed + 4 skipped (the 3 spec_gap rows + 1 meta-test counted as skipped
  by Vitest's skip semantics on the spec_gap describe). Existing reducer tests pass.
  git diff src/reducers/ src/components/ shows zero production code changes.
