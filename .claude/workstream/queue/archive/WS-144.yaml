description: |
  Implement the role-translator module that produces HSP's 4-class equity
  partition (vsValue / vsBluff / vsDraw / vsAir) by composing existing
  primitives:
    - rangeSegmenter.segmentRange + enrichWithEquity (strength partition + per-bucket hero equity)
    - villainProfileBuilder.getStyle (villain style)
    - gameTreeEquity.computePolarization (polarization signal)

  Created by WS-137 audit (2026-05-03) which rejected building a
  standalone villainRangePartitioner.js because rangeSegmenter.js already
  provides comprehensive strength-class partitioning. The gap is
  role-conditioning, not partitioning — which is a thin translation
  layer that lives in heroState/ rather than rangeEngine/ or
  exploitEngine/ because role-conditioning depends on action+style
  (downstream of both engines).

  Full API spec is in docs/HERO_STATE_DESIGN.md §9.3 (appended by WS-137
  audit). Decision table for strength→role mapping is in §9.1 Q2.
