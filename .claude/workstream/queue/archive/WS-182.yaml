status_note: |
  Authored 2026-05-11. REWRITTEN 2026-05-12 after owner reframe: solution
  belongs at primitive level (make illegal payloads unrepresentable), not
  at dispatch boundary (validate and reject). Owner principle now binding
  for all future action-recording work.

  PRIMITIVE_ACTIONS constants stay; what changes is the recording API
  shape. Display labels (CHECK/CALL/BET/RAISE) become derived outputs,
  not free-floating inputs. CHECK-while-owing becomes structurally
  unrepresentable because no caller passes a 'check' string anymore.

  Bug-fix exempt from Refactor Sprint 'no new features' charter. Pairs
  with `.claude/failures/RULES_INVARIANT_DISPATCH_BYPASS.md` + memory
  `feedback_action_dispatch_legality.md` (both updated for the reframe).
