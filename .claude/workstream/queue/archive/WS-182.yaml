decision_flags:
  - "Single recordSeatAction file vs inline in useGameHandlers. Recommendation:
    standalone utility — easier to unit-test, no React-hook coupling, can be
    imported from tests/fixtures/analytics."
  - "Strict-mode behavior on illegal raiseTo: throw vs return false vs no-op.
    Recommendation: throw — caller code is buggy if it can produce a
    raiseTo<=currentBet; that should surface loudly. Compare to the
    dispatch-boundary throw vs toast question (now moot at this layer)."
  - "Whether legacy synthetic test fixtures that dispatch RECORD_PRIMITIVE_ACTION
    directly (e.g., asserting potCalculator behavior with hand-crafted action
    sequences) should migrate to recordSeatAction or stay as direct dispatches
    with a comment. Recommendation: stay direct — they're testing the reducer's
    state-mutation behavior, not the primitive-level invariant. Add comment
    per fixture."

