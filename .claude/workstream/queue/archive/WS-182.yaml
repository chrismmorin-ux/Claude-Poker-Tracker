id: "WS-182"
title: "Action primitive collapse — recordSeatAction(seat, intent) makes CHECK-while-owing structurally unrepresentable (replaces dispatch-boundary validator approach)"
legacy_id: ""
type: bug
status: done
claimed_by: "SPR-075"
