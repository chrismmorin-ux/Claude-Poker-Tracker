      partition but isn't currently rendered with percentages anywhere.
      Re-rendering 4-class mass partition deferred.
    - Files originally listed in files_involved that didn't host partition
      displays (BucketEquityPanel, EquityDecompositionPanel, HeroStateSection,
      BucketEVPanelV2 directly) NOT touched per the ratified scope.

  Inline label "(sums to 100%)" added on partition surfaces only — owner
  ratified copy wording 2026-05-15. ActionRecommendationStrip omits the
  label per plan (2-value thin strip; ratio reads cleanly).

  Verification: 11,442 tests green; npm run build clean. Vital sign
  green across full app suite.
