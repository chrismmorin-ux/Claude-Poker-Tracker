sprint_id: "SPR-083"

decision_flags:
  # RATIFIED 2026-05-12: Bucket classification.
  #   PARTITIONS (must sum to exactly 100%):
  #     1. 4-class HSP decomposition (vsValue / vsBluff / vsDraw / vsAir)
  #        — every villain combo belongs to exactly one class on a given board
  #     2. Hero win / tie / lose vs villain range
  #        — every showdown runout is exactly one outcome
  #   OVERLAPPING (do NOT force sum):
  #     3. Range by hand-strength shape (made-hand / draw / overcard / air)
  #        — a hand can be both a made hand AND a draw structurally
  #   NOT-A-PARTITION (do NOT force sum):
  #     4. Per-action EV (bet / check / call / raise)
  #        — alternatives the hero chooses between; conditional on
  #          different futures; not on a 0-100 scale (EV in bb, not %)
  # Fix scope: largest-remainder rounding applied to displays #1 and #2
  # only. Both surface in postflop lessons; one of them is the immediate
  # bug owner observed.
  - "Display copy distinguishing the two group types — recommended in
    Definition of Done above; owner approves wording at implementation."

