description: |
  Owner observed during 2026-05-11 session that postflop lesson EV-bucket
  displays do not sum to 100% — symptom of independent rounding per bucket
  (33.4% + 33.4% + 33.3% = 100.1%) or actual compute drift in the 4-class
  decomposition (`vsValue / vsBluff / vsDraw / vsAir`).

  Owner principle: 'Not every EV bucket is mutually exclusive, but the ones
  that are need to sum to 100% so players can see' — display must communicate
  which groups partition the space and guarantee those sum to exactly 100%.

  Compute is likely correct (`equityVsRangeParts.js` is invariant-tested per
  memory `project_hero_state_primitive.md`, 4-class decomposition is
  load-bearing) — bug is most likely in display rounding. Need to verify
  compute first.

  Affected surfaces (per grep):
  - `src/components/views/PostflopDrillsView/LessonsMode.jsx`
  - `src/components/views/PostflopDrillsView/BucketEVPanelV2.jsx`
  - `src/components/views/OnlineView/panels/BucketEquityPanel.jsx`
  - `src/components/views/PreflopDrillsView/EquityDecompositionPanel.jsx`
  - `src/components/views/HandReplayView/HeroStateSection.jsx` (4-class display)

accept_criteria:
  - "Partition classification RATIFIED 2026-05-12 (see decision_flags):
    only displays #1 (4-class HSP vsValue/vsBluff/vsDraw/vsAir) and #2
    (hero win/tie/lose) must sum to 100%. Range-by-hand-strength shape
    is overlapping; per-action EV is not a partition. Both partitions
    get sum-preserving rounding; the latter two displays do not change."
  - "Introduce a single sum-preserving formatter
    `src/utils/pokerCore/percentGroup.js` that uses largest-remainder
    rounding so displayed percents of a partition sum to exactly 100.
    Replace per-bucket independent rounding at affected surfaces."
  - "UI: label each partition display with '(sums to 100%)' or equivalent
    inline indicator so user knows the math invariant. Overlapping
    displays explicitly carry no such label. Owner approves exact copy
    at implementation review."
  - "Invariant test (compute): for 100 random hero-vs-range fixtures
    across street and range size, `vsValue + vsBluff + vsDraw + vsAir`
    of the COMPUTED decomposition is 1.0 ± 1e-6. If this fails, the
    bug is in compute, not display, and fix moves to
    `equityVsRangeParts.js`."
  - "Invariant test (compute): for 100 random fixtures, hero win + tie
    + lose of the COMPUTED equity is 1.0 ± 1e-6."
  - "Invariant test (display): for 100 random fixtures, the DISPLAYED
    percents (after rounding) of partition displays #1 and #2 sum to
    exactly 100 (no floating-point slack)."
  - "Negative invariant test: overlapping display #3 (range-by-shape)
    and non-partition display #4 (per-action EV) do NOT have a sum-to-100
    test applied — they're allowed to drift / have different scales."

effort: "M"
