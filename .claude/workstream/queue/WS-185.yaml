status_note: |
  Authored 2026-05-11 from owner session-issue consolidation. Bucket
  classification RATIFIED 2026-05-12.

  DONE SPR-083 2026-05-16. Plan-mode audit found this YAML's listed
  files_involved didn't match the actual partition displays in code —
  owner ratified broader scope (Decision #1, 2026-05-15). Shipped:

    NEW src/utils/pokerCore/percentGroup.js — largest-remainder
        sum-preserving partition formatter (`formatPercentGroup` +
        `percentGroupNumbers`). 26 unit tests green.

    NEW unit tests asserting partition-sum=100 invariant on 4 surfaces:
      - src/components/views/PreflopDrillsView/MatchupBreakdown.jsx
        (win/tie/lose 3-way partition)
      - src/components/views/PostflopDrillsView/panels/VillainRangeDecomposition.jsx
        (per-row + polar 3-subtotal partitions)
      - src/components/views/PostflopDrillsView/panels/WeightedTotalTable.jsx
        (DetailTable top-N+Other + AggregatedTable beats/pays/other partitions)
      - src/components/views/PostflopDrillsView/panels/ActionRecommendationStrip.jsx
        (value vs bluff-or-pay 2-way partition)

    Compute invariant test added on equityDecomposition.js
    (winRate+tieRate+loseRate=1.0 ±1e-9) across 8 canonical hand-vs-hand
    matchups. Confirms compute layer holds; display drift was the bug.

  Scope correction from WS-185 original accept_criteria:
    - `vsValue+vsBluff+vsDraw+vsAir = 1.0` compute test NOT added —
      `equityVsRangeParts.js` returns per-role HERO EQUITIES (independent
