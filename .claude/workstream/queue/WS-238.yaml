description: |
  _Convergence: completes the userId data-isolation fix on the WRITE side (read side fixed 2026-06-19)._

  Residual from the 2026-06-19 data-isolation fix. The READ paths now thread the signed-in
  account (SessionContext/PlayerContext/TendencyContext + export). But the manual/live hand-save
  path still defaults to 'guest': `useAppState.js:92` passes `undefined` as the 7th arg (userId)
  to `usePersistence(...)`, which defaults to GUEST_USER_ID. So hands entered manually (live table
  play) save under 'guest' even when signed in, then read paths (now userId-scoped) won't show
  them until the next sign-in triggers the guest→account merge (migrateGuestData).

  Online (Ignition) capture is unaffected — it already writes under the UID via SyncBridge. This
  only bites manual/live entry while signed in. Fix: thread the resolved auth userId into the
  usePersistence call (compute from auth in useAppState or pass down), matching the read-path +
  online-write pattern. Verify useAppState has the resolved userId in scope (auth state).
accept_criteria:
  - "usePersistence in useAppState receives the resolved signed-in userId (not undefined/guest) so manual hands save under the account when signed in."
  - "A test asserts a manually-saved hand while signed in is readable under the account's userId (not guest)."
  - "Guest behavior preserved when signed out (userId resolves to 'guest')."
