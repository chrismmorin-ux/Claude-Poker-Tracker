description: |
  **The leak→drill connection** — founder-ratified priority drill investment (WS-230
  Gate 3, 2026-06-15). The WS-229 roundtable flagged the analysis→drill gap as the
  single most valuable missing element (D-1): the app is a hand tracker that knows the
  user's real leaks, but the drills can't be reached from them. Serves **DS-45** (drill
  my own hand history), promoted Proposed → Committed-staged.

  Scope: a "drill the spots I'm actually losing on" path — from analysis-view and/or
  hand-replay-view to a drill scenario built from (or matched to) the user's own hands,
  plus a "what should I drill today?" leak-targeted entry (the navigation investment
  chosen over tab consolidation in the WS-230 tab-structure decision). Cross-tab
  continuity (audit B-4) is folded in here, not a separate JTBD.

  **Blocked on WS-198** (hands ↔ upper-surface-node-ID cross-reference — the data
  plumbing). Do not start the bridge before the matcher exists; an interim
  frequency-only fallback is acceptable per DS-62 precedent if partial value is wanted
  sooner. Plan-first when unblocked (surface spec for the entry + routing).
accept_criteria:
  - "With WS-198 landed, a user can go from a flagged leak (analysis-view / hand-replay) to a drill targeted at that spot."
  - "A leak-targeted 'what should I drill today?' entry exists (the WS-230 nav investment), routing from the user's actual leaks rather than a default tab."
  - "Gate 4 surface spec authored before code; references DS-45 + the WS-229 audit."
