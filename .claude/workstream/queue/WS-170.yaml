description: |
  Wire the existing pure-util retirementEvaluator.js (shipped, zero
  callers) into endCurrentSession session-close hook. Ship the
  AutoRetireBanner UI per `docs/design/journeys/anchor-retirement.md`
  Variation D step 3s.

  When at session-close ≥1 anchor's retirementCondition fires, the
  evaluator transitions them through active → expiring → retired. On
  next AnchorLibraryView open, banner surfaces:

    "N anchor(s) auto-retired since you last looked. [ Review ] [ × ]"

  Tap Review → filter to retired-since-dismissal. Tap Dismiss →
  localStorage timestamp persisted; banner stays cleared on reload.

  Smallest-substrate-clean-child of WS-015 decomposition (SPR-060
  founder Q2 ratification). Mirrors WS-160 first-child pattern.
