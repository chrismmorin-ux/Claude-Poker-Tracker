description: |
  Founder-ratified follow-up from WS-217 ("Both" decision, SPR-121). The
  ws-replay-seam test currently replays frames RECONSTRUCTED in the
  documented wire format (SPIKE_REPORT.md) from FULL_HAND_SEQUENCE — no raw
  captured frame dump exists in the repo (spike-data/network-requests.log is
  HTTP URLs only). Capture an actual raw frame dump from a live Ignition
  session and swap it in as the fixture source so the seam test replays
  genuinely captured traffic.

  Capture options (pick at execution): (a) manual DevTools WS frame export
  from wss://pkscb.ignitioncasino.eu/poker-games/rgs, or (b) add a
  capture-to-file/clipboard affordance to capture-websocket-probe.js
  (dev-gated, never shipped enabled). Scrub account-identifying values
  before committing. Frames should cover at least one complete multi-street
  hand with folds (the WS-217 HUD-drop bug class requires fold coverage).
