description: |
  Owner request 2026-05-12: "We need a way for a player to tag a hand for
  later review, while entering the hand."

  **Goal:** mid-hand, a quick visible affordance (button / chip / icon)
  that marks the current hand for later review. Tagged hands accumulate
  in a Review Queue surface. Owner returns to the queue later (between
  sessions or post-session) to study each.

  **Why this matters:** the live-table cognitive flow is "capture-first,
  analyze-later." Owner notices something interesting in a hand (a
  villain made a surprising call, hero made a marginal decision, board
  ran out wild) but can't pause mid-hand to study it. Today the only
  way to "save for later" is memory — and that's lossy. A tag-for-review
  flag turns a fleeting "I should think about that hand" into a durable
  queue entry without breaking flow.

  **Greenfield — no existing infrastructure.** Grep confirms:
    - No `flaggedHands`, `markedForReview`, `bookmarked`, `reviewLater`
      fields in hand records.
    - No existing UI affordance for hand-tagging.
    - SessionsView lists hands; HandReplayView replays them; neither has
      a "tagged" filter or list mode.

  **Surface scope:**
  - **Tag affordance**: a single tap during action entry adds the tag.
    Placement TBD at Gate 4 — likely lives in CommandStrip alongside
    other hand-level controls (undo, end-hand). Visible state: tagged
    vs untagged. Tapping again untags. Optional: long-press to add a
    short text note (free-text reason — "donk bet into 3 callers, why?").
  - **Tag storage**: append to existing hand record OR new IDB store.
    Recommendation: append `reviewTag: { tagged: true, note?: string,
    taggedAt: number }` to hand record — simplest, atomic with hand
    save, no migration complexity.
  - **Review Queue surface**: new view OR filter on SessionsView. Owner
    picks at Gate 4. Recommendation: SessionsView filter chip
    'Tagged ⭐' that shows only tagged hands; secondary tap on a hand
    row opens HandReplayView with the tag visible.
  - **Tag removal**: from Review Queue, swipe-to-untag OR explicit
    "Reviewed — clear tag" button on the replay surface.

  **Cognitive load discipline:** the tag affordance MUST be one-tap
  during action entry. If it requires a modal, sub-menu, or confirmation,
  it fails the goal (owner can't pause mid-hand). Long-press for note is
  optional and only when owner has the time.

  **Gate path (Design Program Guardrail):**
  - Gate 1 (Entry) — REQUIRED. Persona: owner mid-hand. JTBD: 'flag this
    hand so I can find it later without losing focus right now.' Gap
    analysis: no existing surface covers this. Likely YELLOW or RED.
  - Gate 2 (Blind-Spot Roundtable) — TRIGGERED if Gate 1 ≥ YELLOW. New
    interaction modality (tag-during-entry) + new persistent state class.
  - Gate 4 (Design surface) — REQUIRED. Surface doc:
    `docs/design/surfaces/hand-tag-for-review.md` specifying tap
    affordance placement, state shape, Review Queue UX, untag flow.
  - Gate 5 (Implementation) — straightforward once Gates 1+4 ratified.

accept_criteria:
  - "Gate 1 audit at docs/design/audits/YYYY-MM-DD-entry-hand-tag.md
    with GREEN/YELLOW/RED verdict. Gate 2 fires if needed."
  - "Gate 4 surface at docs/design/surfaces/hand-tag-for-review.md
    specifying: affordance placement (recommended: CommandStrip
    secondary row), tap interaction (single-tap toggle), optional note
    affordance (long-press), storage shape (hand record vs new store),
    Review Queue surface (recommended: SessionsView filter chip), untag
    UX, accessibility (one-handed thumb reach in landscape 1600×720)."
  - "Tag affordance is ONE TAP during action entry — no modal, no
    confirmation, no sub-menu. Test: Playwright records action sequence,
    taps tag, taps tag again (untag), end-to-end < 500ms each tap."
  - "Tagged state persists across page reload + session-end + app-restart
    (IDB-backed). Test: tag a hand, reload, hand still shows as tagged
    in Review Queue."
  - "Review Queue surface: tagged hands appear sorted by tagged-at
    descending. Optional: filter by note-present vs note-absent."
  - "Schema migration: new field on existing hand record is additive;
    must conform to Refactor Sprint Item 3 migration registry pattern
    (`migrationRegistry.js` gets v26 entry — additive only, no destructive
    operations, owner.program='design'). If owner picks separate store,
    same rules apply with new store registration."
  - "Tests: tag toggle, persistence across reload, Review Queue filter,
    untag from queue, untag from replay surface."

