description: |
  **Auto-reconnect after extension heartbeat timeout**

  Surfaced by WS-082 (MT-62 offline-fallback verification, 2026-06-13). The analysis
  pipeline degrades gracefully on mid-session extension disconnect — no data loss, no
  hard failure (see audit doc below). The one gap: after the 120s heartbeat timeout
  (`useSyncBridge.js` HEARTBEAT_TIMEOUT) there is no automatic reconnect attempt, so the
  user must manually reload the page to resume live capture.

  Add an auto-reconnect / exponential-backoff attempt after heartbeat timeout so live
  capture resumes without a manual page reload. UX-convenience improvement, not a
  resilience defect — the app stays fully usable while disconnected.
accept_criteria:
  - "After HEARTBEAT_TIMEOUT fires, the app attempts to re-establish the app-bridge port / re-request STATUS automatically (e.g. exponential backoff) rather than requiring a manual page reload."
  - "On successful reconnect, isExtensionConnected flips back to true and queued hands flush without user action."
  - "Backoff does not thrash (capped interval) and does not interfere with the existing 3-failure circuit breaker."
