status_note: |
  Authored 2026-05-12 from owner session-issue extension. CLASS of bugs,
  not a one-off — getFirstActionSeat is a load-bearing predicate consumed
  by 10 files. Owner flagged that multi-seat semantics also need first-
  principles thinking (M1/M2/M3 above).

  Bug-fix exempt from Refactor Sprint 'no new features' charter. Cross-
  references Invariant Coverage Program — any matrix row whose 'first
  action seat' disagrees with getFirstActionSeat output is a pinned_bug
  for that program too.

  Couples with WS-182 (primitive-collapse): the multi-seat batch helpers
  in useGameHandlers (checkAround / restFold) will migrate to
  recordSeatAction in WS-182; this WS clarifies what multi-seat MEANS
  before that migration so the new API has a sound contract.
