decision_flags:
  # RATIFIED 2026-05-12: M2 batch-pending / sequential entry. User-built
  # multi-seat is a queue; tapping an action records for the FIRST seat
  # in the queue and advances. Separate concept from "rest" batch helpers
  # (checkAround / restFold) which operate on REMAINING-UNACTED-SEATS and
  # bypass user-selection entirely.
  # RATIFIED 2026-05-12: Telemetry-first. WS scope splits into two phases:
  # Phase 1 (this WS) — instrument useAutoSeatSelection + getFirstActionSeat
  #   with development-mode logging on every firing. Ship + close phase.
  # Phase 2 (follow-up WS, created when owner captures observations) —
  #   root-cause each observed wrong-selection case from captured logs.
  # Hypothesis-first matrix audit remains AVAILABLE as a fallback if
  # telemetry observations are sparse or ambiguous after ~2-3 live sessions.
  - "Override-vs-respect for user-built multi-seat selection: under M2 this becomes binding — autoselect MUST NOT override a non-empty user-built queue. Only set selectedPlayers when current set is empty AND the user has not built a queue manually. Owner ratifies (recommendation: respect)."
  - "Queue-advance behavior on cancel: if user cancels mid-queue (e.g., taps the same seat to remove from queue), does the queue stay intact or reset? Recommendation: stays intact (cancel only that seat); reset is via explicit clear."
  - "Queue ordering: canonical action order (UTG → ... → BB) vs user-tap order vs explicit reorder? Recommendation: canonical action order — matches how the user thinks about who acts next."

