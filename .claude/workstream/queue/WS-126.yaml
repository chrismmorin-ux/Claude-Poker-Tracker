description: |
  `src/utils/persistence/__tests__/postflopDrillsStorage.test.js > postflopDrillsStorage > saves and loads drill attempts for a user`
  fails when the full unit project runs but passes when run in isolation.

  Repro:
    - **Passes:** `npx vitest run --project unit src/utils/persistence/__tests__/postflopDrillsStorage.test.js` → 6/6 in 12ms
    - **Fails:** `npx vitest run --project unit` → 1 failure in this test (others all pass)

  Surfaced 2026-05-01 during SPR-005 close-out. Was MASKED before WS-124 fixed
  the migrationV21 hangs (the entire test file used to time out at 116s, which
  changed worker-thread execution timing enough that this race didn't trigger).

  This is the SAME CLASS of bug as WS-124 — cross-test IDB state pollution —
  but in a different file with different shape:
    - WS-124: held DB connection from prior test blocked subsequent deleteDatabase
    - WS-126 candidate: postflopDrillsStorage uses the per-test
      `globalThis.indexedDB = new IDBFactory()` swap pattern (which is the
      RECOMMENDED isolation pattern, not the buggy pattern). So the leak is
      upstream — likely either:
        (a) Another test file in the same worker thread captures `indexedDB` at
            module-import time (closure) and operates against the OLD factory
            after postflopDrillsStorage swaps the global
        (b) A vitest `pool: 'threads'` ordering issue where two test files in the
            same thread interleave their per-test setup
        (c) `resetDBPool()` doesn't clear something it should (e.g., a cached
            transaction or pending promise) that survives the IDBFactory swap

  Triage scope: identify which test or module pollutes postflopDrillsStorage's
  IDB state. Out of scope: any structural rewrite of the persistence test
  isolation strategy.
