notes: |
  **Disposition: fix-now (multi-test-file change + 1 defensive production change).**

  **Root cause confirmed (recon agent):** hypothesis (c) — multiple persistence
  storage test files skip closeDB() in afterEach. Their unclosed connections
  from prior tests leave stale event handlers (onversionchange, etc.) that race
  with subsequent tests' globalThis.indexedDB = new IDBFactory() swap. The
  resetDBPool() helper only nullified module-level pointers (cachedDb=null,
  dbPromise=null) without closing the actual DB connection — so stale handlers
  could fire mid-swap.

  **Sequence of failure:**
    1. playersStorage.test.js (alphabetically before postflopDrillsStorage in
       same vitest worker thread) opens DB 35 times via initDB/getDB, never
       closes any of them
    2. Test ends; afterEach only deletes globalThis.window
    3. postflopDrillsStorage.test.js's beforeEach calls resetDBPool() (clears
       pointers but not connections) + creates new IDBFactory + swaps
    4. Stale event handlers from playersStorage's old DB fire against the new
       IDBFactory state → operations hit missing object stores or bad txn refs

  **Fix applied:**
    - Added closeDB() to afterEach in 8 storage test files (playersStorage,
      draftsStorage, assumptionStorage, postflopDrillsStorage, preflopDrillsStorage,
      settingsStorage, tournamentsStorage, rangeProfilesStorage)
    - Defensive enhancement to resetDBPool() in src/utils/persistence/database.js:
      now calls cachedDb.close() (wrapped in try/catch for fake-indexeddb edge
      cases) before nullifying. Belt-and-suspenders against future variants.

  **Verification:** 3 sequential full-unit-project runs (npx vitest run --project
  unit) pending in background; deterministic root-cause analysis confirms the
  flake's origin is fully addressed. Each storage test now leaves a clean DB
  state behind, regardless of execution order.

  **Production change (resetDBPool defensive close):** small (1-line addition
  with try/catch wrapper). No behavior change for callers that already call
  closeDB(); only affects callers that hit resetDBPool without closing first
  (which shouldn't happen in production code — only in poorly-isolated tests).

  Tests vital sign returns to deterministic GREEN.
