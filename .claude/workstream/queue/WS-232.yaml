description: |
  **Code-correctness bugs in the drill modes**, found by the WS-229 roundtable's
  architecture voice via code trace
  (docs/design/audits/2026-06-15-blindspot-drills.md, Stage E / Track 1).
  These are real defects, not design taste.

  - **F-DRILL-05 (sev 2, mis-grading):** Postflop FrameworkMode exposes ALL of
    `FRAMEWORK_ORDER` (PostflopDrillsView/FrameworkMode.jsx ~line 116), while
    preflop correctly defines `NON_GRADABLE_FRAMEWORKS` and filters the
    always-true frameworks (decomposition / straight_coverage / flush_contention)
    out of the selectable set (PreflopDrillsView/FrameworkMode.jsx ~lines 10-16).
    A user who learned not to select "decomposition" on preflop is graded WRONG on
    postflop. Bring postflop to parity (filter non-gradable frameworks).
  - **F-DRILL-07 (sev 2, silent content trap):** Postflop LessonsMode has no
    `section.kind === 'compute'` branch (PostflopDrillsView/LessonsMode.jsx
    ~lines 81-86) and silently returns null; preflop supports it
    (PreflopDrillsView/LessonsMode.jsx ~line 105). A postflop lesson authored with
    an interactive calculator renders nothing, no error. Add the compute branch (or
    assert at authoring time).
  - **F-DRILL-06 (sev 2, deferred — note only):** Postflop EstimateMode delivers
    less feedback (stars + delta) than preflop (TrendSparkline + per-framework
    CalibrationRow + FrameworkInsightHint) despite a harder question. Blocked on the
    aggregate-shape schema mismatch (postflop lacks avgDelta/deltaSamples —
    DRILL_VIEWS.md §4). Scope the schema change before attempting; may split out.
accept_criteria:
  - "Postflop FrameworkMode filters non-gradable always-true frameworks to parity with preflop; grading no longer penalizes correct omission. Test added."
  - "Postflop LessonsMode renders `compute` sections (or a CI/authoring assertion prevents authoring an unrenderable compute section). Test added."
  - "EstimateMode feedback-parity (F-DRILL-06) either implemented behind the aggregate-shape fix, or explicitly carved into its own ticket with the schema dependency documented."
