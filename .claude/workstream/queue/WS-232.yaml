status_note: |
  Code-correctness track from WS-229 roundtable. EXECUTION REFRAMED after code verification (SPR-134):
  - F-DRILL-05 (DONE, narrowed): the audit's "exclude all always-true frameworks to parity" would
    break 21/33 scenarios (only 12 carry an opposing range; on the other 21 the always-on frameworks
    are the ONLY gradable content). Correct non-breaking fix shipped: exclude ONLY `range_decomposition`
    (sole subcase 'always', zero discrimination, exact analog of preflop's excluded `decomposition`).
    range_morphology/whiff_rate/board_tilt retained (load-bearing for single-range scenarios; no
    cross-view analog). Their always-select degeneracy → design-track question (noted in WS-230 scope).
    Filtered picker + truth set; 3 regression tests added.
  - F-DRILL-07 (DONE, downgraded): the silent compute-drop is ALREADY guarded at authoring time by
    the existing lessons content test (valid-kind set = prose/formula/example). Added a visible
    defense-in-depth fallback so an unsupported section never renders empty. Not the live sev-2 trap
    the audit implied.
  - F-DRILL-06 (DEFERRED): EstimateMode feedback parity stays blocked on the aggregate-shape schema
    mismatch (DRILL_VIEWS.md §4); tracked in the WS-229 audit Track 3. Promote when schema work is scheduled.
  Verified: 638 postflop drill tests pass; production build clean. Commits reference docs/design/audits/2026-06-15-blindspot-drills.md."
