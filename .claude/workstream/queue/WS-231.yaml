description: |
  **Corrective (just-do-it) follow-ups from the WS-229 drills roundtable**
  (docs/design/audits/2026-06-15-blindspot-drills.md, Required Follow-ups Track 1).
  No founder decision needed — these resolve drift, a UX safety gap, and a
  consistency violation.

  - **F-DRILL-01 (sev 1):** Correct docs/design/surfaces/postflop-drills.md — the
    Pre-Session section presents a feature-flagged-off mode (ENABLE_PRESESSION_DRILL
    = false; no PreSessionMode.jsx exists) as if shipped, with full anatomy/state
    machine. Flag it as gate-pending. Also add `returning-after-break` to the
    Personas-Served list (currently omitted despite claimed applicability) and add
    a "Product line: main-app only — sidebar N/A" scope line to both drill artifacts.
  - **F-DRILL-02 (sev 1):** Tab-switch protection. Both orchestrators conditionally
    render and unmount on tab change ("tabs are not cross-pinned"), so a fat-finger
    mid-drill silently destroys in-progress state (H-N03 + H-PLT08). Add a warn-on-
    unsaved-progress guard, or preserve/restore per-tab state across switches.
  - **F-DRILL-03 (sev 2):** Diverge false-friend tab labels so the same name stops
    meaning two different interactions across views (H-N04). Minimum: preflop
    Explorer → "Equity Lookup"; postflop Explorer → "Range Lab" (matching its own
    artifact section). Low code cost.
accept_criteria:
  - "postflop-drills.md Pre-Session section clearly marked feature-flagged-off / gate-pending, not shipped; returning-after-break added to Personas Served; sidebar-N/A scope line added to both drill artifacts."
  - "Tab switch no longer silently destroys in-progress drill state — either a warn-on-unsaved-progress guard or per-tab state preservation, with a test."
  - "False-friend Explorer labels diverged (preflop Equity Lookup / postflop Range Lab); change log + any nav references updated."
