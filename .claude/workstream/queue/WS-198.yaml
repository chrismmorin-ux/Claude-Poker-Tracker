description: |
  Phase-0 engineering prerequisite for PSD's DS-57 (recency-weighted drill
  selection from recent leaks). Surfaced in Gate 1 Discovery 3 and
  reaffirmed by Gate 2 Stage D-P1.

  Today: docs/upper-surface/ has 15 reasoning artifacts; each is keyed by
  a node-ID (e.g., "btn-vs-bb-3bp-ip-wet-t96-flop_root"). The IndexedDB
  `hands` store records actions per hand but has NO cross-reference to
  upper-surface node-IDs. DS-57's recency-weighting algorithm needs to
  answer "which artifacts did the user's last N hands pass through and
  fail / succeed at?"

  Two schema decisions absorbed into this ticket (or split into a
  sub-ADR if owner prefers):
    - **Schema-write**: tag each new hand at write-time with matching
      node-IDs. O(node-IDs × matching-cost) on hand write; cheap query.
      Historical hands need backfill migration OR recency-weighting is
      forward-only.
    - **Query-time match**: no schema change; cross-reference at drill
      open. Zero migration; higher query cost (~15 node-matchers × ~last-
      session N-hand sample).

  Estimated 200-300 LOC per Gate 1. Includes:
    - node-matching logic (input: hand record; output: list of matching
      node-IDs with confidence/strength)
    - aggregate query (input: time window + persona context; output:
      ranked node-ID list with hit-count and recency)
    - tests (unit on matcher, integration on aggregate query)
    - IDB schema migration if schema-write path chosen

  Does NOT block Gate 4 design surface (WS-199). Does block PSD's actual
  recency-weighted selection function shipping with v1.
