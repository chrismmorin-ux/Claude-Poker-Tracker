description: |
  Sprint 2 of 5 in the Invariant Coverage Program. Authors a matrix-fixture
  audit for OnlineView.jsx — the highest-blast-radius UI surface per
  reconnaissance (zero tests, owns sidebar visibility gates per CLAUDE.md;
  failure library names sidebar bugs as the cause of 4 doctrine programs).

  All 8 decision points scoped:
    1. Connection-status indicator (isExtensionConnected → green dot + label)
    2. Version-mismatch banner (versionMismatch → render OR null)
    3. Sync-error banner (syncError → render OR null)
    4. Session selector (onlineSessions.length > 1 → render OR null)
    5. Empty-state branching (handCount === 0 && !isLoading → render with isExtensionConnected deciding copy + CTA)
    6. Main-content gate (handCount > 0 → render SeatGrid + maybe SeatDetailPanel)
    7. Detail-panel visibility (selectedSeatData → render panel)
    8. Importing state (isImporting → disabled button + "Importing…" copy)

  AUDIT-ONLY: zero production code changes. Bug fixes happen in follow-up sprints.
