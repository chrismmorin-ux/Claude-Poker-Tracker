category: "domain-correctness"
capability: "core"
program: "domain-correctness"
description: |
  traitDetector.js detectPositionallyAware gates on earlyOpp < 5 || lateOpp < 5,
  then compares raw frequentist open rates Math.round((earlyOpens/earlyOpp)*100)
  and triggers the "positionally aware" trait on lateOpenPct > earlyOpenPct * 1.5.
  With n as low as 5, one extra open swings the percentage 20%+, producing
  false-positive trait flags that are fed downstream into the exploit engine.

  This directly violates the rangeEngine/CLAUDE.md rule "DO NOT apply generic
  z-tests / use frequentist ratios" and POKER_THEORY §6.5 (Bayesian confidence).
  Source: domain-correctness delta run 2026-06-20; finding FIND-011 (baseline 2026-05-01).
accept_criteria: |
  - detectPositionallyAware uses a pairwise Beta-posterior difference (P(LP rate >
    1.5x EP rate) > 0.85 threshold) instead of a raw ratio comparison.
  - The 5-hand floor is folded into the prior (STAT_PRIORS) rather than a hard gate.
  - Existing traitDetector tests pass; add a test asserting a 5-vs-5 sample does NOT
    fire the trait (regression against the false-positive class).
  - No new POKER_THEORY divergence; build clean.
