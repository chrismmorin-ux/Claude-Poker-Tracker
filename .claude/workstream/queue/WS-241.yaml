completion_note: |
  Replaced detectPositionallyAware's raw frequentist ratio with a two-rate Beta-
  posterior comparison: posterior = P(LP open rate > 1.5x EP open rate), computed by
  exact quadrature over the lower posterior's quantile bins (no normal/z approx).
  A firm Beta(6,24) RFI prior (pseudocount 30) replaces the hard n<5 gate — small
  samples shrink toward 0.5 and stay below the >0.5 detection gate; verified the
  FIND-011 one-extra-open-at-n=5 swing no longer flips the verdict (0.37→0.47, both
  <0.5) while a real n=20 10%-vs-50% spread fires at 0.79. Beta primitives extracted
  to new src/utils/pokerCore/betaMath.js (single source; rangeEngine cannot import
  exploitEngine), re-exported from bayesianConfidence.js (API unchanged for all 13
  importers). Tests: traitDetector +2 cases (small-noise no-fire + sustained-spread
  fire); 3,430 exploitEngine tests + 59 range/confidence tests green; build clean.
