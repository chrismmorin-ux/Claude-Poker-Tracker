  - "Smart-test-runner full-suite green; rangeEngine + exploitEngine subsuites unaffected (this is read-only consumption of engine outputs)"
  - "Charter `.claude/projects/predictive-model-calibration.md` Phase 5a row updated to reflect WS-178 close-out (predictedDistribution now populated)"

