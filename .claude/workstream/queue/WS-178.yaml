description: |
  PMC Phase 5a-2 deliverable per charter (`.claude/projects/predictive-model-calibration.md`
  §Phase 5a). Authored 2026-05-10 at SPR-068 close-out as the explicit
  follow-up for predictedDistribution engine-query population.

  Background (SPR-068 / WS-177 close-out):
    Phase 5a shipped the substrate (IDB v25 + writer + reconstructor +
    AP-PMC-04 enforcement + observedAction extraction). `reconstruct.js`
    returns `predictedDistribution: []` today — a structurally-valid empty
    array. Per-decision-node engine queries were intentionally split off
    the primitive ticket to keep WS-177 substrate-clean (Q1 ratified
    post-hoc reconstruction; engine integration is its own design problem).

  Scope:
    Extend `src/utils/predictionAudit/reconstruct.js` so that
    `predictedDistribution[]` is populated with one entry per modeled
    decision-node within the hand:
      - **Villain decision-nodes**: query rangeEngine for the model's
        belief about that villain's action distribution at that node
        (given current RangeProfile + position + street + facing-action
        context). Reuse `src/utils/rangeEngine/rangeAccessors.js`
        (`getVillainRange`, `getVillainActionKey`) — no new range-engine
        math required.
      - **Hero decision-nodes**: query exploitEngine `evaluateGameTree`
        for the model's recommended hero policy at that node (ranked
        actions with EVs → normalized to a soft policy distribution).
        Reuse the function in stateless mode (it already accepts a
        snapshot).

  Each entry shape per charter §Architectural primitives:
    {
      actor: 'villain' | 'hero',
      actorId: string | number,
      seat: number,
      distribution: [{ action: string, weight: number, sizing?: number }]
    }

  Distribution must sum to 1.0 ± epsilon (pin via test). Empty
  distribution is valid for nodes the model cannot evaluate (record as
  `distribution: []` rather than omitting the entry, so the entry
  count still maps 1:1 to modeled decision-nodes).

  Cross-references:
    - PMC charter §Phase 5a (this is the deferred portion)
    - WS-177 (parent ship; this extends `reconstruct.js`)
    - SYSTEM_MODEL §11 — FM-Engine-Drift-Silent-Invalidation (this work
      narrows the gap further by populating the predictedDistribution
      side; doesn't fully close it — see WS-174 for residual)

  Out of scope (Phase 5b / separate tickets):
    - Render surface (HandReplay ReviewPanel display of
      predictionAudit) — Phase 5b ticket TBD
    - Backfill of predictedDistribution for legacy hands (Q2 ratified
      forward-only at WS-177; charter calls backfill "trivial" but
      consumer-driven)
    - Aggregate slicing surfaces (currently no aggregate consumer per
      REPLACEMENT scope)

