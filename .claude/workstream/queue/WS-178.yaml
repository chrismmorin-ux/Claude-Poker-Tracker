status_note: |
  RESOLVED 2026-05-10 SPR-070. Phase 5a-2 shipped: reconstruct.js made async +
  accepts deps={ isModeledNode, getRangeProfile, evaluateGameTree }.
  Hero decision-nodes get softmax-normalized policy from evaluateGameTree;
  preflop villain decision-nodes get action distribution from rangeProfile
  per-action grid sums (reuse rangeAccessors.getVillainRange — no new engine
  math). Postflop villain remains distribution:[] per D3=A. Engine context
  plumbed via <EngineCtxBridge/> (D1=A ref-getter pattern) inside
  TendencyProvider; usePersistence reads via engineCtxGetterRef at hand-save
  time. +18 net tests (31 reconstruct + 18 usePersistence vs prior 16+15);
  full-suite 10765 pass / 20 skip / 9 pre-existing flakes in unrelated
  working-tree files; build clean. Backward-compat preserved: callers
  without deps still get predictedDistribution: [] (Phase 5a behavior).

  Founder ratifications (pre-plan-mode, 2026-05-10):
    D1=A ref-getter bridge — over prop-drill or context-relocation
    D2=C configurable predicate — default = first betting action per seat per street
    D3=A record `distribution: []` and continue — preserves 1:1 entry-count alignment

  Out of scope this ship (deferred):
    - Postflop villain action distributions (need villainDecisionModel/
      actionRates from gameTreeContext) — Phase 5a-3 candidate if consumer
      demand emerges
    - Production hero-snapshot construction for evaluateGameTree input —
      currently best-effort and a known weak spot; tests inject mocked
      evaluateGameTree to verify softmax pipeline
    - Render surface (Phase 5b, Gate 4 design-deferred)

