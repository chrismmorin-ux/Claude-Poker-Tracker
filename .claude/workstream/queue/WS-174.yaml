description: |
  Placeholder ticket capturing Devil's-Advocate Concern 2 from PMC Gate 2
  (2026-05-09): CFR (counterfactual regret minimization) is the actual
  mathematical answer to "is my exploit recommendation right." Bayesian
  frequency-matching is a politically-acceptable substitute that confirms
  the model's own assumptions.

  Specifically: a model with correct frequencies and wrong sizing-conditional
  ranges produces NO aggregate signal but bleeds EV. PMC under REPLACEMENT
  scope (predictionAudit per-hand IDB field, decided 2026-05-09 SPR-065)
  detects frequency-level mismatches but does NOT close FM-COMP-01
  (range-composition vs frequency decoupling) — the same critique sharpened.

  Charter ratification #6 (CFR deferred indefinitely) STANDS at Gate 2
  close-out (2026-05-09) but with a formal trigger condition: if
  predictionAudit observation produces evidence of EV-bleeding patterns
  where frequency calibration is intact (the FM-COMP-01 signature), this
  ticket is the designated revisit.

  This ticket does NOT initiate CFR work. It exists so the concern is
  trackable rather than buried in a charter footnote.
accept_criteria:
  - "Verdict logged: EITHER 'CFR work warranted' (which would spawn its own program-level Gate 1 audit) OR 'CFR continues to be deferred' (with explicit evidence that predictionAudit data does not show FM-COMP-01-style sizing-conditional bleeding)."
  - "Verdict references concrete predictionAudit data slices (≥1000 captured hands across ≥3 modelVersion epochs)"
  - "Verdict updates charter §Decisions ratified ratification #6 to reflect the revisit's outcome"
trigger_condition: |
  Re-evaluate when ANY of:
    1. predictionAudit captures ≥1000 hands AND aggregate frequency-match
       rate >0.85 AND realized hero EV (from existing hands.evRealized) is
       persistently below model-expected EV
    2. A new sizing-conditional range model is proposed for range-engine
       (separate from current sizing-binned tendencies)
    3. Range-engine update path (RANGE_ENGINE_DESIGN §4.5) produces evidence
       that showdown-driven Bayesian updates correlate with sizing-bin
       drift more than action-frequency drift
