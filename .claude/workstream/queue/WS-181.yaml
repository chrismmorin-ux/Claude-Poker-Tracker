description: |
  Spike a voice-driven card entry path for board cards (flop / turn / river) and
  villain showdown cards. Goal: discreet, hands-on-phone-but-eyes-off entry at a
  live table — owner holds the device near mouth, press-and-holds a button, says
  "ace of hearts, jack of spades, …", releases, sees parsed cards as confirmation
  chips, single-tap commits.

  Problem: current card-entry flow requires staring at the phone in landscape for
  ~10-15 seconds per board, which (a) breaks table presence, (b) telegraphs that
  the owner is recording, (c) is slow enough that hands sometimes go unrecorded
  when action moves fast.

  Tech direction (founder-ratified 2026-05-11):
  - **Web Speech API only.** Free, on-device, zero infra. Push-and-hold model
    (release → parse). NO cloud transcription, NO Whisper escalation. If the
    Web Speech path is too noisy for live-table use, the feature is dropped, not
    upgraded — this is a ship-or-drop spike, not a multi-stage investment.
  - Constrained parser maps phonetic variants of the 17-word card vocabulary
    (13 ranks + 4 suits + "of") to cards. "ace o hearts" / "ace hearts" /
    "ace of harts" all snap to A♥.
  - Confirmation UX is load-bearing: parsed cards render as chips before commit;
    one tap commits, one tap corrects an individual card.

  Scope (in):
  - Board card entry (3 flop + 1 turn + 1 river surface paths)
  - Villain showdown card entry (2 cards per villain)

  Scope (out, do NOT expand without re-ratification):
  - Hero hole cards (owner is already looking at phone for these)
  - Action entry (bet sizes, raises, folds) — separate, much larger problem
  - Player names / nicknames / any free-form input

  Gate framework path:
  - Gate 1 (Entry audit) — REQUIRED before any code. Owner-as-player is sole
    persona; JTBD is "enter recently-revealed cards without breaking table
    presence." Gap analysis must classify GREEN / YELLOW / RED vs existing card
    pickers. Output: docs/design/audits/YYYY-MM-DD-entry-vce.md
  - Gate 2 (Blind-Spot Roundtable) — TRIGGERED if Gate 1 is YELLOW/RED OR if
    audit surfaces a new surface / crosses product lines. Voice is a new
    interaction modality → likely YELLOW minimum. If triggered, run before spec.
  - Gate 4 (Design surface) — REQUIRED. docs/design/surfaces/voice-card-entry.md
    must specify: push-to-talk affordance placement (per surface), parser
    grammar table, confirmation UX, mic-permission flow, denial-recovery flow,
    iOS-Safari fallback behavior, feature-flag gate, and KILL CRITERIA (see
    accept_criteria below).
  - Gate 5 (Implementation) — Spike behind a feature flag (Settings toggle,
    OFF by default). Owner validates at ≥1 real live session. Kill/keep
    decision recorded as a /decide ADR.

  Founder ratifications binding:
  - R1: Web Speech only. Whisper / cloud transcription NOT in scope for this
    workstream or any follow-up unless explicitly re-opened.
  - R2: Scope locked to board + villain showdown. Hole cards and actions are
    OUT.
  - R3: Ship-or-drop spike — no incremental "make it 5% better" follow-ups if
    the live-table validation fails kill criteria.

accept_criteria:
  - "Gate 1 audit at docs/design/audits/YYYY-MM-DD-entry-vce.md with GREEN/YELLOW/RED
    verdict. If YELLOW or RED, Gate 2 Blind-Spot Roundtable artifact at
    docs/design/roundtables/YYYY-MM-DD-blindspot-vce.md."
  - "Gate 4 surface artifact at docs/design/surfaces/voice-card-entry.md
    specifying: PTT button placement per entry surface (state-aware render
    predicates per Gate 2 E-5), parser grammar (full phonetic-variant table
    for 13 ranks × 4 suits + 'of' + 9 villain tokens 'player one'..'player nine'
    + 2 sequence separators 'next player' / 'and then' per Gate 2 SC-7
    owner-ratified extended-grammar decision; explicit 'player ten' vs rank
    'ten' collision-resolution rule), confirmation chip UX with swipe-to-cycle
    rank correction (per Gate 2 SC-10 owner-ratified revision; long-press for
    full re-pick), mic-permission grant + denial-recovery flows, iOS-Safari
    fallback (silently disable if Web Speech unavailable — confirm at Gate 4
    review), feature-flag name + default, PTT hold threshold ≥300ms (E-3),
    audio-feedback OFF for spike (E-2), PTT visual treatment with no animation
    (E-1), abort-without-side-effects path satisfying HE-NEW-VCE-03 (strict
    no-op on blank/sub-0.5s utterance per Gate 2 SC-3 owner-ratified binding)."
  - "Kill criteria explicitly enumerated in the surface doc, e.g.:
    (a) per-card accuracy ≥ 90% at typical poker-room SPL (~70-75dB),
    (b) end-to-end entry (PTT-hold → commit) faster than current tap baseline
        on ≥80% of trials,
    (c) misheard card correctable WITHOUT re-entering the full board;
        correction requires ≤2 deliberate user actions (revised from
        '≤1 tap' per Gate 2 SC-10 ratified 2026-05-11 — unachievable with
        any standard picker flow), implemented as swipe-up/down on chip
        cycles through 12 other ranks in same suit; full re-pick via
        long-press fallback,
    (d) zero false-commits (chips inert until explicit commit tap;
        no auto-commit on confidence threshold or timer expiry).
    Actual thresholds set by owner during Gate 4 review."
  - "Spike implementation behind Settings feature flag (OFF default). Surfaces:
    board entry (flop/turn/river) + villain showdown card entry. NO other
    surfaces."
  - "Real-table validation by owner at ≥1 live session. Findings documented in a
    /decide ADR with verdict: SHIP (flag stays, default ON) / KEEP-OFF (flag
    stays, default OFF, owner-opt-in only) / DROP (rip out)."
  - "If DROP: code removed in the same workstream, surface doc archived with
    post-mortem appended, /decide ADR records what failed and why Whisper
    escalation is still out of scope."
  - "Domain-correctness program: zero impact on engine code paths
    (src/utils/exploitEngine/, rangeEngine/, pokerCore/). VCE is input-layer
    only."

