      multi-villain grammar, SC-10 correction kill criterion, E-5 state-aware
      render predicates).
    - Owner ratifications 2026-05-11 at Gate 2 close (binding for Gate 4):
        R4 — Correction UX: swipe-up/down on chip cycles 12 other ranks in
             same suit. Long-press for full re-pick fallback. Kill criterion (c)
             revised to "≤2 deliberate user actions" (was "≤1 tap" — unachievable).
        R5 — Multi-villain grammar: EXTENDED grammar with 9 villain tokens
             ("player one".."player nine") + 2 separators ("next player" /
             "and then"). Single PTT hold covers multi-villain showdown.
             Collision-resolution rule: "ten" is a villain ONLY if preceded by
             "player", else it is the rank. Parser variable-length output.
        R6 — Blank-utterance: strict no-op binding for Gate 4. Parser
             pre-conditions for chip render: transcript.length > 0, duration
             >= 0.5s, confidence >= owner-set threshold, ≥1 card parsed.
             Failure path: no chip render, no spinner, no error toast.
    - JTBD updates (Gate 2 ratified): HE-NEW-VCE-01 Active, HE-NEW-VCE-03
      Proposed, HE-12 voice-correction sub-flow annotation, HE-16 clarification.
