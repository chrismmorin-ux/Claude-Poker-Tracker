description: |
  Replace the v1 FLOP_MULTIWAY stub with a full multiway model. Multiway
  invalidates HU range-vs-range reasoning — needs its own template family
  with sequential-decision modeling.

  Per docs/HERO_STATE_DESIGN.md §7.4:
    - Multiway breaks HU range/nut-advantage reasoning (which range "owns" the
      flop is ill-defined when 3+ ranges intersect)
    - Sequential decisions cascade — caller(s) condition villains' subsequent
      decisions; treating decisions as independent is wrong
    - Pot-odds dilution — multiway pots inflate calling-range value; bluff
      frequency must drop sharply
    - Capped ranges — caller(s) on flop are typically capped (would have raised
      with the strongest hands preflop), creating asymmetric range advantages

  Likely scope:
    1. Multiway-specific archetype family (replaces single FLOP_MULTIWAY entry):
       - MULTIWAY_SRP_VS_PFR_AND_CALLER  — hero is PFR, both blinds called
       - MULTIWAY_SRP_AS_CALLER_PFR_BEHIND — hero called preflop, PFR yet to act
       - MULTIWAY_SRP_AS_CALLER_PFR_ACTED — hero called, PFR has cbet/checked
       - MULTIWAY_3BP_FLOP                — 3+ players to flop in 3-bet pot (rare)
       - MULTIWAY_LIMP_FLOP               — 3+ players to flop in limped pot
    2. Sequential-decision modeling in equityVsRangeParts — when villain1 acts
       before villain2, villain2's range-given-call conditions on villain1's
       prior action
    3. Bluff-frequency adjustment in plan computation — multiway pot collapses
       bluff EV; templates should reflect this without hardcoding it

  Per first-principles guard: bluff-frequency adjustment should derive from
  equity decomposition + pot odds + players remaining, NOT from a "multiway
  multiplier" hardcoded as a function of player count.

  Update HERO_STATE_DESIGN.md §7.4 with the resolved model design before
  implementing. May spawn additional implementation tickets if scope grows.
