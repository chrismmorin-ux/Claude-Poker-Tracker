status_note: |
  RESOLVED 2026-05-10 SPR-068. PMC Phase 5a primitive shipped:
    - IDB v25 migration (additive predictionAudit:null on legacy hands,
      forward-only per Q2 ratification)
    - src/utils/persistence/predictionAuditWriter.js (composeModelVersion +
      sanitizePredictionAudit + writePredictionAudit + readPredictionAudit)
      with AP-PMC-04 schema-level enforcement (hero observedAction entries
      lose evRealized at writer)
    - src/utils/predictionAudit/reconstruct.js (pure utility extracting
      observedAction[] from actionSequence; predictedDistribution[] left
      empty for WS-178 follow-up)
    - usePersistence wires reconstructPredictionAudit + sanitize inline
      before saveHand — predictionAudit field is atomic with hand record
    - 42 new tests (migrationV25 6 + predictionAuditWriter 20 + reconstruct
      16); 10756/10776 full smart-test-runner pass (zero regressions)
    - Build clean (12.31s, PWA 66 entries)

  Decision_flags ratified upfront: Q1 post-hoc reconstruction at hand-end,
  Q2 forward-only no backfill, Q3 composed range-${PROFILE_VERSION}+engine-
  ${ENGINE_VERSION} (currently range-3+engine-v123).

  WS-178 authored at close-out for Phase 5a-2 (predictedDistribution
  engine-query population). Phase 5b (render surface) remains unticketed
  pending Gate 4 design.

