description: |
  PMC Phase 5a deliverable per charter (`.claude/projects/predictive-model-calibration.md` §Phase 5).
  Authored 2026-05-10 in SPR-067 reconcile sweep — charter named the work
  ("~0.5-1 session, separate WS ticket") but no ticket existed in queue.

  Under REPLACEMENT scope (SPR-065), `predictionAudit` per-hand IDB field
  IS PMC. The full ledger / hierarchical aggregator / expanded calibration
  dashboard architecture was cancelled. This ticket ships the primitive.

  Scope (charter §Phase 5a):
    - IDB migration: add `predictionAudit` field on `hands` records (no new
      store needed — schema bump only)
    - `predictionAuditWriter.js` API:
        writePredictionAudit(handId, { predictedDistribution, observedAction, modelVersion })
    - Hand-end orchestrator wiring: collect prediction at decision-time,
      write at hand-end. Captures per-actor (hero + villain) entries.
    - Read API: `readPredictionAudit(handId)` returning the field
    - Tests + smoke fixture
    - **AP-PMC-04 schema-level enforcement**: drop `evRealized` at write
      for hero entries (don't depend on copy discipline; enforce at the
      writer layer so the field is structurally absent for hero rows)

  Schema (charter §Architectural primitives):
    interface PredictionAuditField {
      predictedDistribution: {
        actor: 'villain' | 'hero'
        actorId: string                                  // playerId or 'hero'
        seat: number
        distribution: Array<{action, weight, sizing?}>   // model output at decision-time
      }[]
      observedAction: {
        actor: 'villain' | 'hero'
        actorId: string
        seat: number
        actionTaken: string
        sizing: number?
      }[]
      modelVersion: string                               // semver of engine bundle
      // AP-PMC-04: evRealized NOT captured for hero entries (schema-enforced).
    }

  Cross-references:
    - PMC charter §Phase 5a + §Architectural primitives
    - AP-PMC-04 (charter §Anti-pattern refusals) — hero-grading framing
    - AP-PMC-06 (charter §Anti-pattern refusals) — variance-blame copy
      (binds Phase 5b render surface, not this ticket; documenting here so
      Phase 5b doesn't lose the reference)
    - Q1 (storage budget) — trivial: ~1KB × 10K hands/year = ~10MB/year
    - Q3 (backfill) — trivial: existing hands re-runnable through engine
      to bootstrap field; tag backfilled rows with `historicalReplay: true`
      to distinguish from forward-captured

  Out of scope (Phase 5b — separate ticket):
    - Render surface (HandReplay ReviewPanel or wherever Gate 4 lands)
    - Per-hand display copy (AP-PMC-06 enforcement at component level)
    - Pre-registration registry consumer wiring (registry stub already
      shipped at `docs/projects/predictive-model-calibration/registered-hypotheses.md`)

