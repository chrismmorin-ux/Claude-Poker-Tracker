description: |
  **Bug confirmed in code.** Owner observed during 2026-05-11 session that
  showdown cards remain selectable on a seat that has been marked Won (and
  possibly Muck — needs reproducer confirmation; see decision_flags).

  Root cause: `src/components/views/ShowdownView/ShowdownSeatRow.jsx:40`:

      const canInteract =
        mode === 'selection'
        && inactiveStatus !== SEAT_STATUS.ABSENT
        && !isMucked;

  The guard does NOT check `hasWon`. A seat marked Won (green border, diagonal
  overlay) still has `canInteract === true` and its card slots accept
  `onHighlightSlot` callbacks. Visually the cards look final; functionally
  they're still editable.

  Muck case: the line above DOES block `!isMucked` — so mucked seats should
  reject card edit. Owner's muck observation may be a separate path (long-press,
  context menu, or summary mode); needs reproducer.

accept_criteria:
  - "Add `&& !hasWon` to the canInteract gate at ShowdownSeatRow.jsx:40."
  - "Confirm mucked-seat behavior: verify no alternative path (long-press,
    context menu, ShowdownView parent dispatch) allows card edit when
    `inactiveStatus === MUCKED`. If reproducer found, include in same fix."
  - "Test: ShowdownSeatRow render with `hasWon={true}` — tapping card slot
    does NOT invoke onHighlightSlot. Same for `isMucked={true}`."
  - "Visual verification at 1600×720: winning seat's CardSlot has cursor:default
    (or whatever the non-interactive variant is), no hover/tap highlight."

