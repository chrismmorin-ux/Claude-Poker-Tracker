description: |
  Three Monte-Carlo equity tests intermittently fail in full-suite unit-project
  runs. All three are equity-band assertions over MC sampling and fail
  stochastically (typically 1-of-3 frequency in triple runs).

  Failing tests (from 2026-05-02 post-WS-133 triple run):
    1. `src/utils/exploitEngine/__tests__/advisorAccuracy.test.js`
       > Equity accuracy — MC vs baseline
       > "AKs vs full range on dry flop — MC within 5% of baseline"
       (Failed 2-of-3 runs)
    2. `src/utils/exploitEngine/__tests__/gameTreeEvaluator.test.js`
       > mixed strategy hints
       > "no mixFrequency when one action dominates"
       (Failed 1-of-3 runs)
    3. `src/utils/postflopDrillContent/__tests__/rangeVsBoard.test.js`
       > rangeVsRangeEquity
       > "AA vs KK on 2-3-4 rainbow — AA ≈ 83%"
       (Failed 1-of-3 runs — already documented as no-action in SPR-005
       Recent Sessions row; see state-archive for context)

  These are a different failure CLASS from WS-126 (cross-test IDB pollution)
  and WS-133 (same-ms-tie sort): MC sampling tolerance + trial count.
  Standard remediation patterns apply — pick one or combine:

    (a) **Tolerance-tighten + raise trials** — keep the assertion shape but
        increase trial count to ≥3000 (per FIND-002 / WS-117 precedent for
        replayAnalysis classifier). 95% MoE at p≈0.5, 500 trials = ±4.4%;
        at 3000 trials = ±1.8%.
    (b) **Seed the RNG per test** — fully deterministic, eliminates flake
        but masks any genuine MC drift. Requires the equity calculator
        to accept a seed parameter (it currently doesn't, by design).
    (c) **Widen tolerance bands** — accept a noisier assertion (e.g. ±7%
        instead of ±5%). Cheapest fix; weakens the test's signal.
    (d) **Monte-Carlo skip pattern** — `it.skip` with named precedent
        (rangeVsBoard already has no-action precedent from SPR-005).
        Last resort.

  Decision needs the owner's call on the trade-off: signal strength vs
  determinism vs runtime cost.

  Out-of-scope: any rewrite of the underlying equity calculator API or
  shift away from MC for these tests.
accept_criteria:
