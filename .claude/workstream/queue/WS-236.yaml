description: |
  _Convergence: anchors DP-008 (live HUD villain stats) to visible attribution — closes FIND-024._

  The highest-stakes surface (live in-hand HUD) has the weakest attribution: raw VPIP/PFR % with no
  sample size, computed by a parallel engine (ignition-poker-tracker/shared/stats-engine.js) that
  bypasses the main-app Bayesian intervals (FIND-001/WS-116). UX-touching → runs the design gates.

  Two parts: (1) show sample size + the DATA/PARTIAL/EST badge pattern (from LiveAdviceBar fold%
  DP-004) on HUD villain stats; (2) reconcile the parallel stats path with the main pipeline, or
  assert numeric parity in tests so the two paths cannot silently diverge.
