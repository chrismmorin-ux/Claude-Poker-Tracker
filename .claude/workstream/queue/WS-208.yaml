description: |
  Mobile-portrait surface variant for Range Lab. Output of SPR-093
  Gate 2 Blind-Spot Roundtable Stage C (C-A1 implicit) + founder Q4
  resolution 2026-05-20.

  Gate 2 Q4 resolution: landscape 1600×720 is v1 baseline; mobile-
  portrait is a separate Gate 4 deliverable so it does not block
  landscape v1 ship.

  **Constraint:** 13×13 paint grid at mobile-portrait compresses cells
  to ~15-18px DOM-px width — below H-ML06 floor of 44. Even with scale-
  aware ergonomics (C-A3), pure-tap paint is non-viable. Two design
  options:
  1. **Grid-zoom modal**: tap a quadrant of the 13×13 to enter a 7×7
     zoomed view; paint inside the zoomed view; exit back to overview.
  2. **Row-paint modal**: present one row at a time (13 cells full-
     width); user advances through rows; less efficient but better
     ergonomics per row.

  Mirrors PSD WS-200 pattern — separate Gate 4 ticket for mobile-
  portrait so landscape v1 ships unblocked.

  Honors [[feedback_portrait_mode_player_screens]] — portrait-native
  reserved for PIO-line identification surfaces; RL is study, so
  mobile-portrait is a *variant*, not the primary mode.

