description: |
  Recognition-search + disambiguation per PIO Gate 4 audit §PIO-G4-PVA
  (lines 297–348) + §PIO-G4-DISAMB (lines 191–236).

  scorePlayerMatch(player, query) returns weighted score [0..1] using:
    - 8-dim weight vector (per audit): 0.35 name + 0.10 age + 0.10 skin
      + 0.10 ethnicity + 0.10 hair + 0.05 jewelry + 0.05 wardrobe +
      0.05 hat + 0.05 logo
    - Per-dim contribution scaled by computeStability() (from WS-160) —
      stable attributes contribute full weight, varying contribute less

  Confidence bar + label rendering per PIO-G4-DISAMB:
    - Strong match: score ≥ 0.7 (green, 7+/10 segments, "strong match")
    - Partial match: 0.4 ≤ score < 0.7 (yellow, 4-7/10, "partial match")
    - Weak match: score < 0.4 (red, <4/10, "weak match")
    - AP-PIO-04 binding: factual labels, never "are you sure?"

  Wires into Table-Build CandidateColumn (when Table-Build Gate 5 ships).
  Filters in PlayersView (from WS-163) feed into the same scorePlayerMatch
  flow.

  Also authors recognition-confidence schema doc for C consumption.
