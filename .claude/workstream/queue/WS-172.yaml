description: |
  Gate 2 Blind-Spot Roundtable for the Predictive Model Calibration program.
  Charter at `.claude/projects/predictive-model-calibration.md`.
  Gate 1 Entry audit (RED verdict) at
  `docs/design/audits/2026-05-09-entry-pmc-prediction-ledger.md`.

  Charter question: "What classes of model error against real player data
  are we likely to encounter, including ones the framework itself cannot see?"

  This is the primary deliverable of Phase 2 of PMC. The output — an
  authored failure-mode taxonomy — is load-bearing for everything
  downstream: every analyzer rule traces to a class in it, and the ledger
  schema (Gate 4) captures the fields needed to detect each class.

  Per founder ratification 2026-05-09: adversarial roundtable refused
  single-pass authored taxonomy as "theory validating theory" — same
  failure mode the program is designed to break. The roundtable IS the
  bypass.

  Five specialist personas + devil's advocate convene. Each enumerates
  failure classes independently in stage outputs, then cross-review.
  Synthesis produces the taxonomy.

  Personas:
    1. Range-engine theorist — Bayesian range model, prior-vs-likelihood
       balance, mixing-weight invariants. *What range errors compound vs
       self-correct?*
    2. Population ecology — Ignition small-stakes specifically; cash vs SNG;
       soft-pool drift over time. *What population-level priors are we
       likely to mis-calibrate?*
    3. Frequentist statistician — sample-size / credible interval /
       multiple-comparisons rigor. *When do we have data to claim a leak vs
       pattern-matching on noise?*
    4. Bayesian inference — hierarchical shrinkage, posterior collapse,
       identifiability. *What aggregation hierarchy gives per-villain
       detection without N=1 false positives?*
    5. Adversary modeler — *what model errors persist undetected?
       Hard-to-falsify failure classes are the dangerous ones.*
    6. Devil's advocate — *when is "the model is wrong" the wrong frame?
       When is deviation correct and data noisy? When does the dashboard
       itself become a bias?*

  Stages A-E per `docs/design/ROUNDTABLES.md`. Stage E (graded-work-trap
  pre-check) load-bearing — calibration dashboard is strongest graded-work
  surface in the codebase per calibration-dashboard.md §Purpose.

  Per failure class in the taxonomy, document:
    - Class name + ID
    - Description (the kind of model error)
    - Detection signature (what observation pattern reveals it)
    - Required ledger fields (what predictionLedger must capture to
      detect this class)
    - Severity (impact on hero EV / on model trust)
    - Examples (concrete scenarios)
    - Cross-references to existing failure files where overlap exists

  Also dispositioned this sprint:
    - JTBD candidates DS-NEW-PMC-01 / DS-NEW-PMC-02 / DS-NEW-PMC-03 —
      author / merge into DS-58 / drop
    - Persona check: model-developer-Chris ratified or collapsed onto
      post-session-chris
    - Open questions 1-6 from charter (storage budget, multi-comparisons
      rigor, ledger backfill, population definition, drift windowing,
      range-engine update gating)
