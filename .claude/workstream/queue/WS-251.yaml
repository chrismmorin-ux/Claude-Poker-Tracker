description: |
  Blind-spot run found the BIGGEST gap: ICM is wired only into the all-in node
  (pushFoldEngine) + IcmBadge. gameTreeEvaluator.js and preflopAdvisor.js have zero
  icm/payout/riskPremium references, so every non-all-in tournament decision (preflop
  opens/3-bets, postflop bets/calls — the majority of decisions) runs pure chip-EV through
  the shared cash game tree. On a bubble / near a pay jump, a chip-EV-correct line can be
  $EV-negative; the engine recommends it anyway (§10.4 anti-pattern). This is the natural
  next consumer of the just-shipped ICM foundation — riskPremium.js math already exists.
  Belongs to the ICM / tournament project. Source: blind-spot run 2026-06-20 (FIND-031).
accept_criteria: |
  - Thread a riskPremium scalar (from icmEngine/riskPremium.js) into gameTreeEvaluator as
    an EV discount on hero's at-risk chips; tighten value/bluff thresholds by the premium.
  - Start preflop (push/fold proves the pattern), then postflop.
  - Degrade gracefully when no payout ladder / not a tournament (no behavior change for cash).
  - Tests: a bubble spot tightens a marginal 3-bet/barrel vs the cash-game baseline.
