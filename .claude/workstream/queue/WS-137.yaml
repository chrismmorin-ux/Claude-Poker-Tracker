description: |
  HSP prerequisite audit. HeroState.equity.vsRangeParts requires the rangeEngine
  to expose villain range partitioned by class (value / draw / bluff / air).

  Audit src/utils/rangeEngine/ to determine:
    1. Does any module already expose villain range partitioned by class?
    2. If not, what's the gap and what would villainRangePartitioner.js look like?
    3. Are the partition boundaries computable from current range outputs
       (combo lists + equity per combo) or do they require new infrastructure?
    4. What classes are needed at what street?
       - Preflop: no draws — value / marginal / air
       - Flop:   value / draw / bluff / air
       - Turn:   value / draw / bluff / air
       - River:  no draws — value / bluff-catcher / air

  Output: gap report appended to docs/HERO_STATE_DESIGN.md §7.5 + decision on
  whether to build villainRangePartitioner.js as a separate ticket or fold into
  HSP-B2 (buildHeroState orchestrator).

  Per CLAUDE.md poker analysis guardrail: read POKER_THEORY.md +
  src/utils/rangeEngine/CLAUDE.md before audit.
