description: |
  Pre-Session Drill (PSD) Gate 3 Research deliverable. Output of SPR-090
  Gate 2 Blind-Spot Roundtable
  (docs/design/audits/2026-05-19-blindspot-pre-session-drill.md).

  Three reconciliation tracks:

  (1) JTBD canonicalization (Stage B G1-G5):
      - Author JTBD-SE-01/02/03 in docs/design/jtbd/domains/session-entry.md
        (currently only cited locally in presession-preparer persona file).
      - Absorb DS-56 (active-recall pattern priming) into SE-01 as a
        mechanism citation; do NOT author DS-56 as a parallel JTBD.
      - Author DS-57 (recency-weighted drill selection from recent leaks)
        in docs/design/jtbd/domains/drills-and-study.md.
      - DEFER DS-58 (anchor-trace) — domain-placement decision blocked on
        WS-197 (anchor-trace destination ADR).
      - DEFER DS-59 (falsifier-verify) entirely pending WS-053 (Range Lab
        Gate 2) close-out. If Range Lab owns the falsifier-rerun flow,
        PSD inherits via DS-58 and DS-59 is not authored.

  (2) Persona reconciliation (Stage A R1):
      Reconcile presession-preparer × post-session-chris. Either
        (a) presession-preparer's review mode is the drill-specific cut of
            post-session-chris (Gate 3 documents the relationship), OR
        (b) post-session-chris narrows to non-drill review and
            presession-preparer owns drill review (Gate 3 amends
            post-session-chris file).
      Decision belongs to the owner; Gate 3 surfaces options + recommendation.

  (3) Proto-caveat validation (Stage A R2 + R3):
      - Validate PSP-1 (5/15/30 min time-budget variants) with owner —
        do these buckets match actual prep behavior?
      - Validate PSP-2 (mood-detection reliability from session P/L) —
        until validated, ship with user-declared mood toggle (per Stage C
        A6 fallback).
      - Validate PSP-3 (48h review window) — shorter (12h) or longer (1wk)?
      - Validate Apprentice-Student depth tolerance (Stage A R3) —
        does the falsification-criterion depth overshoot an
        early-learner persona, or is the depth correct cross-persona?
