notes: |
  Fix shape (1 line each, both files):
    sort((a, b) => b.timestamp - a.timestamp || b.drillId - a.drillId)

  Verification:
    - Targeted run x3: 13/13 pass for both files
    - Full-suite run x3: 0 drill-storage failures across 3 runs (down from
      1-of-3 pre-fix). 3 unrelated MC equity flakes surfaced in Runs 2-3 —
      tracked separately under WS-134.

  Provenance: triage during /next on 2026-05-02, after the user's
  by6ph6wg3 monitor surfaced "Run 1 failed (219/220), Runs 2-3 passed".
  Without that visibility the gap would have stayed latent — WS-126's
  closure assumption was that the closeDB fix wave was sufficient.

  Source contract debt now closed: both store loaders honor their
  documented "newest first" semantics deterministically.
