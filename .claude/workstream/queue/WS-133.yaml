description: |
  `loadPreflopDrills` and `loadPostflopDrills` sorted attempts by
  `b.timestamp - a.timestamp` only. `timestamp = Date.now()` (millisecond
  granularity). When two saves landed in the same JS millisecond, the
  comparator returned 0; stable sort preserved IDB insertion order
  (drillId ascending = oldest-first), breaking the documented "newest first"
  contract.

  Surfaced during post-WS-126 verification: the 1-of-3 full-unit-project
  failure was `preflopDrillsStorage > saves and loads drill attempts for a user`,
  asserting `drills[0].drillType === 'framework'` (the second/newer save). On
  same-ms saves, drills[0] was the older 'estimate' instead.

  This is **orthogonal to WS-126** (cross-test IDB pollution). WS-126's
  closure note claimed "deterministic GREEN" but the same-ms-tie was a
  separate gap with the same surface symptom (intermittent failure of a
  drill-storage test in full-suite runs). The defensive `closeDB()` added
  by WS-126 slowed test setup just enough that consecutive saves usually
  crossed an ms boundary, masking this gap most of the time.

  postflopDrillsStorage carried the same comparator pattern as latent gap;
  fixed in the same diff to prevent the symmetric flake from surfacing.
