description: |
  2026-06-10 cross-stream seam audit: createSession writes tipAmount: null
  on create while createSessionAtomic omits the field entirely — schema
  divergence between the two creators that could confuse future migrations
  (downstream readers tolerate it via `|| 0`). Also endSessionAtomic's
  conditional tipAmount write has no round-trip test (END_SESSION with
  tipAmount → restart → hydrated session shows the tip; P&L depends on it).
  Align the two creators' record shapes and add the round-trip test
  alongside the straddle test added in 299a5f8.
