description: |
  buildHeroState.deriveActionContext() v1 heuristic only distinguishes
  CBET / VS_CBET on postflop streets (returns CBET when villain hasn't bet
  this street, VS_CBET when they have). For accurate turn/river HSP v2
  archetype routing (per WS-153 shipped 2026-05-30), the orchestrator needs
  to distinguish:

    Turn:
      - BARREL          — hero bet flop AND bets turn
      - VS_BARREL       — hero called flop, faces turn bet
      - PROBE           — flop checked through, hero leads turn OOP
      - CBET (delayed)  — hero checked back flop IP, bets turn
      - VS_DONK         — hero was preflop aggressor, villain donks turn

    River:
      - BARREL          — continuation (triple-barrel pattern, but axis is just
                           "hero bets the river")
      - VS_BARREL       — facing a river bet
      - PROBE           — flop+turn both checked through, hero leads river OOP
      - CBET (delayed)  — hero checked back turn IP, bets river
      - VS_DONK         — villain donk-leads river

  Block-bet detection (RIVER_BLOCK_BET / RIVER_VS_BLOCK_BET) currently relies
  on caller-supplied gameState.sizingFraction. Could also derive from
  gameState.pendingBetSize / gameState.pot if both fields are present.

  Closest-match fallbacks the classifier already provides (CBET on turn →
  TURN_DELAYED_CBET; VS_CBET on turn → VS_BARREL family) keep the contract
  "always return a valid archetypeId" intact when callers don't supply
  explicit actionContext. This ticket makes routing PRECISE without that
  caller burden.

  Implementation hints:
    - Inspect gameState.actionSequence per-street to reconstruct who-bet-what.
    - Audit existing candidates for reusable vocab:
      * src/utils/exploitEngine/decisionAccumulator.js (action-history schema)
      * src/utils/skillAssessment/heroDecisionAccumulator.js
      * src/utils/skillAssessment/deriveSituationKey.js (SCF situation-keying)
      * src/utils/decisionSystems/accumulator/createAccumulator.js
    - "Compatible" criterion: same action shape (street + action type +
      bettor/caller identity), same street enum (preflop/flop/turn/river).
    - Prefer reuse over local re-implementation if any candidate fits;
      heroState-local fallback if none do.

  Tests: extend buildHeroState.test.js with turn/river action-history
  scenarios (hero bets flop → BARREL on turn; villain bets flop → VS_CBET
  → VS_BARREL on turn called → VS_BARREL on river; flop checked through →
  PROBE on turn; etc.). Each scenario produces the expected archetypeId
  without explicit gameState.actionContext.
