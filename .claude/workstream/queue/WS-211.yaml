        * TURN CBET-delayed (hero PFA checked back flop IP, bets turn)
        * TURN VS_DONK (×2 — checked-back-flop pattern + bet-flop-villain-donks-turn pattern)
        * RIVER BARREL / VS_BARREL OOP / PROBE (requires flop+turn both checked)
        * RIVER CBET-delayed / VS_DONK
        * RIVER PROBE strict-prereq (turn-bet break ≠ probe)
        * sizingFraction derivation from pendingBetSize/pot → RIVER_BLOCK_BET
        * Caller-supplied sizingFraction wins over derived
        * No derivation when pot=0 (divide-by-zero guard)
        * Caller-supplied actionContext wins over derived (override path)
        * heroSeat absent → v1 fallback (no consumer regression)
