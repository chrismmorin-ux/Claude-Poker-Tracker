description: |
  gameTreeEquity.js bestResponseToAggression only computes raiseEV when
  heroEquityVsAggroRange >= 0.65, structurally suppressing all +EV bluff/semi-bluff
  raises vs over-folders (FIND-029). The principled fix is to remove the equity gate and
  let Math.max pick on EV.

  DEFERRED (not a one-liner): naively removing the gate while the no-model default
  vFoldToRaise = 0.50 makes the engine raise-happy for UNKNOWN villains — a 50%-equity
  hand + assumed 50% fold clears the EV comparison almost always, producing over-aggressive
  live-advisor recommendations. The correct fix pairs gate-removal with a realistic
  no-model fold-to-raise prior (population fold-to-3x-raise is ~0.30-0.45, not 0.50) and/or
  a model-confidence requirement before raises fire on thin equity. This is a calibration
  decision on the LIVE advisor path — wants care + founder input on aggression defaults,
  not a rushed edit. The 2026-06-20 attempt was reverted after surfacing this.
accept_criteria: |
  - raiseEV computed unconditionally (no equity pre-gate); Math.max picks on EV.
  - No-model fold-to-raise prior recalibrated to a realistic population value so unknown
    villains are not over-raised. Tests: low-equity vs high-fold villain -> raise;
    low-equity vs sticky/low-fold villain -> call/fold; verify no over-raise regression
    across the gameTreeEvaluator integration suite.
  - Decision recorded (aggression default) before shipping.
