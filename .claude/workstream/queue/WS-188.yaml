description: |
  Owner request 2026-05-11: 'I think we need a persistence audit and cache
  audit. a deep one, done very well. I don't think we have any load-bearing
  decision architecture around that.'

  **Rescoped after discovery (2026-05-11 same session):** Refactor Sprint
  Item 3 SHIPPED 2026-05-11 already covers a meaningful subset of the
  original ask:
    ✅ Migration registry at `src/utils/persistence/migrationRegistry.js`
       (25 entries, per-store ownership, owner-program linkage)
    ✅ Additive-only invariant enforced by CI gate
       (`scripts/check-idb-additive.sh`)
    ✅ Per-store ownership single-source (`getStoreOwner` helper, 23 stores)

  What is **still missing** and constitutes the load-bearing decision
  architecture the owner asked for:

  **Phase 1 — Failure-mode catalog (`docs/persistence/FAILURE_MODES.md`)**.
    Enumerate every way persistence can fail, with severity + observed-or-
    theoretical + fix surface:
      - Tx abort mid-write (e.g., `savePhotoAtomically` abort path —
        blob orphan? Verify GC strategy)
      - Schema mismatch / downgrade (newer browser opens DB written by older
        version — what's the behavior?)
      - IDB quota exceeded (mobile Safari ~50MB default)
      - `customBetSizes[key]=[]` regression class (per
        `feedback_idb_persisted_defaults.md` — IDB-persisted defaults must
        distinguish absent-array from empty-array)
      - Concurrent writes from multiple tabs (single-tab assumption load-
        bearing? Document.)
      - Migration failure mid-transaction (registry handles upgrade order,
        but not partial-success recovery)
      - Append-only-store violations (predictionAudit, anchorObservations —
        registry says additive, but data-mutation rules per store?)
      - Photo blob orphan after tx abort (`savePhotoAtomically.js:84-86`
        aborts the txn but no compensating cleanup of any partial blob)

  **Phase 2 — Cache staleness contracts (`docs/persistence/CACHE_CONTRACTS.md`)**.
    Every hook / context / utility that caches derived state must have a
    staleness contract:
      - `useAnalysisContext` — re-runs on what? Stale if?
      - `useExploitAnchorsForLive` — same
      - `useTendencyContext` — same
      - `rangeEngine` memos (`useMemoryConstrainedMemo`?) — eviction policy?
      - `anchorLibraryContext` selectors — invalidation triggers?
      - `usePlayerPersistence` cache — sync with IDB writes?
    Each gets an entry: triggers / invalidators / staleness-window /
    consistency-guarantee.

  **Phase 3 — Decision log consolidation**. ADRs for the patterns that
  currently live in scattered comments + `gate4-p3-decisions.md`:
    - ADR: Schema versioning policy (`max(currentVersion+1, targetVersion)`)
    - ADR: Multi-store migration in single version (precedent
      `gate4-p3-decisions.md §2`)
    - ADR: Append-only stores (which? why? rules?)
    - ADR: Blob storage strategy (photos; future: replay snapshots?)
    - ADR: Settings-defaults shape (`[]` semantics, per
      `feedback_idb_persisted_defaults.md`)

  **Phase 4 — Sweep for cache hooks that have no contract documented**.
    Enumerate every `useMemo`/`useCallback` with non-trivial deps. Flag any
    that cache derived state with no documented staleness window.

  Scope discipline: this is engineering hardening, not a new feature. No new
  IDB schema, no new caching layer, no new modules — output is documentation
  + small enforcement scripts.

accept_criteria:
