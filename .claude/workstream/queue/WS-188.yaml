    via JSDoc."
  - "Phase 2 deliverable: `docs/persistence/CACHE_CONTRACTS.md` enumerating
    every cache surface (~15-25 expected) with staleness contract per
    entry. Each cache surface gains a JSDoc header pointing back."
  - "Phase 3 deliverable: ≥4 ADRs in `docs/decisions/` covering schema
    versioning, multi-store migration, append-only stores, blob storage.
    Settings-defaults ADR optional if `feedback_idb_persisted_defaults.md`
    captures the rule adequately."
  - "Phase 4 deliverable: report at
    `docs/persistence/CACHE_SWEEP_2026-05-XX.md` listing every undocumented
    cache surface — feeds queue items for documentation follow-ups."
  - "Invariants added to `system/invariants.md`: INV-PERSIST-* family
    (additive-only — already enforced by Item 3 CI gate, document the
    invariant; blob-orphan-cleanup; settings-empty-vs-absent; tab-
    concurrency assumption)."
  - "Failure file at `.claude/failures/PERSISTENCE_FAILURE_MODE_DRIFT.md`
    (if any drift found between current code and the new contracts —
    optional; omit if zero drift)."

