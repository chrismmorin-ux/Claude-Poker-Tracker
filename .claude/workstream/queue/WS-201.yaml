description: |
  Validate the stuck/heater mood-detection mechanism that presession-
  preparer persona Constraints depend on (proto-caveat PSP-2). Gate 2
  surfaced this in Stage C (mood-aware SELECTION, not framing — C-A3 +
  C-A6).

  Today: presession-preparer assumes mood can be inferred reliably from
  session P/L. Stage C Behavioral Psychologist flagged this as the
  highest-risk mechanism — wrong mood inference produces the WORST drill
  experience (rubbing failure in stuck-hero's face, or pushing complacent
  heater toward overconfidence).

  Until validated, PSD ships with user-declared mood toggle (C-A6
  fallback). This ticket investigates whether auto-detection can be
  earned in v2.

  Research scope:
    - Define stuck / heater / neutral operational criteria. Candidates:
      session P/L threshold, multi-session P/L trajectory, time-since-
      last-session, hand-count-since-last-significant-loss.
    - Backtest against existing session corpus (if reliable session data
      exists in IDB).
    - Estimate false-positive + false-negative rates for each criterion.
    - Recommend: ship auto-detection v2, ship hybrid (auto-detect default
      + user override), or keep user-declared-only.

  Cross-program note: this lives in domain-correctness (not design)
  because it is a *model of user state*, which is a Bayesian-inference
  problem subject to the same hierarchical-shrinkage discipline as the
  villain-modeling work. Anti-pattern surface: do not bucket users into
  "stuck-mode personas" — keep the descriptor downstream of the inference
  per `feedback_first_principles_decisions.md` (labels are outputs, never
  inputs).
accept_criteria:
  - "Operational criteria for stuck/heater/neutral defined"
  - "Backtest against existing session corpus (or explicit gap: insufficient corpus)"
  - "False-positive / false-negative rate estimates per criterion"
  - "Recommendation: auto v2 / hybrid / user-only — with rationale"
  - "Forbidden patterns documented: bucket-as-input, persona-as-label, etc."
