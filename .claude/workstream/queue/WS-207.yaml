description: |
  Author **AP-RL-01** anti-pattern in domain-correctness program scope.
  Output of SPR-093 Gate 2 Blind-Spot Roundtable Stage B (B-G3 anti-
  pattern flag) + Stage E (E-A11 enforcement).

  **Anti-pattern statement:** DS-54 per-street range narrowing in Range
  Lab MUST be computed from first principles — per-combo equity update
  conditional on villain's action profile + board card revealed — NOT
  from bucket-label heuristics.

  **Wrong (forbidden):**
    "On the turn, narrow to TPGK+ since villain bet again."
    (Uses bucket label as input to narrowing decision.)

  **Right (required):**
    "On the turn, recompute each remaining combo's equity vs hero's
    range conditional on villain's bet-bet line, weight by villain's
    bet-bet frequency for that combo, surface the resulting per-combo
    posterior."
    (Per-combo derivation from action profile + equity update.)

  **Why this matters:** Bucket-label narrowing is the most common
  shortcut taken by range-narrowing implementations. It produces
  *plausible* output but encodes assumptions that mask real divergences
  (a particular combo might be in TPGK+ bucket but villain's action
  profile assigns it 5% bet-bet frequency — different from the bucket
  average of 60%). DS-54's primary value is surfacing those divergences;
  bucket-label shortcut destroys that value.

  Doctrinally binds with [[feedback_first_principles_decisions]] —
  labels are outputs of computation, never inputs.

  **Enforcement mechanisms:**
  1. **Gate 4 surface spec binding**: WS-055 (Gate 4 surface spec)
     must document AP-RL-01 in the DS-54 implementation discipline
     section.
  2. **CI lint pattern**: similar to PSD neutral-chrome grep — pattern
     match against forbidden patterns in `src/utils/rangeEngine/` +
     DS-54 implementation files.
     - Forbidden: `if (bucket === 'TPGK')` style switches inside
       narrowing logic.
     - Forbidden: `POP_NARROWING_RATES[bucket]` style lookups.
     - Allowed: per-combo equity computation + frequency weighting.
  3. **POKER_THEORY.md cross-reference**: anti-pattern referenced from
     POKER_THEORY.md §7 (first-principles decision modeling).

  **Cross-program note:** lives in domain-correctness (Poker Theory
  Integrity) because it enforces theoretical-correctness discipline.
  Sibling of existing engine anti-patterns documented in
  exploitEngine/CLAUDE.md.

