description: |
  WS-189 Phase 2 — the actual fix work. Authored as a stub during SPR-077
  Phase 1 closeout (2026-05-14). Blocked on owner-captured telemetry from
  Phase 1's dev-mode logs.

  **Phase 1 deliverables (SPR-077, 2026-05-14):**
  - `src/utils/dev/seatSelectionTelemetry.js` — dev-only logger module
    (no-op outside `import.meta.env.DEV`).
  - `src/utils/seatUtils.js` — instrumented `getFirstActionSeat()` logs
    inputs (currentStreet, dealerSeat, absentSeats, straddler, foldedSeats,
    numSeats) + output on every evaluation.
  - `src/hooks/useAutoSeatSelection.js` — logs every firing with
    `{ trigger, currentStreet, prevStreet, candidateSeat, currentSelection,
    action }` payload. `trigger ∈ 'mount' | 'street-change' | 'selector-close'
    | 'scheduled'`.
  - `src/components/views/TableView/CommandStrip.jsx` — passes
    `selectedPlayers` to the hook for H3 multi-seat-clobber capture.
  - `system/invariants.md` — INV-SEAT-SELECTION-1..7 family ratifies the
    M2 contract.

  **Phase 2 entry condition (≥3 owner-captured observations):**
  Each captured observation = a copy/paste from live-session DevTools console
  of a `[seat-select]` log group around a wrong-seat event. Owner annotates
  what the autoselector picked vs what they expected. The 3 logs together
  pin the failure path:
    - H1 (logic): `getFirstActionSeat` output disagrees with what poker rules
      say (e.g., SB-completing-into-limpers scenario, straddle-on, all-in skip).
    - H2 (timing): autoselect firing trigger happens before action sequence
      has settled, or selector-close re-fires on dismissal-without-change.
    - H3 (multi-seat clobber): `currentSelection` was non-empty at firing
      time, and autoselect overrode it (per current useAutoSeatSelection
      behavior — exactly violates INV-SEAT-SELECTION-4).

  **Fallback trigger (per WS-189 status_note):**
  If <2 captures after 2 live sessions, owner may pivot to hypothesis-first
  matrix audit: cross-reference `getFirstActionSeat()` return values against
  the 47-row ICP matrix `first_action_seat` column. Any row where matrix
  disagrees with the predicate is a `pinned_bug` for ICP and a fix target
  here.

  **Implementation scope (Phase 2 fix):**
  Driven by the captured failure path. Likely subset of:
    1. INV-SEAT-SELECTION-2/3 enforcement — update `useGameHandlers` and
       `selectedPlayers` insertion sites to maintain canonical action order
       (UTG-clockwise preflop with straddle-adjustment; dealer+1-clockwise
       postflop) and head-of-queue tap-to-record semantics.
    2. INV-SEAT-SELECTION-4 enforcement — `useAutoSeatSelection` respects
       a non-empty manual queue on mount and selector-close; only street
       change unconditionally resets.
    3. INV-SEAT-SELECTION-5 enforcement — re-tapping a queued seat removes
       only that seat. Wire the explicit clear-all gesture (long-press or
       dedicated control — design TBD with owner).
    4. H1-class fixes — any `getFirstActionSeat()` rule bugs surfaced by
       telemetry (e.g., straddle edge cases, SB-completion behavior).
    5. H2-class fixes — any timing/race conditions (likely deferring
       autoselect into a microtask after state settle, or guard against
       selector-close re-fire when state unchanged).
    6. Tests against the captured failure scenarios (each capture becomes
       a fixture).

  **Coupling notes:**
  - INV-SEAT-SELECTION-6 (rest-batch helpers) is already enforced post-WS-182.
    Phase 2 implementation must NOT alter `restFold` / `checkAround` semantics
    — they continue to operate on REMAINING-UNACTED-SEATS, bypassing the
    user-selection queue.
  - INV-SEAT-SELECTION-3 implementation requires changes to
    `useGameHandlers.handlePlayerAction` (or wherever the seat-action
    dispatch lives) to advance the queue instead of dispatching parallel
    actions to all selected seats. Coordinate with WS-182's
    `recordSeatAction(seat, intent)` per-seat API.

