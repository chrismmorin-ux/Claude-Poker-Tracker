status_note: |
  Authored 2026-05-14 SPR-077 closeout as the natural successor to WS-189
  Phase 1 (telemetry shipped same sprint).

  Soft-blocked (blocked_by_note) — awaiting Phase 1 captures. Per Step
  2-prereq of /next, soft-blocked items rank at 0.25× priority (P=20 → 5)
  until the note is cleared. This is intentional: do not anchor a sprint
  on this until owner has live-session data.

  Bug-fix exempt from Refactor Sprint charter (same precedent as WS-189).

  PARTIAL DELIVERY 2026-06-19 (owner-directed, out of band):
    Scope item #3's open design question — "wire the explicit gesture
    (long-press or dedicated control — design TBD with owner)" — is now
    RESOLVED and shipped. Owner directed that multi-seat selection move
    behind the touch-hold / right-click seat context menu (plain tap became
    single-select-replace), with an always-visible step-back "Undo Seat"
    button for mis-entries. Scope #5 (re-tap removes only that seat) remains
    satisfied — the menu's append path uses togglePlayerSelection. This does
    NOT close WS-191: the H1 (getFirstActionSeat rule) and H2 (timing/race)
    telemetry-driven fixes remain open and still soft-blocked on owner
    captures. INV-SEAT-SELECTION-4's load-bearing assumption (only the user
    can produce length>1) is preserved — verified in the audit.
    See docs/design/audits/2026-06-19-multiseat-behind-context-menu.md.

  Cross-references:
    - WS-189 (parent, Phase 1) — see status for full hypothesis taxonomy.
    - WS-182 / INV-RULES-CONTRIBUTION — establishes recordSeatAction per-
      seat API that Phase 2 implementation must compose with.
    - INV-SEAT-SELECTION-1..7 in system/invariants.md — the ratified
      contract this WS makes structurally true.
    - feedback_action_dispatch_legality.md (memory) — "prefer
      unrepresentable to validated" doctrine. Phase 2 fixes should make
      INV-SEAT-SELECTION violations type-impossible where feasible, not
      just validated.
