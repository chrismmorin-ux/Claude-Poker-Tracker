status_note: "SHIPPED 2026-05-21 SPR-099. Range Lab Phase 1 implemented: range-source toggle (Archetype | Custom) inside ExplorerMode; canonical 13×13 paint matrix (RangePaintGrid.jsx — square cells, tap-toggle + long-press weight slider per ADR-007, partial-fill height, scale-aware <44px long-press-required, first-use hint); per-stroke undo/redo (useRangePaint.js, ADR-008) + Cmd-Z/Cmd-Shift-Z; Clear-all confirm (outside undo); sessionStorage persistence (rangeLabPersistence.js, Save/restore); BoardPicker extended 3→5 cards (Add Turn/River + remove, adaptive street labels). Painted range feeds existing RangeFlopBreakdown (flop composition; turn/river per-street evolution deferred to Phase 3+ with a visible caption). RangeGrid index helpers exported for reuse. 22 new tests; full suite 11,746 pass / 0 fail; build clean; Playwright-verified at 1600×720 (toggle, paint, partial weight, turn add, breakdown, save→reload→restore). Founder visual req honored: canonical range-grid look distinct from dropdown picker. Unblocks WS-057 (Phase 2)."
