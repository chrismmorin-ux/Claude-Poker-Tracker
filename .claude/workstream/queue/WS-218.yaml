description: |
  2026-06-10 cross-stream seam audit (surfaced fixing the seed-operator
  divergence, commit 299a5f8): 3 of 4 EAL seed predicates
  (riverProbeBluffFrequencyAfterTurnXX, callVsTurnDoubleBarrelPaired,
  foldVsFlopDonkWetConnected) are NOT in assumptionEngine PREDICATE_KEYS, so
  the documented two-validator inheritance contract (validateAnchor JSDoc
  shows callers invoking validateAssumption too — but no caller ever does)
  cannot be wired without every seed failing validateClaim. Decide: (a)
  anchor predicates join PREDICATE_KEYS under the 4-artifact discipline
  (assumptionTypes entry + producer recipe + narrative + Tier-1 scenario per
  assumptionEngine/CLAUDE.md), or (b) anchors get their own predicate
  registry with a compound-schemaVersion-aware base validation path. Then
  wire the inheritance validation and widen claimContractSeam.test.js from
  operator-only to full claim validation.
