description: |
  This repo is a CWOS adopter pinned at kit 3.5.0 (.cwos-version, adopted
  2026-05-01). HomeBase is at 3.8.0. The kit/scripts/ suite (cwos-reconcile.js,
  cwos-state-store.js, cwos-event.js, cwos-gc.js, cwos-kit-upgrade.js, etc.)
  arrived/relocated at kit 3.6.0 (".cwos/scripts/ → kit/scripts/") and was never
  installed here — there is no kit/ directory in the repo at all.

  Consequence: every /next and /session-end has to hand-reconcile queue-index.yaml,
  sprint-index.yaml, and counters because cwos-reconcile.js is absent, and the
  anti-goal / state-store / shadow-event steps degrade to no-ops. Recurring
  friction logged as fr-011 through fr-014 in .cwos-feedback.yaml (4+ occurrences;
  the signature is queue-index drift — e.g. WS-185/WS-155 showing backlog in the
  index while their ticket files were done — and soft-block flags missing from
  the index summary, both because no automated index rebuild runs).

  Fix (run from a HomeBase-rooted session):
    Step 1 — provision the kit (additive update; preserves all local state):
      /adopt "C:/Users/chris/OneDrive/Desktop/Claude-Poker-Tracker" --update
      Review the update plan; expect kit/scripts/ to install as "new" files +
      .kit-update sidecars for any customized command/rule files. CLAUDE.md's
      project section (below the preamble separator) is preserved.
    Step 2 — if a version gap remains, close 3.5.0 → 3.8.0 safely (in-repo, after
      Step 1 installs kit/scripts/):
      node kit/scripts/cwos-kit-upgrade.js --homebase "C:/Users/chris/Claude HomeBase"          # dry-run
      node kit/scripts/cwos-kit-upgrade.js --homebase "C:/Users/chris/Claude HomeBase" --apply  # snapshot + schema migration + validation gate + auto-rollback

  After: run /audit (install health) + npm test + npm run build in this repo,
  review any .kit-update sidecars, and commit the new kit/ files.
