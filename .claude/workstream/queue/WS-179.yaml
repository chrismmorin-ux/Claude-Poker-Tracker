description: |
  Meta-refactor of the workstream queue itself. SPR-069 close-out explicitly
  recommended this sweep after WS-038 was retired as the first confirmed case
  of "stale work-tracking" (Shape Language Gate 3 had shipped 2026-04-23/24
  but the ticket was never closed). SPR-066/067/068 close-outs flagged the
  same pattern accumulating across multiple categories. SPR-067 already
  retroactively patched three resolved items with "Index drift cleared
  2026-05-10 SPR-067 reconcile sweep" markers — this ticket is the full sweep.

  The drift problem (recap):
    The 2026-05-01 mass-migration of `.claude/BACKLOG.md` → `queue/WS-*.yaml`
    captured items at their then-current priority but did NOT reconcile against
    project doc state. Result: tickets that point to work which has actually
    shipped (or paused, or been superseded) remain in queue at full P-score
    and anchor `/next` candidate ranking. SPR-070 already had to apply
    soft-block damping to 5 P=22 MPMF items; the same problem at the P=15 tier
    will continue to compound across future sprints until the queue is
    reconciled.

  Scope (to be ratified in plan mode):
    Walk a defined set of unclaimed tickets and classify each into one of
    5 dispositions. Update YAML in-place (no archive directory) per the
    WS-038 pattern: status:done + done_provenance for shipped cases, status
    note + freshness stamp for legitimate-backlog cases.

  Cross-references:
    - SPR-069 close-out: "Recommended /workstream reconcile sweep as separate ticket"
    - SPR-068 composition_notes: "WS-080/105/135/159 likely also stale"
    - WS-038 done_provenance (template for SHIPPED-elsewhere disposition)
    - SPR-067 reconcile-sweep markers in WS-029/077/078/105/106/107 status_notes
      (partial precedent; this ticket is the comprehensive pass)

  Out of scope (separate tickets if needed):
    - Source-class damping algorithm changes
    - queue-index.yaml schema additions (e.g. dedicated freshness field)
    - Migration of legacy_id namespace
    - The BACKLOG-legacy.md / BACKLOG_ARCHIVE.md files (historical references only)

