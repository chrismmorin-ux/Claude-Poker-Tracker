  - "PAUSED-INDEFINITELY tickets: status stays backlog, priority_score reset to P3=8 to deprioritize in /next ranking"
  - "queue-index.yaml regenerated to reflect updated statuses; sweep summary written into the index header comment block"
  - "Sweep report at .claude/workstream/sweeps/SPR-071-queue-reconcile-report.md (NEW) — table of all swept tickets + disposition + rationale + evidence pointer"
  - "Zero src/ diff (this is queue-state-only; no code changes)"

