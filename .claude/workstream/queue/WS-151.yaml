decision_resolution: |
  Founder ratified (2026-05-22) the MIRROR-FLOP / pot-type-split taxonomy:
  12 archetypes (not the provisional 8). Barrel & vs-barrel split by SRP/3BP ×
  IP/OOP (8) + TURN_PROBE + TURN_DELAYED_CBET + TURN_MULTIWAY + TURN_VS_DONK (4).
  Probe (OOP, flop checked through) and delayed-cbet (IP, checked back flop) kept
  distinct. Check-raise is a branch inside VS_BARREL templates, not a standalone
  archetype (matches flop). Rationale: 3BP turns run at much lower SPR with
  tighter/polarized ranges than SRP — same divergence that justified the flop's
  SRP/3BP split; keeps classifier (WS-153) routing on identical axes.
