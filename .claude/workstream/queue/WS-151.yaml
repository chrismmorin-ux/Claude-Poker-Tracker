description: |
  Define the turn archetype taxonomy and author the templates. Mirrors v1
  WS-138/139 shape: taxonomy table in HERO_STATE_DESIGN.md §4.4 (currently
  marked "defer to v2") + per-archetype markdown templates following
  docs/design/hero-state-templates/CONVENTIONS.md.

  Provisional taxonomy (~8; finalize during ticket):
    - TURN_DOUBLE_BARREL_IP        — bet flop, bet turn IP
    - TURN_DOUBLE_BARREL_OOP       — bet flop, bet turn OOP
    - TURN_VS_DOUBLE_BARREL_IP     — called flop, facing turn barrel IP
    - TURN_VS_DOUBLE_BARREL_OOP    — called flop, facing turn barrel OOP
    - TURN_PROBE                   — checked flop, hero leads turn (OOP only)
    - TURN_DELAYED_CBET            — checked flop IP, bets turn IP
    - TURN_CHECK_RAISE             — facing turn bet, raise spot (OOP)
    - TURN_VS_DONK                 — facing turn donk lead

  Authorship: parametric narrative templates with Mustache slots. Voice +
  structure match v1 §5 examples. Each file: archetypeId + headline + body +
  branchSummary. No hardcoded numerics — interpolate from equity.* + plan.*.ev.

  Output location: docs/design/hero-state-templates/turn/*.md.

  Scope reminder per first-principles guard: archetype IDs are OUTPUTS not
  INPUTS to plan computation. The taxonomy axes (action context + position +
  pot type) must be derivable from game state; templates render strings only.
