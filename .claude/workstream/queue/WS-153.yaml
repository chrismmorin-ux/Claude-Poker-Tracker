description: |
  Extend src/utils/heroState/classifyArchetype.js to handle turn + river streets.
  Currently throws NotImplementedError per v1 scope (WS-141 done 2026-05-03).

  Decision tree extension:
    street == turn  → ~8 turn archetypes (gated on actionContext + position +
                       prior-street action history)
    street == river → ~8 river archetypes (gated on actionContext + position +
                       prior-street action history)

  Turn/river archetypes need PRIOR-STREET CONTEXT (e.g. TURN_DOUBLE_BARREL
  requires that hero bet flop AND bets turn). Classifier must inspect action
  history, not just current decision node. Action-history vocabulary likely
  exists already in decisionAccumulator.js — audit before duplicating.

  Tests: extend src/utils/heroState/__tests__/classifyArchetype.test.js with
  per-archetype synthetic states. Boundary cases: street transitions, action-
  history reconstruction, IP/OOP determination after closing-action ambiguity.

  Update HERO_STATE_DESIGN.md §4.4 + §4.5 if any taxonomy revisions surface
  during implementation.

  First-principles guard: archetype IDs remain OUTPUTS only. Classifier maps
  game state → archetypeId; nothing in this ticket should make archetypeId
  influence plan computation downstream.
