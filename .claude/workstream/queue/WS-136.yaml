description: |
  Master ticket for HSP — a hero-perspective synthesis primitive that classifies
  decision points into canonical archetypes and exposes plan-by-branch
  articulation ("here's a really good way to think about this position").

  Design spec: docs/HERO_STATE_DESIGN.md (v0.1, 2026-05-02).

  Founder-promoted to workstream 2026-05-02 after design conversation. Foundational
  dependency for SCF (master plan workstream D — leak-to-lesson loop needs a
  canonical "correct frame" reference). Provides a unified primitive consumed by:
    - Live advisor (OnlineView seat annotation)
    - PRF playbook cards (pre-session)
    - HandReplay review (post-hand)
    - SCF leak detector (canonical baseline for hero deviation measurement)

  Why a primitive, not a presentation layer:
    - Reuse across 4 consumers; presentation-only forces composition drift
    - Skill-assessment baseline must be canonical (per skill-assessment-as-core-
      competency feedback)
    - Rides on existing game-state machine; adds perspective node, not new graph

  First-principles guard (per POKER_THEORY.md §7 + exploitEngine/CLAUDE.md):
    archetype IDs are OUTPUTS of classification, never INPUTS to plan computation.
    Plans derive from equity / SPR / pot odds / players remaining. Templates are
    presentation; plans are computed.

  Children (7 work items):
    - WS-137 (HSP-G1 audit)     — Range-engine partitioning audit
    - WS-138 (HSP-A1 authoring) — 8 preflop archetype narratives
    - WS-139 (HSP-A2 authoring) — 10 flop archetype narratives
    - WS-140 (HSP-T1 type)      — HeroState type schema
    - WS-141 (HSP-B1 classify)  — classifyArchetype()
    - WS-142 (HSP-B2 build)     — buildHeroState() orchestrator
    - WS-143 (HSP-W1 wire)      — Wire to HandReplay review (first consumer)

  Cross-program: wiring tickets touching UI surfaces (W1, plus future PRF +
  OnlineView + SCF integrations) need design-program Gate 1+4 per
  docs/design/LIFECYCLE.md. The primitive itself is engine work
  (domain-correctness program).

  Scope addition pending: prog-domain-correctness.yaml scope.file_patterns should
  add 'src/utils/heroState/**' once code lands so sweep/delta audits pick it up.
  Tracked here so it isn't forgotten.

