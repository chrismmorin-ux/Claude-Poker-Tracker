description: |
  Implement src/utils/heroState/classifyArchetype.js — pure function mapping
  game state + hero hand + villain model to one of the 18 archetype IDs from
  HERO_STATE_DESIGN.md §4.

  First-principles guard: classifier outputs the archetype ID; the BUILDER uses
  the ID to select a narrative template, NOT to compute the plan. Plans derive
  from equity / SPR / pot odds / players remaining. Per POKER_THEORY.md §7 and
  exploitEngine/CLAUDE.md anti-patterns.

  Decision tree:
    street == preflop → 8 preflop archetypes (gated on actionContext + position)
    street == flop    → 10 flop archetypes (gated on actionContext + position +
                         pot-type SRP/3BP + multiway)
    street == turn/river → throw NotImplementedError (v2)

  Tests: unit tests for each archetype with synthetic game states. Verify
  classifier returns the right archetypeId for boundary cases (multiway threshold,
  SRP-vs-3BP threshold, position class boundaries).
