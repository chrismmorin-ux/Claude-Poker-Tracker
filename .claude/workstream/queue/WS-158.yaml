description: |
  Activate the SCF leak-detection pipeline end-to-end. SPR-030 / WS-145
  shipped the framework + first rule + storage + hook + badge slot, but the
  trigger that runs the detector and writes to IDB was deferred. Without
  this ticket, no badges actually appear in the running app.

  Scope:
    - New hook src/hooks/useHeroLeakDetection.js (or integrate into existing
      analysisPipeline) that loads hands, runs heroDecisionAccumulator +
      detectHeroLeaks, calls replacePlayerLeaks
    - Wire ReviewPanel to call useHeroLeaks per hero decision point + pass
      leak/onSnooze/onDismiss/onDrill props into HeroCoachingCard
    - Add a derive-situation-key helper so the consumer side can key into
      heroLeaks for the current decision context
    - End-to-end test demonstrating: synthetic hand history → detector run
      → IDB write → useHeroLeaks read → badge renders

  v1 trigger location decision: HandReplayView mount (simplest; scoped per
  replay open). Future sprint may move to context-level trigger if perf
  measurements warrant.
