    completion_notes: "Path A (heroState-local) shipped per founder ratification at composition.  Implementation:   - 4 new local helpers in buildHeroState.js (alongside countPreflopRaises):     normalizeActionVerb, wasHeroPreflopAggressor, heroBetStreet,     villainBetStreet, allPriorPostflopStreetsCheckedThrough.   - deriveActionContext() extended with a precision branch for turn/river     when gameState.heroSeat is present; falls back to v1 heuristic when     heroSeat is missing (preserves backward-compat for callers like     HandReplay's reconstructGameStateAt which doesn't yet pass heroSeat —     out of scope per WS-211 files_involved).   - buildSituation() now derives sizingFraction from pendingBetSize/pot     when caller omits sizingFraction (avoids divide-by-zero when pot=0;     caller-supplied value wins).   - +19 tests in __tests__/buildHeroState.test.js covering:       * TURN BARREL (action complete) + BARREL spot (decision point)       * TURN VS_BARREL OOP       * TURN PROBE (flop checked through, hero leads turn OOP)       * TURN CBET-delayed (hero PFA checked back flop IP, bets turn)       * TURN VS_DONK (×2 — checked-back-flop pattern + bet-flop-villain-donks-turn pattern)       * RIVER BARREL / VS_BARREL OOP / PROBE (requires flop+turn both checked)       * RIVER CBET-delayed / VS_DONK       * RIVER PROBE strict-prereq (turn-bet break ≠ probe)       * sizingFraction derivation from pendingBetSize/pot → RIVER_BLOCK_BET       * Caller-supplied sizingFraction wins over derived       * No derivation when pot=0 (divide-by-zero guard)       * Caller-supplied actionContext wins over derived (override path)       * heroSeat absent → v1 fallback (no consumer regression)       * 3BP TURN BARREL routing  Vocab-reuse audit (accept_criterion #6):   - exploitEngine/decisionAccumulator.js (READ) — shape-compatible but lives     in a higher layer that consumes heroState. Direct import would invert     dependency direction. REJECTED.   - skillAssessment/heroDecisionAccumulator.js (READ) — shape-compatible     but lives in skillAssessment which consumes heroState. REJECTED.   - skillAssessment/deriveSituationKey.js (READ) — strongest shape match     (8-axis with preflopAggressor `pfa`/`pfc` axis), mirrored its     NORMALIZE_ACTION + DERIVE_PREFLOP_AGGRESSOR patterns heroState-locally     (normalizeActionVerb + wasHeroPreflopAggressor). REJECTED for direct     import (layer inversion) — patterns copied with provenance comment.   - decisionSystems/accumulator/createAccumulator.js (READ) — generic     factory with no domain content. REJECTED (no-fit).  Follow-up path B (extract neutral src/utils/actionHistory/streetContext.js) remains a legitimate refactor if/when a 3rd consumer surfaces the same turn/river vocabulary in skillAssessment or exploitEngine. Single consumer today → YAGNI per founder ratification.  First-principles guard preserved: archetypeId stays OUTPUT-only. The derived actionContext is itself an OUTPUT of action-history reconstruction; the classifier reads it as an axis. POKER_THEORY.md §7 contract holds.  Acceptance:   - 44/44 buildHeroState tests green (+19 net).   - 182/182 heroState suite green (was 163; +19 matches).   - Production build clean (12.02s).   - Impact-zone (HandReplayView + skillAssessment + shapeLanguage):     790/791 green. The 1 failure is a pre-existing date-aged flake at     conceptMastery.test.js:120 ('2026-05-04' lastUpdatedAt → recencyPenalty     decays to 0 as of 2026-06-04). Independent of WS-211 — reproduces on     pre-change main."

