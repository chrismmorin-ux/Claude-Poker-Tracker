  preflight:
    skill_path: engines/standard/preflight.md
    category: analysis
    impact: changes-code
    trigger: manual
    inputs:
      - git_diff
    outputs:
      - finding
      - report
    chains: {}
    finding_severities:
      FAIL: high
      WARN: medium
    description: "Pre-commit verification across 9 check suites"

  # coverage-detector: NOT YET IMPLEMENTED — engine skill exists at
