  # ============================================================
  # STANDARD ENGINES — Briefing (installed in every repo at L3+)
  # ============================================================

  milestone-briefing:
    skill_path: engines/standard/milestone-briefing.md
    category: briefing
    impact: informational
    trigger: automatic
    inputs:
      - system_model
      - onboarding_state
    outputs:
      - understanding
    chains: {}
    description: "Explains what a milestone changes, enables, and preserves — builds acceptance before action"

  engine-briefing:
    skill_path: engines/standard/engine-briefing.md
    category: briefing
    impact: informational
    trigger: automatic
    inputs:
      - system_model
      - codebase
      - git_history
    outputs:
      - understanding
    chains: {}
    description: "Explains why a specific engine matters for this repo at this moment — relevance, not generic description"

  goal-progress:
    skill_path: engines/standard/goal-progress.md
    category: briefing
    impact: informational
    trigger: manual
    inputs:
      - findings
      - onboarding_state
    outputs:
      - understanding
    chains:
      on_complete: []
    description: "Scores findings against repo_goal — advances-goal vs maintenance ratio (enforces P1)"

  component-alignment:
    skill_path: engines/standard/component-alignment.md
    category: briefing
    impact: informational
    trigger: manual
    inputs:
      - component_units
      - onboarding_state
    outputs:
      - understanding
    chains:
      on_complete: []
    description: "Scores installed/planned components against repo_goal — surfaces prune candidates (enforces P3, prevents tool-shaped hammer)"

  # --- Commands excluded from engine registry ---
  # /verify and /plan are structured commands, not engines. They don't follow the
  # 6-phase engine protocol (Setup → Research → Cross-Critique → Synthesis → Backlog → Briefing),
  # don't produce findings via the finding pipeline, and don't chain to other engines.
  # They are invoked directly as user commands, not via `/engine <name>`.

