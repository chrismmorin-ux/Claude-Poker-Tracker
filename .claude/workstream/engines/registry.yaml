# Engine Registry — declares all engines with interfaces and chains
# Each engine maps to a skill file. The registry formalizes their
# inputs, outputs, and what should run after them.
#
# Engine Categories:
#   analysis     — Find issues, assess quality, detect drift. May update system state.
#   enhancement  — Improve quality of decisions, plans, context. No code changes.
#   preparation  — Ready workspace before a change. Zero impact guaranteed.
#   briefing     — Build comprehension before action. Ephemeral output.
#
# Impact Levels:
#   changes-code  — May modify source code (e.g., auto-fix engines)
#   changes-state — May update system files but never source code
#   zero-impact   — Reads only. No code, state, or config changes.
#   informational — Produces inline output only. Nothing written to disk.
#
# Procedure/Content Separation (optional):
#   procedure  — Names a procedure file in engines/procedures/<name>.md
#                Defines the phase flow (agent-dispatch, suite-check, etc.)
#   extends    — Names a base fragment in engines/base/<name>.md
#                Provides shared context gathering instructions
#   Both fields are optional. Engines without them load as flat skill files.
#   See engines/procedures/ and engines/base/ for available options.
#
# Output Types:
#   finding          — Issue discovered, fed into finding pipeline (FIND-*.yaml)
#   work-item        — Actionable task, added to workstream queue (WS-*.yaml)
#   report           — Summary document for human review
#   fix              — Automatic code fix applied directly
#   state-update     — Updates to system/*.md files
#   recommendation   — Strategic proposal (REC-*.yaml)
#   enhancement      — Enriched artifact: improved plan, decision, context (ENH-*.yaml)
#   readiness-report — Precondition checklist, blast radius, rollback plan (READY-*.yaml)
#   understanding    — Inline briefing, ephemeral (not persisted to disk)
#
# Per-engine tuning (optional):
#   finding_cap: <int>  — Max findings promoted to FIND-*.yaml per run.
#                         Absent = global default of 10. Blindspot-tagged
#                         findings (blindspot: true on the persona output)
#                         bypass the cap. Overflow preserved in the run's
#                         findings-overflow.yaml. See engine.md § 5.0.

engines:

  # ============================================================
  # STANDARD ENGINES — Analysis (installed in every repo at L3+)
  # ============================================================

  eng-engine:
    skill_path: engines/standard/eng-engine.md
    procedure: agent-dispatch
    extends: context-gather
    category: analysis
    impact: changes-state
    trigger: manual
    inputs:
      - codebase
      - system_model
      - git_history
    outputs:
      - finding
      - work-item
      - report
    chains:
      on_complete: []
    finding_severities:
      CRITICAL: critical
      HIGH: high
      MEDIUM: medium
      LOW: low
    description: "6-persona adversarial engineering roundtable with cross-critique"

  health-check:
    skill_path: engines/standard/health-check.md
    procedure: suite-check
    extends: context-gather
    category: analysis
    impact: changes-code
    trigger: manual
    inputs:
      - codebase
      - system_model
    outputs:
      - finding
      - report
      - fix
    chains:
      on_finding: []
    finding_severities:
      FAIL: critical
      WARN: medium
    description: "System health diagnosis with auto-remediation"

  # drift-detector: NOT YET IMPLEMENTED — no command file exists in kit
