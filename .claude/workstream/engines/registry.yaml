  persona-validator:
    skill_path: engines/standard/persona-validator.md
    category: analysis
    impact: zero-impact
    trigger: manual
    inputs: [persona_files, engine_files]
    outputs: [finding, report]
    description: "Validates persona files — checks coverage, relevance, consistency with engine requirements"

  # convergence: HOMEBASE-ONLY — engine skill exists at
  #   engines/homebase-only/convergence.md (post-WS-145 filesystem boundary).
  #   This is HomeBase-only by design and never distributes to adopted repos —
  #   keep this entry permanently commented in the template.
