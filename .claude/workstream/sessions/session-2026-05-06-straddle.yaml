  ## Architectural notes worth carrying forward

  - **STRADDLE is in `PRIMITIVE_ACTIONS`** (DEC-014), NOT a sidecar field on
    session or game state. The actionSequence is the single source of truth;
    a STRADDLE entry at `order: 1, street: 'preflop', action: 'straddle',
    amount: <variable>` is the universal carrier. All downstream code
    (potCalculator, getMinRaise, getCurrentBet, isBBOption, isStraddlerOption)
    derives from this single representation.
  - **`noPreflopAggression`** = `noPreflopRaise && straddler === null`. This
    is the new gate for `isBBOption` / `isSBCompleting` — straddle counts as
    aggression. The plain `noPreflopRaise` gate is still used for
    `isStraddlerOption` (the straddler's own posted blind is the aggression).
  - **`isStraddlerOption`** keys off "is hero === straddler", not hero
    position. This was a deliberate uniformity check — it works for both UTG
    and BTN scopes without per-position branching.
  - **getFirstActionSeat skips the straddler** so first-to-act lands at UTG+1
    on UTG straddle. BTN straddle is unaffected (UTG remains first to act,
    BTN closes after BB). This is the entire action-order rule —
    `getNextActionSeat` doesn't need straddler-last logic because the natural
    clockwise order already produces the correct sequence with the straddler
    as the last unacted seat.
  - **Single-straddle invariant** enforced at the reducer (`RECORD_STRADDLE`
    rejects if a STRADDLE entry already exists). UTG > BTN precedence is the
    call site's responsibility (TableView's eligibleStraddleSeats memo gates
    long-press to UTG and BTN only when no STRADDLE entry exists; if both are
    eligible, the user picks via long-press).

