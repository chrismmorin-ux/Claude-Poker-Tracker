handoff_notes: |
  ## Refactor Sprint Item 3 — Persistence Migration Registry — SHIPPED

  ### Plan and execution
  Plan-mode session opened with 4 design decisions for the owner (registry shape,
  ownership format, enforcement, PMC scope). All 3 recommended options selected
  via AskUserQuestion; decision 4 was resolved by exploration showing PMC v25 was
  already shipped. Plan file: `~/.claude/plans/precious-leaping-orbit.md`.

  ### Shipped
  - **`src/utils/persistence/migrationRegistry.js`** — 25 entries (v1–v25) with
    per-version description, storesAdded/storesChanged, owner ({program,project}),
    migrationFn, shippedAt. Three derived helpers: `getStoreOwner(name)`,
    `getVersionsForStore(name)`, `getStoresAtVersion(version)`.
  - **`__tests__/migrationRegistry.test.js`** — 19 cases covering completeness,
    additive-only invariant, monotonic store-set growth, owner-program integrity
    against KNOWN_PROGRAM_IDS, migrationFn naming convention, DB_VERSION
    alignment, and the 3 helpers. All 19 green.
  - **`scripts/check-idb-additive.sh`** — CI grep gate forbidding
    `deleteObjectStore` / `deleteIndex` calls in `migrations.js`. Mirrors the
    `check-refresher-writers.sh` shape (set -euo pipefail; exit 1 on violation;
    ✅ on clean). Trip-tested (injected destructive call → exit 1 with line
    numbers; reverted → exit 0).
  - **`scripts/smart-test-runner.sh`** — wired the new gate as a pre-test
    gate. Test suite is now blocked if a destructive IDB API is introduced.
  - **`migrations.js`** — `MIGRATION_REGISTRY` imported; `runMigrations` now
    logs an applied-versions summary after the orchestrator's ordered guards.
    A stale/missing registry entry surfaces at upgrade time rather than
    silently drifting. 762/762 persistence tests still pass.
  - **`SYSTEM_MODEL.md` §1 + §11** — §1 persistence row updated to reference
    the registry + CI gate + helpers (and corrected "~30 stores" drift → "23
    stores"). §11 TD-16 marked RESOLVED with completion date and full
    resolution citation. Also corrected the Item 2/Item 3 numbering drift in
    TD-16's prose (project file renumbered after state.md reshape became
    the new Item 2 mid-sprint).
  - **`refactor-sprint-2026-05-10.md`** — Item 3 checked DONE 2026-05-11; all
    4 DoD bullets marked complete with citations. Sequencing block rewritten
    so the next session can see at a glance that Item 4 (decision-system
    extraction) is now NEXT. Closeout notes capture the discovered drifts
    + deferred follow-ups + orphaned-PRF-gate finding.

  ### Decisions ratified (Heavy — recorded in system/decisions.md)
  - **DEC-(next): Registry shape = JS module over YAML manifest.** Reason: colocate
    with runtime, match existing PRF + cardRegistry patterns, no precedent for
    YAML inside `src/`. Owner-volunteered selection of the recommended option.
  - **DEC-(next): Per-store ownership inline in migration registry, not separate map.**
    Reason: single source of truth. Ownership and migration history can never
    drift apart because both are properties of the same entry.
  - **DEC-(next): Additive-only enforcement via BOTH unit test + CI grep gate.**
    Reason: each catches a different failure mode (registry-data drift vs.
    source-code primitive use). ~80 LOC total; both required.

  ### Pre-existing flaky tests surfaced (not my changes)
  Full ~11K test suite run had 7 failing tests in 4 files, including
  `SelfCoachView.copy-discipline.test.jsx > CurriculumTab body contains no
  rank-label words anywhere`. That test passes in 1.7s when run in isolation
  (well under its 10s threshold) — the failures are parallel-load timeouts.
  Persistence tests all green (762/762); registry tests all green (19/19).
  Worth a `/health-check` to characterize the flakiness as a separate item.

  ### Deferred (flagged cheap follow-ups)
  - **`database.js` inline-ownership comment cleanup** (lines 64–110). Now
    redundant with the registry. ~10-min edit; not a correctness issue but
    drift surface.
  - **Wire `scripts/check-refresher-writers.sh` into `smart-test-runner.sh`.**
    Discovered orphaned during this session — the PRF gate exists but is
    never run by any automated path. ~5-min edit; engineering program territory.

  ### Next recommended action
  Item 4 — decision-system extraction (the architectural-survey headline
  finding). Extract `src/utils/decisionSystems/` core (accumulator base,
  registry interface, IDB store factory, reducer-composition helpers);
  migrate `anchorLibrary/` as proof; record ADR. Estimated ~3-4 sessions.
  Item 6 (queue triage) can run in parallel.

  Autopilot eligible: 0 — Item 4 is plan-first by classification.

