    SUPERSEDED (2): WS-049 (PDF snapshots — PRF-G5-WR per-card pattern absorbs),
      WS-075 (44px button — TableBuildView replaces seat-assignment grid).
    LEGITIMATE-BACKLOG (22): MPMF cluster (6) + PIO WS-164 + SLS cluster (5) +
      PRF WS-047 + RL cluster (5) + HRP WS-067 + DCOMP WS-079 + LSW WS-087/092.
      All carry refreshed 2026-05-11 status_note with current freshness rationale.
    NEEDS-RESCOPE (4): WS-020 (hook-hoist race), WS-023 (per-seed snapshot),
      WS-025 (9 red lines registry), WS-074 (AssumptionCard coordination).
    PAUSED-INDEFINITELY (12): WS-029 (Ignition mode), WS-068..073 (HRP Stream E/U
      downstream), WS-097/098 (LSW-v2 deferred), WS-108..110 (sidebar-recurrence
      LATER). P-score reset 15→8 (P2→P3).

  13 tickets retitled from "ready-to-start" to project-anchored categories:
    range-lab (5): WS-053..057
    played-hand-review-protocol (8): WS-067/068/069/070/071/072/073 + carrying forward
      from prior session's HRP work

  Net /next composition impact: 43 P≥15 unclaimed candidates → 26 after sweep
  (5 retired to done, 12 deprioritized to P=8). Future /next invocations no
  longer pay the inspection cost on stale tickets.

  Zero src/ diff (queue-state-only sweep). 43 queue/WS-*.yaml files modified
  (status / status_note / priority_score / category / updated_at). queue-index.yaml
  updated: 5 retired-entry status flips + header sweep summary comment block +
  WS-179 entry transition (backlog→claimed→done). New artifact:
  .claude/workstream/sweeps/SPR-071-queue-reconcile-report.md (~120 lines, full
  per-ticket audit table).

  Followups surfaced (not in sweep scope):
    1. MPMF Gate 4 surface tickets (S1..S6 + J1..J4) — enumerated in project doc
       but no queue entries; soft-block holds.
    2. LSW-v2 charter — WS-097/098 deferred there; no charter exists.
    3. Table-Build Gate 5 ticketing — WS-164 soft-blocks on it; not ticketed.
    4. NEEDS-RESCOPE follow-through (4 tickets carry concrete rescope direction).
    5. P<15 unclaimed pass — this sweep was P≥15 scope.

goal: |
  Queue reflects actual project state — stale tickets that point to
  already-shipped work are retired with done_provenance; legitimate-backlog
  items keep their P-scores and gain freshness signal; tickets pointing to
  paused/superseded scope get explicit disposition. Future /next invocations
  compose against a reconciled candidate set without pay-the-inspection-cost
  per stale ticket.

program_focus: engineering
program_initiative: |
  Engineering — queue hygiene meta-refactor. SPR-069 close-out explicitly
  recommended this sweep after WS-038 (Shape Language Gate 3) was retired as
  the first confirmed stale ticket. SPR-067 already retroactively patched
  three resolved items with "Index drift cleared 2026-05-10 SPR-067 reconcile
  sweep" markers — this ticket is the comprehensive pass.

  Cross-program rotation: DC anchored 8 of last 10 sprints. Founder picked
  "refactor work" rotation; selected queue-reconcile-sweep over sidebar
  boundary cluster or component extraction. Sprint touches engineering /
  domain-correctness / design / launch categories simultaneously — not a
  single-program anchor. Resets the DC-saturation pattern.

  Compounding value: SPR-070 already had to apply soft-block damping to 5
  P=22 MPMF items. If any P=15 candidates are similarly mis-priced (stale),
  every future /next invocation pays the inspection cost. Sweep once, future
  sprints compose cleanly.

