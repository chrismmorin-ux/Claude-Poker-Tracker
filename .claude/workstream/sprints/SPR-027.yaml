goal: |
  HSP-B2 buildHeroState() orchestrator ships — composes the 4 HSP primitives
  (types, classifier, role-translator, templates) plus the 3 existing engines
  (rangeEngine, gameTreeEvaluator, villainProfileBuilder) into a complete
  HeroState object per src/utils/heroState/types.js.

  After this sprint, WS-143 (HandReplay first-consumer wire) is unblocked.
  WS-143 in turn unblocks WS-013 (SCF Gate 5 leak-rule wiring), the deferred
  Master Plan §D Phase 5 entry. The HSP-to-SCF chain is the load-bearing
  feature dependency the founder named when promoting HSP into the queue
  (per project_master_plan_2026_04_30 + project_hero_state_primitive memories).

  Master Plan rhythm:
    SPR-024: WS-140 + WS-137 (HSP foundation: types + audit)
    SPR-025: WS-144 + WS-141 (HSP build: role-translator + classifier)
    SPR-026: WS-138 + WS-139 (HSP authoring: 18 narrative templates)
    SPR-027: WS-142 (HSP orchestrator)
    SPR-028+: WS-143 (HandReplay consumer wire) → WS-013 (SCF G5 leak rules)

  Cap exception: L = ~3 sessions tagged exceeds standard 2-session cap.
  Founder-approved over-cap for the second consecutive sprint (after SPR-026's
  M+M=3 bundle). Pragmatic: L items don't fit standard ceremony unless we
  break them into smaller tickets.

  First-principles guard binds the orchestrator: plans come from
  gameTreeEvaluator using equity / SPR / pot odds / players remaining —
  never from archetypeId lookup. Templates only render; they don't decide.

