      Shipped 4 source files + 4 test files in src/utils/heroState/:
        - buildHeroState.js (~280 LoC) — main orchestrator with two-tier
          failure mode + parallel composition + 7-step pipeline
        - parseFrontmatter.js (~80 LoC) — minimal YAML parser for our
          bounded frontmatter shape (key:value, |literal blocks, -item
          arrays); no new deps
        - loadTemplates.js (~80 LoC) — Vite import.meta.glob loader for
          all 18 templates + section parser (## Headline / ## Body /
          ## Branch summary); matches existing printableRefresher pattern
        - interpolateTemplate.js (~80 LoC) — Mustache-style {{path.to.field}}
          substitution + {{list[*].x}} array iteration + {{list[N].x}}
          indexed access; unresolved slots stay as-is for visibility

      Tests: 62 new tests (parseFrontmatter:12 + interpolateTemplate:18 +
      loadTemplates:8 + buildHeroState:24); all 122/122 heroState tests
      green; full smart-test-runner 9599/9629 passed (30 skipped, 0 failures);
      build clean (6.66s).

      Decision tree for buildHeroState (plan-mode resolved):
        - Step 0: validate gameState + heroHand (throw if missing)
        - Step 1: derive Situation (street/actionContext/positionClass/
                  inPosition/playersRemaining/sprZone/pot/effStack/rake/potType)
        - Step 2: derive HandContext (hand/handClass/handStrength/range
                  Advantage/nutAdvantage/boardTexture)
        - Step 3: classifyArchetype(axes) → archetypeId + archetypeFamily
        - Step 4: PARALLEL Promise.all([evaluateGameTree, computeEquityVsRangeParts])
                  - both branches no-op when villain data missing (soft-degrade)
                  - computeEquityVsRangeParts skipped preflop + on MULTIWAY
        - Step 5: map planResult.recommendations[0] → Plan typedef
        - Step 6: assemble equity (overall + vsRangeParts + realization +
                  realizedEquity) — null where degraded
        - Step 7: build adjustments from villainProfile.vulnerabilities
                  (top 3, v1; composition rule deferred to consumer per §7.2)
        - Step 8: render narrative via loadTemplate(archetypeId) +
                  interpolateTemplate(section, partial-HeroState)
        - Step 9: assemble + return

      Doc update: appended HERO_STATE_DESIGN.md §10 documenting the
      orchestrator's failure-mode policy, caching decision, composition
      order, helper modules + their swap-out triggers, and downstream
      impact (WS-143 unblocked).

      First-principles guard regression test added: verifies plan.primary.action
      comes from evaluateGameTree output (mocked CHECK) NOT from archetypeId
      lookup (FLOP_SRP_HU_IP_CBET says "CBET" in name — orchestrator does
      not override).

      Soft-degrade integration verified: villainProfile=null + villainRange=null
      returns valid HeroState shape with null fields where appropriate; templates
      still render (unresolved slots remain as `{{path}}` placeholders for
      author visibility).

      WS-143 (HandReplay first-consumer wire) UNBLOCKED. Cross-program
      (design Gate 1+4 required since it's a UX change). After WS-143:
      WS-013 (SCF Gate 5 leak-rule wiring) — Master Plan §D Phase 5.
