      SHIPPED — OnlineView inline-styles → Tailwind migration end-to-end.

      File-level changes (26 files in src/components/views/OnlineView/):
        - Phase 1 (top-3): LiveRecommendations.jsx (84) + OnlineView.jsx (25, includes F9 fix) + SeatGrid.jsx (24)
        - Phase 2 (mid-tier): ComboDistributionPanel (23) + Tier1_GlanceStrip (19) + ExtensionPanel (18) + SeatDetailPanel (18)
        - Phase 3 (panels/*): StreetTendenciesPanel + AllRecommendationsPanel + AwarenessPanel + FoldBreakdownPanel + VulnerabilitiesPanel + FoldCurvePanel + ModelAuditPanel + BucketEquityPanel + FlopBreakdownPanel + HandTypePanel
        - Phase 4 (sub-components): HandPlanTree + VillainBrief + RangeAdvantageBar + VulnerabilityCallout + CompactSeatStrip + SupportingObservations + BlockerInsightStrip + BoardTexturePills + MiniCard

      Inline-style count: 345 → 180 (48% reduction).
      Remaining 180 are all category 2/3/6 per migration rules — dynamic colors,
      designTokens.js refs, runtime-computed values, color-bearing borders. All
      MUST stay inline per D2.

      F9 fix: Both Import buttons (empty-state at lines 199-211 + populated at
      lines 244-256) unified to `bg-gray-700 border border-gray-600 px-4 py-2
      rounded-md text-[13px] min-h-11`. Empty-state retains gold text
      (text-[#d4a847]); populated retains gray text (text-gray-400) — only SIZE
      unified per F9 spec, colors preserved to minimize visual change.

      Verification:
        - npm run build → clean in ~7s
        - npx vitest run src/components/views/OnlineView/__tests__/ → 36/36 invariants pass (6 pre-existing skipped)
        - bash scripts/smart-test-runner.sh → 9980 passed / 30 skipped / 0 failures (402 test files; ZERO regressions vs SPR-038 baseline)

      Migration rules applied per category (founder D2):
        - Layout (display/flex/gap/align/justify) → Tailwind utilities
        - Box (padding/margin/width/height) → Tailwind utilities (4px base = 1 unit; arbitrary [Npx] for non-standard)
        - Typography (fontSize/fontWeight/lineHeight/letterSpacing) → Tailwind utilities
        - Static color from designTokens.js → kept inline (TEXT.muted, GOLD.base, BORDER.default, SURFACE.inset, etc.)
        - Dynamic computed color (x ? GREEN : RED, ACTION_COLORS[k]?.base) → kept inline
        - Border-color combinations → split: border + Tailwind class, color → inline borderColor/borderLeftColor/etc.
        - Off-palette literal hex (#0d1117, #16213e, #d4a847, #2a2a4a, etc.) → Tailwind arbitrary value (bg-[#0d1117])
        - Standard-Tailwind-palette literal hex (#22c55e, #ef4444, #6b7280, etc.) → Tailwind named class (text-green-500, etc.)
        - sectionHeader spread pattern (8 panels) → SECTION_HEADER_CLASSES const + minimal inline color/borderColor

      Out of scope (deferred):
        - F7 (≥44×44 touch targets for badges/chips) — design call, separate sprint
        - New computed-style test infrastructure (would lock F7 via tests if pursued)
        - Cross-app inline-style audit beyond OnlineView

      Visual verification: NOT performed in this session (terminal-based; dev server
      walkthrough at 1600×720 left for founder check). Defensive guards: invariant
      tests assert DOM structure (not className), so 36/36 green confirms no DOM
      changes. Pixel-level visual regression NOT mechanically verified.

