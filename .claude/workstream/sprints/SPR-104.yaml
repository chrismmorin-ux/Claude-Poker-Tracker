goal: |
  Turn/river HSP archetype routing becomes precise from action-history alone.
  Callers (HandReplay, SCF, future live coach) no longer have to pass
  gameState.actionContext explicitly for buildHeroState() to route to the right
  WS-153 archetype — buildHeroState.deriveActionContext() reconstructs
  BARREL / VS_BARREL / PROBE / CBET (delayed) / VS_DONK from gameState
  .actionSequence per street, and optionally derives sizingFraction from
  pendingBetSize / pot for RIVER_BLOCK_BET / RIVER_VS_BLOCK_BET routing.

program_focus: domain-correctness
program_initiative: |
  Direct follow-up to SPR-103 (HSP v2 turn+river close-out). SPR-103 shipped
  the 44-archetype classifier (WS-153) with a closest-match fallback chain
  (CBET on turn → TURN_DELAYED_CBET; VS_CBET → VS_BARREL family) that keeps
  the always-valid-archetype contract intact but loses BARREL vs DELAYED-CBET
  vs PROBE precision unless callers supply gameState.actionContext. WS-211
  closes that precision gap at the orchestrator layer — caller burden drops,
  HSP v2 routing becomes self-contained on action history.

  domain-correctness program: critical tier, founder-priority 1, health 5.

