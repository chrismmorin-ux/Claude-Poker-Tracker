items:
  - id: "WS-211"
    title: "HSP — Orchestrator deriveActionContext() upgrade for turn/river precision"
    mode: execute
    effort: M
    priority_score: 15.0
    program: domain-correctness
    status: done
    started_at: "2026-06-04T00:00:00Z"
    completed_at: "2026-06-04T00:00:00Z"
    completion_notes: |
      Shipped Path A (heroState-local) — 4 helpers + deriveActionContext extended for
      turn/river when heroSeat present + sizingFraction derived from pendingBetSize/pot.
      +19 tests; 182/182 heroState green; build clean. Vocab-reuse audit recorded in
      queue/WS-211.yaml. Impact-zone clean modulo pre-existing date-aged flake at
      conceptMastery.test.js:120 (independent of WS-211).
    decision_flags: []
    decisions_resolved:
      - "Reuse-vs-local accumulator question → Path A (IMPLEMENT-LOCAL). Founder ratified 2026-05-31. See sprint composition_notes for audit + rationale."
    blocked_by: []
    files_involved:
      - "src/utils/heroState/buildHeroState.js (extend deriveActionContext for turn/river; optionally derive sizingFraction from pendingBetSize/pot)"
      - "src/utils/heroState/__tests__/buildHeroState.test.js (new action-history scenarios; BARREL/VS_BARREL/PROBE/CBET-delayed/VS_DONK coverage)"
    implementation_notes: |
      Path A scope (founder-ratified):

      1. Add local helpers in buildHeroState.js (alongside countPreflopRaises,
         which is the precedent for this pattern):
           - wasHeroPreflopAggressor(actionSequence, heroSeat) → boolean
           - findStreetAggressor(actionSequence, street) → seat | null
           - heroBetStreet(actionSequence, street, heroSeat) → boolean
           - villainBetStreet(actionSequence, street, heroSeat) → boolean
         Each filters actionSequence per street and inspects action verbs
         (bet | raise) per seat. Mirror the patterns in
         skillAssessment/deriveSituationKey.js (lines 131-147 for
         preflopAggressor; 125-129 for findLastAggressiveAction) but kept
         heroState-local for the dependency-direction reason captured above.

      2. Extend deriveActionContext(gameState) for turn:
           - BARREL          — hero bet flop AND bets turn (current action)
           - VS_BARREL       — hero called flop, faces turn bet
           - PROBE           — flop checked through, hero leads turn OOP
           - CBET (delayed)  — hero checked back flop IP, bets turn
           - VS_DONK         — hero was PFA, villain donks turn (no flop bet
                                from hero — villain takes betting lead on turn)
         Closest-match fallbacks for unrecognized patterns: continue to return
         CBET / VS_CBET per current v1 heuristic so always-valid contract holds.

      3. Extend deriveActionContext(gameState) for river: same 5 contexts
         applied to river street with prior-street action history. Triple-
         barrel pattern collapses to BARREL (axis is just "hero bets the
         river", not "hero bet flop AND turn AND river"). DELAYED on river
         means hero checked back turn IP and now bets river.

      4. Optional (per accept_criterion): derive gameState.sizingFraction
         from (gameState.pendingBetSize / gameState.pot) when both fields
         are present AND caller did NOT supply sizingFraction explicitly.
         Add to buildSituation alongside the existing caller-supplied path
         at lines 165-167. Preserves classifier's RIVER_BLOCK_BET routing
         when caller forgets to pass sizingFraction.

      5. Tests: extend buildHeroState.test.js with action-history-only
         scenarios. Each scenario constructs gameState.actionSequence and
         asserts the expected archetypeId without setting gameState
         .actionContext. Coverage matrix:
           - Turn BARREL (PFA, bet flop, bet turn) → TURN_*_BARREL_*
           - Turn VS_BARREL (PFC, called flop, vs turn bet) → TURN_*_VS_BARREL_*
           - Turn PROBE (PFC, flop checked through, hero leads turn) → TURN_PROBE
           - Turn DELAYED CBET (PFA IP, checked back flop, bets turn) → TURN_DELAYED_CBET
           - Turn VS_DONK (PFA, villain donks turn) → TURN_VS_DONK
           - All 5 mirrored on river
           - sizingFraction derivation from pendingBetSize/pot when caller
             omits it (RIVER_BLOCK_BET routing)
           - Backward-compat: caller-supplied actionContext still wins
             (early-return at line 93 unchanged)
           - All 12 turn + 14 river archetypes reachable via action-history-
             only scenarios per accept_criterion

      6. Record vocab-reuse audit in completion_notes:
           - Confirm: deriveSituationKey shape-matches but layer-inversion
             precluded direct import.
           - Identify extract-to-shared-module as a follow-up if/when a 3rd
             consumer surfaces.
           - First-principles guard preserved: derivedActionContext is an
             output of action-history reconstruction; routing follows.
             archetypeId stays OUTPUT-only (POKER_THEORY §7 binds).

      Acceptance bar (from WS-211):
        - All accept_criteria addressed.
        - 163/163 heroState tests green (plus new ones).
        - Full impact-zone suite green (HandReplayView + skillAssessment +
          shapeLanguage — no consumer regressions).
        - Production build clean.

