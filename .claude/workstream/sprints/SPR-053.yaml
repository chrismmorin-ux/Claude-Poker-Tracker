  (after SPR-049 LSW phase B HU close-out 2026-05-07; SPR-048 multiway
  bucket-EV engine 2026-05-07). 4-sprint sequence on poker-theory
  integrity in 36 hours: SPR-048 → SPR-049 → 3 launch sprints SPR-050/051/052
