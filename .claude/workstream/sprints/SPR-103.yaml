    completion_notes: |
      Founder ratified Option B (14 archetypes: 12 turn-mirror + BLOCK_BET/VS_BLOCK_BET
      pair) via AskUserQuestion 2026-05-30, after the design proposal flagged §4.1
      "shared archetype + adjustments" rule against the original ticket's ~8-entry
      hand-class-proliferation shape. Authored §4.5 taxonomy table + §4.5.1
      implementation policy (mirrors §4.4 + §4.4.1 structure) and 14 CONVENTIONS-
      compliant river templates at docs/design/hero-state-templates/river/.

      Zero src/ changes — types.js enum extension + loadTemplates glob extension
      + classifyArchetype routing all deferred to WS-153 (same scope-boundary
      discipline as WS-151; keeps reachability + "loads all 18" tests green while
      the classifier still throws for river).

      122/122 heroState tests green (matches SPR-102 baseline exactly — markdown-
      only change is invisible to the still-scoped {preflop,flop} glob). First-
      principles guard preserved: every numeric is a slot, archetype IDs are
      OUTPUTS only. Block-bet detection policy documented for WS-153 prep
      (sizingFraction <= 0.40 → BLOCK_BET / VS_BLOCK_BET routing).

      No separate RIVER_BLUFF_CATCHER or RIVER_THIN_VALUE archetype (hand-class
      framing folds into RIVER_*_VS_BET / RIVER_*_BET bodies per §4.1). BLOCK_BET
      pair IS separate because small-sizing is a different decision tree, not a
      hand-class variant — rationale documented inline in §4.5.

      WS-153 unblocked.
