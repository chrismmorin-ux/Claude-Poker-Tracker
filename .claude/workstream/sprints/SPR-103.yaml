  - id: "WS-153"
    title: "HSP-B3 — Extend classifyArchetype() to turn + river (remove NotImplementedError)"
    mode: plan-first
    effort: M
    priority_score: 13.0
    program: domain-correctness
    status: done
    started_at: "2026-05-30T12:30:00Z"
    completed_at: "2026-05-30T13:00:00Z"
    completion_notes: |
      classifyArchetype extended to turn (12 archetypes) + river (14 archetypes).
      NotImplementedError throw REMOVED. Architectural audit resolved Decision #2
      cleanly: src/utils/decisionAccumulator.js does NOT exist at the ticket's
      asserted path (closest matches are exploitEngine/, skillAssessment/, and
      decisionSystems/accumulator/). More fundamentally, the classifier doesn't
      reconstruct action history — it consumes opaque axes.actionContext (an
      output of buildHeroState.deriveActionContext). The accumulator-vocab-reuse
      question therefore had no integration point in the classifier; it's
      properly a buildHeroState orchestrator concern, deferred to a follow-up
      ticket (see status_note).

      Changes (4 src files + 3 test files):
        - types.js: ARCHETYPE_IDS 18→44 (+12 turn +14 river); ARCHETYPE_FAMILIES
          11→29 (+8 turn +10 river); added optional sizingFraction to Situation
          typedef for river block-bet routing.
        - loadTemplates.js: glob extended {preflop,flop}→{preflop,flop,turn,
          river}; bundles all 44 templates at Vite build time.
        - classifyArchetype.js: added classifyTurn (mirrors classifyFlop
          discipline) + classifyRiver (mirrors + sizingFraction routing for
          BLOCK_BET / VS_BLOCK_BET at threshold <=0.40 per §4.5.1); removed the
          turn/river throw; added sizingFraction axis; refreshed module JSDoc
          (44 IDs, fallback policy across all 4 streets).
        - buildHeroState.js: ARCHETYPE_FAMILY_MAP extended with 26 new entries;
          buildSituation reads gameState.sizingFraction (caller-supplied);
          classifyArchetype call site passes sizingFraction through.

      Tests:
        - classifyArchetype.test.js: 32→72 (+40 net). Removed "deferred-throws"
          block (2 tests). Added 4 v2-implemented sanity + 12 turn happy + 3
          turn edge + 14 river happy + 9 river edge (incl. sizingFraction
          boundary, undefined, IP-anomaly, multiway dominates) + 44-ID
          reachability smoke.
        - loadTemplates.test.js: count assertion 18→44.
        - buildHeroState.test.js: replaced 2 throw-assertion tests with 3 new
          ones (turn returns TURN_*, river returns RIVER_*, sizingFraction
          passthrough produces RIVER_BLOCK_BET). 25 tests total (+1 net).

      Verification:
        - 163/163 heroState tests green.
        - 772/772 tests green across impact zones (heroState + HandReplayView +
          shapeLanguage + skillAssessment).
        - Production build clean (15.22s, 44 templates bundled, PWA SW
          regenerated).
        - External callsites audit (HeroStateSection.jsx + 2 lessonRegistries):
          all use only parseFrontmatter (unchanged) or buildHeroState (backward-
          compatible — turn/river now succeed instead of throwing, strict
          improvement). No callsite imports ARCHETYPE_IDS/FAMILIES/classifier
          directly outside heroState/.

      First-principles guard preserved: archetypeId is OUTPUT of classification,
      never INPUT to plan computation. Block-bet routing reads sizingFraction
      (derived from game state pendingBet/pot by caller), not from archetype
      label. All template numerics remain slot-only.

      Follow-up surfaced (NOT WS-153 scope): buildHeroState.deriveActionContext()
      v1 heuristic emits only CBET/VS_CBET. For accurate turn/river archetype
      routing without explicit caller-supplied actionContext, the orchestrator
      needs to distinguish BARREL / PROBE / DELAYED-CBET / VS_DONK from
      prior-street action history. Callers wanting precise routing should pass
      gameState.actionContext explicitly until that lands. Closest-match
      fallbacks (CBET on turn → TURN_DELAYED_CBET; VS_CBET on turn → VS_BARREL
      family) keep the contract "always return a valid archetypeId" intact.
    decision_flags:
      - "Reuse decisionAccumulator action-history vocab, or keep heroState-local?"
    decisions_resolved:
      - "Architecturally MOOT — audit found src/utils/decisionAccumulator.js does not exist; classifier doesn't reconstruct action history (consumes opaque axes.actionContext from upstream orchestrator). Buildheroh-state-side derivation upgrade is a separate follow-up ticket."
