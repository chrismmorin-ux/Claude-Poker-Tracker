      - "src/utils/heroState/__tests__/classifyArchetype.test.js (rewritten 32→72)"
      - "src/utils/heroState/__tests__/loadTemplates.test.js (count 18→44)"
      - "src/utils/heroState/__tests__/buildHeroState.test.js (turn/river tests replaced)"
    decision_flags:
      - "Reuse decisionAccumulator action-history vocab, or keep heroState-local?"
    blocked_by:
