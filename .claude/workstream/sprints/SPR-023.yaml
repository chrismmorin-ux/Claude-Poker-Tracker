goal: |
  Dismissing the version-mismatch banner becomes a clearly-degraded state
  instead of a silent suppress. The user always knows when the app is
  operating with stale extension data, and advice that depends on mismatched
  fields is suppressed rather than rendered confidently. Direct continuation
  of WS-076 (SPR-022) — the just-shipped sprint preserved the
  `dismissVersionMismatch` hook point and "Continue Anyway" button
  explicitly so WS-077 could pick up here.

