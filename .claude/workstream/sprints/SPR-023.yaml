items:
  - id: "WS-077"
    title: "Continue Anyway graceful degradation (DCOMP-W4-A3-F5) — sibling to WS-076; persistent amber pip + suppress mismatched-field advice + log for later review"
    mode: plan-first
    effort: M
    status: done
    completion_notes: |
      Plan-mode captured 3 owner decisions (AskUserQuestion 2026-05-02):
        1. Semantic split: decouple dismissedDespiteMismatch from versionMismatch (vs keeping current full-resume behavior or stricter all-extension-data suppression)
        2. UX: separate amber AlertTriangle icon next to green dot (vs 3-state dot or sticky banner)
        3. Persistence: sessionStorage-backed (vs in-memory only)

      Implementation across 6 files:
        - src/utils/versionMismatchStorage.js — appended writeDismissedFlag/readDismissedFlag/clearDismissedFlag (DISMISS_KEY='versionMismatchDismissed', no TTL — session lifetime)
        - src/hooks/useSyncBridge.js — new dismissedDespiteMismatch state (init from sessionStorage), STATUS handler reads dismiss flag from sessionStorage to gate hand-imports (mismatched + dismissed = un-gated; mismatched + !dismissed = gated), auto-clears on version reconvergence; dismissVersionMismatch sets dismissedDespiteMismatch=true + writeDismissedFlag + ref=false (un-gates imports per user choice) — no longer flips versionMismatch=false
        - src/contexts/SyncBridgeContext.jsx — added dismissedDespiteMismatch to useMemo deps
        - src/contexts/OnlineAnalysisContext.jsx — passes versionMismatch ? null : liveHandState to useLiveActionAdvisor (suppresses live advice regardless of dismiss state — liveHandState is the most version-sensitive surface)
        - src/components/views/OnlineView/OnlineView.jsx — destructured dismissedDespiteMismatch; banner gate now versionMismatch && !dismissedDespiteMismatch; new inline AlertTriangle pip (lucide-react size=14, amber #fbbf24, click → setShowReloadConfirm(true), title + aria-label tooltip) shown when versionMismatch && dismissedDespiteMismatch
        - 4 test files updated:
          - src/utils/__tests__/versionMismatchStorage.test.js — added 7 dismiss-flag tests including independent-key cross-talk verification
          - src/contexts/__tests__/OnlineAnalysisContext.test.jsx — converted module mock to mutable mockSyncBridge + spied liveActionAdvisor; added 2 WS-077 tests verifying liveHandState passes through when versions match and null passes through when mismatched
          - src/components/views/OnlineView/__tests__/OnlineView.invariants.fixture.js — added dismissedDespiteMismatch:false default + 2 fixture rows OV-VM-006 (banner-visible-pip-absent pre-dismiss) + OV-VM-007 (pip-visible-banner-hidden post-dismiss)
          - src/components/views/OnlineView/__tests__/OnlineView.invariants.test.jsx — added WS-077 describe block: 3 interaction tests (pip click reopens modal; pip absent when no mismatch; pip absent when mismatch but not dismissed)

      Verification:
        - 17/17 versionMismatchStorage (10 reload + 7 dismiss; cross-talk verified)
        - 4/4 OnlineAnalysisContext
        - 42/48 OnlineView invariants (6 pre-existing gap skips; 2 new fixture rows + 3 new WS-077 interaction tests all green)
        - 5/5 SyncBridge sibling consumers (SyncBridgeContext + OnlineSessionContext + TournamentBridge — confirmed dismissedDespiteMismatch addition didn't regress)
        - 9477/9507 full app smart-test-runner (30 pre-existing skipped); 368/368 test files (zero spawn errors this run, unlike SPR-022 verification)
        - npm run build clean (5.41s)

      Out of scope:
        - pushExploits/pushTournament suppression (extension validates incoming wire-schema; defended on extension side)
        - Per-field allowlist for advice suppression (no contract fingerprint to scope by; all-or-nothing on liveHandState is the right v1 grain)
        - Telemetry channel (existing logger.warn sufficient)
        - Localized re-prompt mechanism (sessionStorage handles boundary naturally)

      Backward-compat with WS-076 confirmed:
        - Banner-button → modal flow unchanged (banner now gated on !dismissedDespiteMismatch, but pre-dismiss the gate is naturally true)
        - postReloadStatus=='still-mismatched' auto-open path preserved
        - postReloadStatus=='recovered' success-toast path preserved
        - Both flags use independent sessionStorage keys (verified by cross-talk test)
    finding_id: null
    decision_flags:
      - "Persistent indicator location + shape: extend the existing connection-indicator dot at OnlineView.jsx:67-74 to a 3-state (gray=disconnected / green=connected / amber=connected-but-mismatch-dismissed)? Separate icon? Slim sticky header banner? Click target = re-open the WS-076 modal?"
      - "Mismatched-fields definition: without contract fingerprint (deferred per WS-076), all extension-derived advice is potentially version-sensitive. Choose between (a) suppress all extension-derived advice when dismissed, (b) suppress only specific advice surfaces, (c) curated allowlist of fields safe across version boundaries"
      - "Logging surface: logger.warn already fires on mismatch detection. Does 'log for later review' need a dedicated telemetry channel, or is the existing logger.warn sufficient?"
      - "Dismissed-state persistence: today dismissVersionMismatch is in-memory only; refresh resets. Should it survive refresh via sessionStorage (like WS-076's verify flag) so user isn't re-prompted on every reload while mismatch persists?"
      - "Backward compatibility with WS-076: ensure WS-077 changes don't break the post-reload flow (sessionStorage flag clear path, recovered toast, still-mismatched auto-open modal). The dismissed-state and post-reload-status state interact — if user dismissed pre-reload, then reloads, what's the expected post-reload behavior?"
