goal: |
  Sidebar street-card animation can no longer leak its `animating` class
  on Android thermal throttle. A coordinator-scheduled 300ms safety timer
  fires the post-animation cleanup if the native `animationend` event
  doesn't fire (e.g., GPU-throttled, browser tab backgrounded).

