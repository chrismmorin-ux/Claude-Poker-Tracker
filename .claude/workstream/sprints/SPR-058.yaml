            callback bound to listener ({ once: true }) and safety timer
            (FADE_IN_CLEANUP_MS = 300ms).
        - ignition-poker-tracker/side-panel/__tests__/fade-in-safety-timer.test.js
          (new, 6 source-grep regression tests):
          - Constant declarations exist (FADE_IN_CLEANUP_TIMER_KEY +
            FADE_IN_CLEANUP_MS=300)
          - scheduleTimer(FADE_IN_CLEANUP_TIMER_KEY) called exactly once
          - clearTimer(FADE_IN_CLEANUP_TIMER_KEY) called in 3 sites
          - animationend listener preserved (safety timer is a fallback,
            not a replacement)
          - cleanupFadeIn callback name anchored (single shared callback
            for both paths makes dual-path symmetry obvious)

      AC walkthrough:
        - "render-street-card.js:186 — GPU-skip fallback (coordinator-
          scheduled 300 ms) prevents class leak on Android thermal
          throttle" ✓ FADE_IN_CLEANUP_TIMER_KEY scheduled at 300ms via
          _timerHost; bound to same cleanupFadeIn callback as the
          animationend listener; idempotent (whichever fires first wins,
          second is a no-op via { once: true } + classList.remove
          idempotence).

      Doctrine alignment:
        - RT-60 timer registry: safety timer flows through _timerHost
          (coordinator), not bare setTimeout — preserves cancel-on-
          lifecycle invariant.
        - RT-50 cancel-on-rerender: top-of-render clear added so a new
          render call cancels any pending safety timer (the timer's
          captured callback would still operate on the same element, but
          a stale callback could conflict with a new fade — better to
          cancel and let the next fade re-schedule).
        - SR-6.3 indirection: scheduleTimer / clearTimer pattern matches
          existing TRANSITION_TIMER_KEY + HEIGHT_RELEASE_TIMER_KEY
          discipline.

      Vital signs:
        - Extension tests in isolation: 6/6 pass (2ms)
        - Full extension suite: 2307/2307 (+6 net vs SPR-057 baseline
          2301; zero regressions)
        - Extension build: clean
        - Full smart-test-runner (app side): 10291/10311 (20 skipped,
          0 failed; same as SPR-055/057 baseline)
        - App build: clean

      Owner verification (real-world):
        Open extension on Android device under thermal load (or simulate
        via Chrome DevTools "Rendering > Emulate paused/throttled
        animations"). Trigger a street transition (preflop → flop). The
        .fade-in class should be removed within 300ms regardless of
        whether animationend fires. Without the fix, throttled devices
        accumulate the .fade-in class state and the next street's fade
        animation no-ops (CSS animations don't restart when re-adding
        an already-present class).

