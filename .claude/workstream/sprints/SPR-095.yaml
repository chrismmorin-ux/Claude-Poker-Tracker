goal: |
  Range Lab's per-street range evolution becomes fast enough to ship,
  and the numbers it surfaces are provably consistent with the Line
  Study (LSW) lessons that cross-link to it.

  WS-205 adds a Float64Array per-combo equity cache computed at
  flop-paint-finalize so turn/river narrowing is a filter+weight
  operation (~10ms/turn-card) rather than a full per-frame recompute.
  WS-206 locks theoretical consistency: a CI parity test asserts LSW's
  asserted equity == RL's computed equity within tolerance, so an engine
  change can't silently break authored drill content.

program_focus: engineering
program_initiative: |
  Direct downstream of SPR-093 Gate 2 Blind-Spot Roundtable and the
  explicit deferral note in SPR-094 ("WS-205 — natural anchor for a
  focused engineering sprint next cycle; WS-206 — sequence after
  WS-205"). This is the engineering Phase-0 batch that unblocks Range
  Lab Phase 1+ implementation (WS-056/WS-057) and the DS-55 content-
  validation JTBD.

  Cross-program: WS-205 is engineering, WS-206 is domain-correctness
  (Poker Theory Integrity) — the parity invariant enforces theoretical
  consistency between two surfaces, keeping the critical program active.

