    accept_criteria_summary: |
      1. docs/HERO_STATE_DESIGN.md §7.4 multiway model design ratified
      2. Multiway archetype family enumerated + templates authored at
         docs/design/hero-state-templates/multiway/
      3. FLOP_MULTIWAY v1 stub deprecated (or replaced inline) with link
      4. equityVsRangeParts handles sequential-decision conditioning when
         villain count > 2
      5. Plan computation reflects multiway bluff-frequency reduction WITHOUT
         hardcoded multipliers (first-principles guard: derive from equity
         decomposition + pot odds + players remaining)
      6. Unit tests cover ≥3-way flop scenarios end-to-end
    plan_mode_focus: |
      Plan-mode goals:
        (a) Walk the founder through the 5 candidate multiway archetypes
            (MULTIWAY_SRP_VS_PFR_AND_CALLER, _AS_CALLER_PFR_BEHIND,
            _AS_CALLER_PFR_ACTED, MULTIWAY_3BP_FLOP, MULTIWAY_LIMP_FLOP) and
            confirm scope — own family vs flop-family flag.
        (b) Specify the pairwise-conditioning contract for equityVsRangeParts:
            villain₂'s range-given-call conditions on villain₁'s prior action.
            Document the case where full ordering matters (rare in practice;
            note when it becomes load-bearing).
        (c) Derive bluff-frequency reduction from first principles:
            pot-odds dilution (multiway pots inflate calling-range value);
            capped caller ranges (flop callers typically capped, would have
            raised with strongest hands preflop). Adjustment is computed from
            game state, NOT a player-count multiplier.
        (d) Identify scope-balloon candidates: which archetypes require new
            slot vocabulary? Which require equityVsRangeParts extension vs
            pure template work? Founder ratifies child-ticket-vs-fold-in
            split at this point.
        (e) Lock down the test matrix before authoring (≥3 archetypes covered
            end-to-end; sequential-decision conditioning verified;
            first-principles bluff-frequency guard tested).

