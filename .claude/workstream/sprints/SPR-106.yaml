      gameTreeEvaluator already multiway-aware; ~80% of pre-figured
      engine work was already shipped). Three founder decisions:
        D1: 3-archetype potType split + multiwayHeroRole descriptor slot
        D2: equityVsRangeParts MULTIWAY throw lifted (null role partition
            + populated overall); buildHeroState:519 dead-code guard fix
        D3: Ship in-sprint, zero child tickets upfront; v3_TODO frontmatter
      Delivered: §7.4 design-doc RESOLVED + 3 new templates +
      FLOP_MULTIWAY catch-all body rewrite + types.js v3 catalog (47 IDs;
      MULTIWAY_HERO_ROLES enum; multiwayHeroRole typedef) +
      classifyArchetype potType-routed multiway block +
      buildHeroState.deriveMultiwayHeroRole() + ARCHETYPE_FAMILY_MAP
      extensions + equityVsRangeParts skipRolePartition pattern +
      18 net new tests (8 classifier + 5 e2e + 1 equityVsRangeParts
      behavior + cascading updates).
      239/239 heroState; gameTreeEvaluator 193/193 paranoia;
      HeroStateSection 21/21; production build 12.41s clean;
      smart-test-runner 11901/1 pre-existing flake/20 skipped.
      First-principles guard preserved: bluff-freq DERIVES from ∏ fold
      rates (multiwayFoldPct); equity DERIVES from 0.85^(n-1)
      (adjustedRealization); no hardcoded multiway multiplier; archetype
      / hero-role / potType are all OUTPUTS, never INPUTS to plans.
