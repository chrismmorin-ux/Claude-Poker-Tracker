      - "Archetype family scope — own MULTIWAY_* namespace vs flop-family multiway flag"
      - "Sequential-decision modeling depth — pairwise conditioning vs full ordering"
      - "Scope-balloon handling — spawn child tickets vs fold into this sprint"
    blocked_by: []
    files_involved:
      - "docs/HERO_STATE_DESIGN.md (rewrite §7.4 multiway model design)"
      - "docs/design/hero-state-templates/multiway/ (NEW — archetype templates)"
      - "src/utils/heroState/classifyArchetype.js (extend ARCHETYPE_IDS + multiway dispatch)"
      - "src/utils/heroState/equityVsRangeParts.js (extend for sequential-decision conditioning)"
      - "src/utils/heroState/buildHeroState.js (extend for multiway routing)"
      - "src/utils/heroState/types.js (extend ARCHETYPE_IDS + multiway-specific fields if needed)"
