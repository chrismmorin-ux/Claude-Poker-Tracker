  Sprint 3 of 5 in the Invariant Coverage Program (charter at
  .claude/projects/invariant-coverage-program.md). Solo-anchor by design —
  exploitEngine is the densest surface (15+ decision functions; this audit
  scopes to 2 highest-stakes ones). Effort estimate uses full M-effort budget.

  Two pre-execution decisions settled before plan-mode entry:
