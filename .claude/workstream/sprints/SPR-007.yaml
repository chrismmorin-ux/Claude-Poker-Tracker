      deserves the broader matrix; cherry-picking would leave silent gaps

  Plan-mode design will use 2 Explore agents (one per function) to map
  inputs/outputs deeply enough to author fixture rows without surprises.
  Per CLAUDE.md Poker Analysis Guardrail, design pass MUST read POKER_THEORY.md
  and src/utils/exploitEngine/CLAUDE.md before fixture authoring.
