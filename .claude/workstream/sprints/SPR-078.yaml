goal: |
  Extract the unnamed 4-instance "decision-system" pattern (engine logic + IDB
  store + reducer + hook + context+view) into shared infrastructure at
  src/utils/decisionSystems/. Migrate anchorLibrary as the proof-of-pattern
  instance (most mature, smallest blast radius from a migration mistake). Ratify
  the pattern with an ADR. PMC Phase 5b is the 5th instance waiting to be built —
  this sprint stops the build cost from repeating and stops the existing 4
  instances from drifting further.

