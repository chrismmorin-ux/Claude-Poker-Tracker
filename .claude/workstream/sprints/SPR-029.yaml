       JTBD identification, gap analysis
    2. Gate 4 surface spec (docs/design/surfaces/hero-state-handreplay.md)
       — interaction model, visual hierarchy, state coverage
    3. Implementation — wire buildHeroState() output into HandReplayView's
       ReviewPanel; render headline/body/branchSummary; canonical-vs-actual
       comparison

  Master Plan rhythm:
    SPR-024..SPR-027: HSP build (4 sprints, all foundation+primitives+orchestrator)
    SPR-028: queue hygiene (1 sprint variety — WS-115 stale P0 closure)
    SPR-029: WS-143 — HSP first-consumer wire (this sprint)
    SPR-030+: WS-013 (SCF Gate 5 leak-rule wiring) — Master Plan §D Phase 5

  Cap status: M = ~1.5 sessions tagged. First non-over-cap sprint in 4.
  Founder-flagged in SPR-027 retro that 3 consecutive over-cap sprints
  warranted re-baselining; SPR-029 returns to standard ceremony.

