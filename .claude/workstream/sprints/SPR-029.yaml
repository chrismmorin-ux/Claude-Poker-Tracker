goal: |
  HeroState renders post-hand in HandReplay review — hero can see canonical
  reasoning frame side-by-side with their actual decision. Closes the HSP
  build-out (Master Plan §D Phase 5 unblock) and ships the first HSP
  consumer surface.

  WS-143 is a cross-program ticket: domain-correctness (HSP origin) +
  design (UX-touching change requires Gate 1+4 per docs/design/LIFECYCLE.md
  guardrail). The 3 deliverables are all in this single ticket per the
  founder-set scope:
