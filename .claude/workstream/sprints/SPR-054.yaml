    notes: |
      SHIPPED in ~15 min actual (S-actual cadence matching SPR-043/044/045/047 precedent for the boundary-hardening cluster; well under M tag).

      Investigation surfaced clarifications to the AC framing:
        - renderSeatArc already had the fast-path at side-panel.js:1129
          (predates this ticket — kept).
        - tourneyTimer 1Hz interval body only updates textContent of the
          timer-id span. It does NOT cascade to innerHTML rebuilds. The
          flicker source is the unconditional writers (renderPipelineHealth,
          renderPidSummary, updateAppStatus, also renderSeatArc previously).
        - "tourneyTimer rebuilds innerHTML 60×/min" in the original AC
          appears to be a misattribution from the legacy backlog
          (RT-82). Real cause: those 4 zones writing on every snap.

      Fast-paths added at 4 zones (per AC):
        1. writeAppStatusBadge (shared/render-status.js) — canonical writer
           gains idempotent same-tier early-return guard via the existing
           data-app-status-tier attribute. INV-STATUS-1 contract preserved
           (single canonical writer; tier+text still paired). Production +
           harness paths both benefit.
        2. writePipelineStageDot (shared/render-status.js) — analogous
           same-tier guard via data-pipeline-tier attribute. Each of
           renderPipelineHealth's 5 setDot calls now no-ops when the dot
           is already at the requested tier.
        3. renderPipelineHealth detail.innerHTML + counterEl.textContent
           (side-panel.js) — closure-captured lastPipelineDetailHtml +
           lastPipelineCounterText. Compare-and-skip per zone.
        4. renderPidSummary innerHTML (side-panel.js) — closure-captured
           lastPidSummaryHtml. Compare-and-skip.

      Tests:
        - 6 new idempotency tests in side-panel/__tests__/status-registry.test.js
          covering both writers (same-tier skip; different-tier write; 5-stage
          render cycle no-op).
        - Existing 55 status-registry tests + 2279 full extension suite all
          green. Zero regressions.

      Builds:
        - npm run build (extension): clean
        - npm run build (app): clean

      Owner verification (real-world, NOT covered by static tests):
        Open the extension in steady-state operation; observe the tournament
        bar + pipeline strip. Should no longer flicker on each snap. The
        canonical-writer fast-paths cover the dot/badge slots; the closure
        fast-paths cover the innerHTML/textContent zones. If flicker persists,
        check whether some other writer not on the AC list (e.g.
        renderTournamentPanel itself, called per push_tournament event,
        not per-snap) is the source — that would warrant a follow-up ticket.

