status: completed
goal: |
  Two more SCF leak rules ship from the leak-catalog. Founder picked
  Cluster B (flop-continuation gap closure) in plan-mode: hero-oop-cbet-
  overfold + hero-flop-vs-donk-misresponse. Closes flop-continuation 3/3.

