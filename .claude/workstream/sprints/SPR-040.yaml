  had `:bet:cbet` 7th-axis entries that didn't match the rule's emitted
  `:bet:vsBet`. The reverse-map was dead code pre-SPR-040 (always
  returned null for fired leaks; sub-concept resolution silently fell
  back to umbrella). Migrated to correct 8-axis `:vsBet:pfc` keys —
  now actually resolves. Documented in SITUATION_KEY_TO_CONCEPT comment.

