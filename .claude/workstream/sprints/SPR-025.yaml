id: "SPR-025"
title: "HSP build — equityVsRangeParts role-translator + classifyArchetype"
status: completed
goal: |
  Hero State Primitive (HSP) reaches v1 by landing the two pure functions that
  the buildHeroState orchestrator (WS-142) wires together:
    - WS-144 (HSP-B0): src/utils/heroState/equityVsRangeParts.js — thin role
      translator producing the {vsValue, vsBluff, vsDraw, vsAir} 4-class
      equity partition by composing rangeSegmenter + villainProfileBuilder +
      gameTreeEquity. Full API spec already authored by SPR-024's WS-137
      audit (docs/HERO_STATE_DESIGN.md §9.3).
    - WS-141 (HSP-B1): src/utils/heroState/classifyArchetype.js — pure
      function mapping (gameState, heroHand, villainModel) → archetypeId
      ∈ {8 preflop archetypes ∪ 10 flop archetypes}. Turn/river throw
      NotImplementedError per v1 scope per HERO_STATE_DESIGN.md §4.

  Together these unblock WS-142 (buildHeroState orchestrator), which
  unblocks WS-143 (first-consumer HandReplay wire), which unblocks WS-013
  (SCF Gate 5 leak-rule wiring) — the deferred Master Plan §D Phase-5
  entry. SCF Gate 5's accept criterion ("1-2 leak rules wired end-to-end")
  needs a canonical hero-state baseline that this sprint delivers.

  Master Plan rhythm:
    SPR-022: WS-076 (engineering — P0 break)
    SPR-023: WS-077 (engineering — P0 sibling)
    SPR-024: WS-140 + WS-137 (HSP foundation: type schema + partitioning audit)
    SPR-025: WS-144 + WS-141 (HSP build: role-translator + archetype classifier)
    SPR-026+: WS-138/139/142 (archetype authoring + orchestrator) → WS-143 → WS-013

  First-principles guard (POKER_THEORY.md §7 + exploitEngine/CLAUDE.md
  anti-patterns) binds both items: archetypeId is an OUTPUT of classification,
  never an INPUT to plan computation. Plans derive from equity / SPR / pot
  odds / players remaining. classifyArchetype's role is to select a narrative
  template downstream — never to short-circuit plan derivation.

