    depends_on: ["WS-144"]
    started_at: "2026-05-03T02:30:00Z"
    completed_at: "2026-05-03T03:55:00Z"
    completion_notes: |
      Shipped src/utils/heroState/classifyArchetype.js (~120 LoC) + dedicated
      __tests__/classifyArchetype.test.js (32 tests, all green) + types.js
      additive extension (ARCHETYPE_IDS const-array export of all 18 v1 IDs +
      potType field added to Situation typedef).

      Decision tree (per §4.2–§4.3 catalog + Q1+Q2 resolutions):
        - turn/river → throws Error (v2 deferred)
        - preflop:
            OPEN → PF_OPEN_RFI (covers EP/MP/HJ/CO/BTN; SB/BB rare → same)
            VS_OPEN → PF_VS_OPEN_BB / PF_VS_OPEN_SB / PF_VS_OPEN_IP per position
            3BET / SQUEEZE / VS_3BET / LIMP_NAV → direct mapping
            VS_SQUEEZE → PF_VS_3BET (closest-match fallback)
            postflop actionContext (callsite bug) → PF_OPEN_RFI defensive
        - flop:
            playersRemaining >= 3 → FLOP_MULTIWAY (overrides all)
            VS_DONK → FLOP_VS_DONK
            CBET / VS_CBET × inPosition × (SRP|3BP|4BP→3BP) → 8 SRP/3BP archetypes
            other postflop actionContexts → CBET-equivalent fallback

      First-principles guard (POKER_THEORY.md §7 + exploitEngine/CLAUDE.md):
      classifier outputs ARCHETYPE_IDS only; does NOT compute Plan/EV/sizing;
      does NOT use position labels as decision-EV inputs (positionClass is a
      structural axis for archetype routing, not fold-rate scaling); does NOT
      stack style adjustments. Pure routing function — Plan computation lives
      in gameTreeEvaluator.

      Doc update: appended §4.3.1 "classifyArchetype implementation policy"
      to HERO_STATE_DESIGN.md documenting Q1+Q2 resolutions + closest-match
      fallback policy so WS-138/139 narrative authors know which inputs map
      to their templates.

      Verification:
        - 32/32 classifyArchetype tests + 17/17 equityVsRangeParts tests +
          11/11 types.test.js = 60/60 heroState/ tests green
        - Build clean (`npm run build` → 5.81s, dist generated)
        - Full smart-test-runner: 9537 passed, 30 skipped, 0 failed (371 test
