composition_notes: |
  Two-item M+M sprint. Founder-override on standard 2-session cap. Justification:
  the items share the row-tap routing seam — WS-163 changes row-tap to point at
  PlayerProfileView, but PlayerProfileView is built by WS-162. Shipping
  separately means SPR-035 leaves row-tap pointing at a non-existent route OR
  ships a stub. Pairing avoids stub work.

  Anchor selection: WS-162 first (builds destination surface), then WS-163
  (changes routing + adds editor/filter UI). Sequential to avoid PlayersView.jsx
  + PlayerEditorView.jsx file-conflict risk.

  Source-class damping (Step 2d): last 3 anchors WS-147 (spr-followup),
  WS-148 (spr-followup), WS-008 (spr-followup) — all founder-driven, never
  damped. WS-162 + WS-163 source: ws-008-decomposition → spr-followup → not
  damped.

  Mode classification: M effort + improvement type + multiple decision flags
  → plan-first for both. Single combined plan-mode session covering all 8
  decisions, then execute both back-to-back.

  Note for SPR-036+ planning: 3 PIO G5 children remaining:
    - WS-161 (camera modal) + WS-165 (settings photo-toggle) — pair-eligible
    - WS-164 (multi-attribute ranking) — re-scoped to standalone in PlayersView
      (Table-Build G5 dependency reframed as soft, can ship without)
