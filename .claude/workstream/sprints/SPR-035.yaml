id: "SPR-035"
title: "PIO G5 children B+C — Player Profile View + PlayersView/PlayerEditor extensions"
status: completed
goal: |
  PlayersView becomes fully testable for the new PIO attribute model:
  tap a player row to see their sighting history + per-attribute stability
  descriptors; edit any player to set 5 new attribute fields (AgeDecade /
  Ethnicity tags / Wardrobe / Jewelry / Logo); filter the player list by
  those fields.

  Two children of WS-008 ship together because they share the row-tap
  routing seam — WS-163 changes row-tap to point at PlayerProfileView, but
  PlayerProfileView is built by WS-162. Pairing avoids stub work.

  Master Plan rhythm:
    SPR-034: PIO G5 child A (WS-160) — IDB v23 + computeStability scaffold — DONE
    SPR-035: PIO G5 children B+C (WS-162 + WS-163) — Profile View + PV/PEX extensions (this sprint)
    SPR-036+: PIO G5 children remaining: WS-161 (camera) + WS-165 (settings toggle) +
              WS-164 standalone-ranking (rescoped from Table-Build dependency)

