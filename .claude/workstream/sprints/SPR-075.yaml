items:
  - id: "WS-183"
    title: "Showdown — disable card-edit interaction on winning seats (canInteract guard + unlock affordance)"
    mode: plan-first
    effort: S
    program: engineering
    category: showdown-view
    priority_score: 18.0
    status: done
    decision_flags:
      - "Hard-lock vs hard-lock + explicit unlock affordance"
    notes: |
      Decision ratified upfront: hard-lock + explicit unlock affordance.

      Implementation plan:
        1. Add transient unlock state at ShowdownSeatRow.jsx (local useState)
           OR lift to ShowdownView level if multiple seats need coordination.
        2. canInteract gate becomes:
           mode === 'selection' && inactiveStatus !== ABSENT
                                && !isMucked
                                && (!hasWon || isUnlocked)
        3. Render small "Unlock cards" / "Lock cards" toggle on Won seats.
        4. Audit ShowdownView parent for alternative dispatch paths (long-press,
           context menu) that bypass canInteract.
        5. Tests: hasWon=true unlock=false → tap rejected; hasWon=true unlock=true
           → tap accepted; toggle reflects in DOM.
        6. Visual verification at 1600×720.

  - id: "WS-182"
    title: "Action primitive collapse — recordSeatAction(seat, intent) makes CHECK-while-owing structurally unrepresentable"
    mode: plan-first
    effort: M
    program: domain-correctness
    category: rules-invariant
    priority_score: 30.0
    status: done
    decision_flags:
      - "Standalone util vs inline in useGameHandlers"
      - "Strict-mode behavior on illegal raiseTo: throw vs return false vs no-op"
      - "Legacy synthetic test fixtures: migrate vs stay direct with comment"
    notes: |
      Three decisions ratified upfront:
        - API location: standalone util at src/utils/recordSeatAction.js
        - Illegal raiseTo: throw
        - Legacy fixtures: MIGRATE ALL (owner override of recommendation)

      Implementation plan:
        1. Author src/utils/recordSeatAction.js — pure function
           (gameState, seat, intent) → dispatch payload.
           Intent: 'fold' | 'match' | { raiseTo: number }
        2. Author src/utils/__tests__/recordSeatAction.test.js — direct invocation
           tests covering:
              - 'match' on limped-preflop SB → CALL
              - 'match' on flop-no-bet seat → CHECK
              - 'fold' from any state → FOLD (except showdown)
              - 'raiseTo' with N <= currentBet → throws
              - 'raiseTo' with currentBet=0 → BET label
              - 'raiseTo' with currentBet>0 → RAISE label
        3. Migrate callers:
              - src/hooks/useGameHandlers.js — checkAround, restFold, any direct
                RECORD_PRIMITIVE_ACTION dispatch
              - src/components/views/TableView/CommandStrip.jsx — action buttons
        4. Fixture migration (D4 — owner override):
              - Grep all RECORD_PRIMITIVE_ACTION usages
              - Migrate every test fixture / synthetic dispatch site
              - Document any that can't migrate (and why) with a NEED_BYPASS
                comment
        5. Add INV-RULES-CONTRIBUTION to system/invariants.md
        6. Update .claude/failures/RULES_INVARIANT_DISPATCH_BYPASS.md with
           reframe (primitive-level vs dispatch-level)
        7. Final sweep: grep RECORD_PRIMITIVE_ACTION → only recordSeatAction
           internals + documented bypasses should remain.
