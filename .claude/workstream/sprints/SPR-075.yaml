id: "SPR-075"
title: "Rules-correctness primitives — Showdown card-edit hard-lock + recordSeatAction primitive collapse (WS-183 + WS-182)"
status: completed
approved_at: "2026-05-13T00:00:00Z"
completed_at: "2026-05-13T02:00:00Z"

goal: |
  Two rules-correctness primitives become unrepresentable-by-design:
    1. Showdown winners can't have their cards edited unless explicitly unlocked.
    2. CHECK-while-owing becomes structurally impossible at the action-recording API.
  Implements owner's 2026-05-12 reframe (memory: feedback_action_dispatch_legality.md)
  that illegal states should not be constructible at the primitive level.

program_focus: domain-correctness
program_initiative: |
  Poker Theory Integrity — closes the highest-priority unclaimed bug (WS-182 P=30)
  reported by owner 2026-05-11 (SB allowed to CHECK preflop while owing chips) and
  pairs a thematically co-located showdown-rules fix (WS-183).

  Both items implement the same doctrine: "prefer unrepresentable to validated."
  WS-183 collapses a Won-state edit path (canInteract gate adds !hasWon). WS-182
  collapses 5 free-floating action strings into a single intent-based record API
  where the LABEL becomes a derivation of CONTRIBUTION + STATE.

  Cross-program rotation: last 3 anchors = engineering (SPR-072) + design × 2
  (SPR-073/074). DC anchor returning after design 2-of-3. No source-class
  saturation (all recent anchors founder/plan-driven).

