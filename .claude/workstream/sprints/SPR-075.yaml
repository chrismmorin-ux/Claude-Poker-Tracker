decisions_needed:
  - "Item #1 (WS-183) — Hard-lock policy after Won: full lock vs lock + explicit unlock affordance"
  - "Item #2 (WS-182, A) — API location: standalone util vs inline in useGameHandlers"
  - "Item #2 (WS-182, B) — Strict-mode behavior on illegal raiseTo: throw vs return false vs return+toast"
  - "Item #2 (WS-182, C) — Legacy synthetic test fixtures: migrate vs stay direct with comment"

decisions_ratified:
  d1_won_lock_policy: "Hard-lock + explicit unlock affordance. Default: Won seats cannot have card edits. Small 'Unlock cards' affordance on Won seats toggles a transient unlock state allowing correction without first unsetting Won. canInteract gate = mode==='selection' && !ABSENT && !isMucked && (!hasWon || isUnlocked)."
  d2_api_location: "Standalone util at src/utils/recordSeatAction.js. Pure function (gameState, seat, intent) returning dispatch payload. Unit-testable without React, importable from fixtures/analytics/replay. NOT inline in useGameHandlers."
  d3_illegal_raise: "Throw. raiseTo <= currentBet throws a typed error. Matches 'unrepresentable not validated' doctrine — caller is buggy if it can construct this. Fail-fast surfaces dev-time errors before they reach the reducer."
  d4_legacy_fixtures: "Migrate ALL fixtures to recordSeatAction. Owner overrode recommendation. Full sweep: every RECORD_PRIMITIVE_ACTION dispatch site (including synthetic test fixtures) funnels through the new API. No caller bypasses primitive — strongest version of the doctrine."

