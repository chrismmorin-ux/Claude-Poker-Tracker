goal: |
  The river-decision primitive ships honestly — every showdown `perCombo`
  carries a `villainStrengthBucket` against the public board, so Basin
  (and future river-decision exploit code) classifies on a real
  showdown-outcome distribution instead of a placeholder.

program_focus: domain-correctness
program_initiative: |
  Direct SPR-088 follow-up. SPR-088 plan-mode (item 1, 2026-05-18) owner
  correction reframed river equity as a showdown-outcome distribution
  (binary per combo, deterministic cards) rather than a
  variance-across-runouts metric. WS-194 was authored inline at SPR-088
  close-out to ship the engine plumbing that the SLS B3 Basin
  classifier needs to be a real classifier instead of a deferred
  placeholder.

  Per memory `feedback_river_equity_is_showdown_outcome.md`: descriptor
  labels live downstream of the bucketed distribution, never upstream
  of it (companion to `[[first-principles-decisions]]`). Variance is a
  label; on a deterministic river it is the wrong abstraction.

  Domain-correctness program rotation: last DC anchor was SPR-083 (5
  sprints back). SPR-088 explicitly deferred to "a dedicated DC sprint."
  WS-194 fills that gap with a clean ship-ready P=17 item.

