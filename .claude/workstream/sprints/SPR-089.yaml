decisions_needed:
  - "Item #1 — Bucket-boundary thresholds (D1): how does a combo qualify as nuts / very-strong / strong / marginal / weak-or-bluff against a public board? Calibrated thresholds (e.g., 2nd-pair-or-better → strong) OR rank-relative (top-N% of all combos vs board). Calibrated is more transparent; rank-relative is more board-adaptive."
  - "Item #1 — Bucket on river-only vs all streets (D2): river-only is the load-bearing case (deterministic showdown). Flop/turn buckets vs the current board are still meaningful but less stable because future cards reshape them. River-only keeps the abstraction honest; all-streets unlocks consistency for hypothetical 'if we checked-back here, what does the bucket distribution look like?' at the cost of a label that might mislead on early streets."
  - "Item #1 — Helper location (D3): src/utils/pokerCore/ (general-purpose, alongside evaluateHand) OR src/utils/exploitEngine/gameTreeEquity.js (alongside the consumer computeComboEquityDistribution). pokerCore is the cleaner home if other engines might consume it; exploitEngine keeps the dependency localized."

