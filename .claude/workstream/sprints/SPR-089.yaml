items:
  - id: "WS-194"
    title: "Engine refactor — per-combo villainStrengthBucket at showdown (Basin prereq)"
    mode: plan-first
    effort: M
    priority_score: 17.0
    program: domain-correctness
    status: done
    decision_flags:
      - "D1 — Bucket-boundary thresholds: calibrated vs rank-relative"
      - "D2 — River-only vs all streets"
      - "D3 — Helper location (pokerCore vs exploitEngine)"
    decisions_ratified:
      D1: "Rank-relative percentile (founder choice). Per board, enumerate every legal 2-card combo, score via bestFiveFromSeven, sort desc, bucket by percentile bands [0.05, 0.20, 0.50, 0.80, 1.00]. Board-adaptive by construction."
      D2: "All postflop streets (founder choice). Bucket appears on flop/turn/river uniformly. Founder rationale: surfaces should expose which runouts move villain's combos up/down the strength ladder, informing bluff candidacy."
      D3: "src/utils/pokerCore/handEvaluator.js (founder choice). Pure card-math, no engine imports — fits pokerCore's contract; reusable from rangeEngine / shapeLanguage if needed."
    notes: |
      Shipped. Implementation followed plan-mode design exactly:
        - STRENGTH_BUCKETS enum + STRENGTH_BAND_TOPS + comboKey internal helper
        - computeBoardStrengthTable(board) — O(C(52-boardLen, 2)) enumeration with
          tie-by-score grouping; ties share the bucket of the group's first member
        - classifyVillainCombo(c1, c2, board, table=null) — returns null on
          board-card collision, c1===c2, or board.length outside 3..5
        - gameTreeEquity.computeComboEquityDistribution computes the strength
          table once per call and stamps villainStrengthBucket onto each perCombo
        - 4 new INV-STRENGTH-BUCKET invariants in system/invariants.md
      Tests:
        - 17 new unit tests in handEvaluator.test.js (43/43 green)
        - 5 new integration tests in gameTreeEquity.test.js (183/183 green)
      Smart-test-runner: 11,692 passing / 1 pre-existing flake (PlayerFinderView
      smoke under parallel load, passes standalone in 2.5s, no connection to
      gameTreeEquity / pokerCore).
      Build: clean.
      Cross-domain grep guard: clean (pokerCore imports none of exploitEngine /
      rangeEngine / shapeLanguage).
      Unblocks: SLS-B4 Basin classifier (WS-044) — strength-tier histogram is
      now consumable from perCombo. Future river-decision exploit code (bluff-
      catch frequency, thin-value sizing) can read villainStrengthBucket
      directly.

