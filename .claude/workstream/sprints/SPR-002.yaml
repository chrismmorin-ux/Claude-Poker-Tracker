composition_notes: |
  Solo-anchor sprint by design. WS-001 is the P0 anchor of Master Plan 2026-04-30
  Phase 1 (TableView Invariant Audit, audit-first matrix authoring per binding
  ratification "B is audit not spot-fix"). WS-002 (straddle wired into matrix) and
  WS-003 (fix wave) are tightly coupled but excluded from this sprint:
    - WS-002 has status_note "BLOCKED on owner straddle-scope answer" and would
      force premature decisions on live/Mississippi/UTG-only/re-straddle scope.
    - WS-003 cannot meaningfully execute until the matrix exists to identify the
      bugs to fix.
  Standard ceremony 2-session effort cap also constrains; WS-001+WS-002 = 3 sessions
  exceeds cap. Single P0 plan-first item is the correct shape.

  Source-class damping: SPR-001 anchor was engine-finding (FIND-003); WS-001 is
  untagged (founder-driven, backlog-md-migration origin). Founder-driven classes
  are never damped per Step 2d. No source-class anchoring concern.

