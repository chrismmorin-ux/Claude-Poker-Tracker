goal: |
  The HRP spot-resolver engine ships — given any played decision, hero
  gets back a `SpotMatch` with confidence (strong / partial / no-analog)
  against the upper-surface + LSW corpus, unblocking the Stream U code
  work for the hand-review-modal that landed in SPR-085's surface spec.

