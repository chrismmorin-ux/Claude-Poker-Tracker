program_initiative: |
  HRP Phase 4 (`spotResolver/` engine implementation) is the explicit
  next phase per `docs/projects/played-hand-review-protocol.project.md`
  after SPR-085 closed Phase 3 (Gate 4 surface specs). The
  hand-review-modal contract authored at SPR-085 consumes a `SpotMatch`
  from a `spotResolver/` module that doesn't yet exist — without the
  engine, the ledger-link chip can never fire strong/partial matches
  and the modal can never open with linked artifact content.

  SPOT-KEY feasibility spike (2026-04-23, verdict GREEN) already
  designed the architecture: 7 files + ~30 golden-test corpus entries,
  estimated 1-2 sessions. WS-193 authored inline at this /next per the
  WS-192 / SPR-086 inline-authoring precedent.

  Continuation pattern: SPR-085 specced the surface → SPR-086 wired
  SLS B2 data through → SPR-087 builds the engine HRP needs for its
  just-shipped surface specs. After this engine ships, the Stream U
  chain (Phases 6-8: HandBrowser flag filter, modal component, HE-17
  producer button) becomes implementable.

