  - id: "WS-193"
    title: "HRP Stream E — src/utils/spotResolver/ engine (Phase 4 per played-hand-review-protocol.project.md)"
    mode: plan-first
    effort: M
    program: engineering
    category: played-hand-review-protocol
    status: done
    started_at: "2026-05-17T14:00:00Z"
    completed_at: "2026-05-17T14:50:00Z"
    decision_flags:
      - "Corpus loading strategy — [RESOLVED 2026-05-17 by spike-driven recon: PWA boot via import.meta.glob. Spike line 145 ratified; matches lessonRegistry.js precedent; offline corpus availability is a Gate 2 Stage C rule.]"
      - "Node-id classification source — [RESOLVED 2026-05-17 by recon: hand-authored code (decision-tree in nodeClassifier.js). The canonical vocabulary is small (~16 non-terminal node IDs across 8 LSW lines + 6 upper-surface artifacts); code is testable and CI catches lines.js drift.]"
      - "Match-scorer scoring weights — [RESOLVED 2026-05-17: equal-weight baseline (calibrated). Per-dimension tolerances for sprBucket (adjacent zones get 0.5 credit) + texture ('paired' tolerates wet/dry). Thresholds STRONG=0.875 (7/8) and PARTIAL=0.625 (5/8) per plan. Calibrated, not learned, per feedback_first_principles_decisions.md.]"
    notes: |
      Architecture pre-designed by SPOT-KEY feasibility spike
      (`docs/projects/played-hand-review-protocol/spot-key-spike.md`,
      verdict GREEN 2026-04-23):
        - 7 source files: CLAUDE.md + index + spotKeyExtractor +
          potTypeInference + boardShorthand + nodeClassifier +
          corpusIndex + matchScorer
        - 30+ golden-test corpus entries
        - ~200 LoC core + ~150 LoC tests per spike estimate
        - Coverage targets: ~40-50% strong / ~20-30% partial /
          ~15-25% no-analog
        - Sole consumer is HRP hand-review-modal per SPR-085 spec
        - Cross-domain rule: imports from `pokerCore/` only —
          NO imports from `exploitEngine/` / `rangeEngine/` /
          `shapeLanguage/` (decision-driving engines stay
          downstream-only; spotResolver is a pure descriptor-matching
          primitive)

      Bindings:
        - feedback_first_principles_decisions.md — scoring weights
          calibrated, not learned (mirrors silhouettePrototypes.js)
        - HRP project doc line 30 — HRP is a bridge, not a producer;
          resolver returns artifact IDs, never reasoning
        - HRP project doc line 32 — load-bearing invariant is
          spot-key resolution at ~60-70% confident-or-partial coverage
        - HRP Gate 2 Stage C rule 7 — offline corpus availability
          (drives PWA-boot corpus loading recommendation)

      Open question to resolve at plan-mode start:
        - Verify which existing utilities to reuse vs build fresh
          (positionUtils.POSITION_NAMES, boardTexture.analyzeBoardTexture,
          rangeMatrix per spike's "~70% of dimensions extractable
          with zero new code" claim)

