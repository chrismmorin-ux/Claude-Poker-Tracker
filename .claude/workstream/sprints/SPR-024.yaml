  - id: "WS-137"
    title: "HSP-G1 — Range-engine partitioning audit (does villainRangePartitioner.js need to be built?)"
    mode: plan-first
    effort: S
    status: done
    completion_notes: |
      Decision flag resolved via AskUserQuestion at start: founder picked
      "most sophisticated but consistent with our engine" (preview options
      were verdict-only / verdict+full-API-spec / verdict+1-paragraph-sketch;
      founder text answer pushed scope to verdict + full API spec, with the
      consistency constraint that the spec reuse rangeEngine + exploitEngine
      patterns rather than introduce parallel vocabulary).

      Mandatory pre-audit reads completed per CLAUDE.md poker analysis
      guardrail:
        - .claude/context/POKER_THEORY.md (re-confirmed 9 anti-patterns)
        - src/utils/rangeEngine/CLAUDE.md (Bayesian-not-frequentist; mixing-real;
          per-scenario normalization; two independent decision trees;
          showdown-evidence-sacred)
        - src/utils/exploitEngine/CLAUDE.md (consequence-weighted confidence;
          fold-equity != fold-frequency; range-segmentation-not-strength;
          DO-NOT-stack-style-with-stats; range-shape-not-deterministic-of-sizing)

      Audit findings (4 questions answered):
        Q1: rangeSegmenter.js (exploitEngine) ALREADY exposes:
            - segmentRange(range, board, deadCards, boardTexture) → 5-bucket
              strategic partition (nuts/strong/marginal/draw/air) + 24-entry
              hand-type display taxonomy
            - segmentToRanges(segResult) → per-bucket Float64Array(169) sub-ranges
            - enrichWithEquity(segResult, heroCards, options) → hero equity vs
              each non-empty bucket (Monte Carlo, 500 trials/bucket default)
            - The 5-bucket vocabulary is the strategic vocabulary throughout
              the game tree (gameTreeConstants.BUCKET_NAMES,
              villainRangeShapeSizing, gameTreeDepth2)
        Q2: Gap is role-conditioning, not partitioning. HSP wants 4-class
            (vsValue/vsBluff/vsDraw/vsAir) which depends on villain action
            (aggressor vs defender) + style (polarized vs linear). The
            existing partition is strength-only. Mapping requires a thin
            translator on top — NOT a parallel partitioning algorithm.
        Q3: Partition boundaries fully computable from existing primitives:
            rangeSegmenter (strength) + villainProfileBuilder.getStyle +
            gameTreeEquity.computePolarization. No new infrastructure.
        Q4: Per-street class availability:
            - Preflop: short-circuit (no draws, no role-distinguishable bluffs);
              HeroState equity reduces to {overall} preflop
            - Flop: full 4 classes
            - Turn: full 4 classes (vsDraw shrinks)
            - River: 3 classes (vsDraw becomes null per existing typedef)

      Verdict: REJECT building a standalone villainRangePartitioner.js
      (would duplicate rangeSegmenter.js and bifurcate the strategic
      vocabulary). ACCEPT building a thin role-translator at
      src/utils/heroState/equityVsRangeParts.js (~80 LoC + tests; lives
      in heroState/ not rangeEngine/exploitEngine/ because role-conditioning
      depends on action+style which is downstream of both engines).

      Deliverables:
        - docs/HERO_STATE_DESIGN.md §7.5 marked RESOLVED with summary verdict
        - docs/HERO_STATE_DESIGN.md §9 (NEW) — full audit findings + verdict
          + API spec for computeEquityVsRangeParts + translateStrengthToRole
          + decision table for strength→role mapping + test surface
        - WS-144 created (HSP-B0 — equityVsRangeParts role-translator
          implementation), priority_score=15 P2, S effort, blocked_by=[]
        - WS-142 (HSP-B2 buildHeroState) blocked_by updated:
          [WS-137, WS-138, WS-139, WS-140, WS-141] →
          [WS-138, WS-139, WS-140, WS-141, WS-144]
        - WS-142 description updated: vsRangeParts now points at WS-144
          translator instead of imagined villainRangePartitioner
        - WS-142 decision_flags reduced (villainRangePartitioner.js scope
          decision removed — settled by audit)

      Verification:
        - Zero src/ diff (audit-only ticket)
        - Zero test changes (audit-only ticket)
        - HSP design doc updated (§7.5 + §9 + lineage to WS-144)
        - Queue-index.yaml: 142 → 143 items (WS-144 added); WS-137 done;
          WS-142 deps revised
