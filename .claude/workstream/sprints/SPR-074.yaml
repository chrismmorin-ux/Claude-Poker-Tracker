decisions_needed:
  - "Item #1.A — shape-skill-map IA: single transparency page (all signal
    sources in one scrollable view) vs tabbed (Leaks / Drills / Tests / Recent)"
  - "Item #1.B — lesson-runner IA: per-lesson drill container vs shared shell
    with mode tabs (Reference / Deliberate / Discover)"
  - "Item #1.C — Red-line conformance matrix enforcement: CI-grep boolean
    table vs runtime DOM assertion vs hybrid per-red-line"

decisions_ratified:
  d1_skill_map_ia: "Single scrollable page IA. All 10 descriptors in one grid; expandable composition row per descriptor (W_drill + W_recent + declared + W_leak placeholder + W_test placeholder). Matches feedback_scf_learning_state_not_tier_rank.md 'composition is always inspectable'. Tabbed and hybrid IAs refused."
  d2_runner_ia: "Shared shell with intent as route param. SCREEN.LESSON_RUNNER + ?intent=reference|deliberate|discover. Reference variant structurally cannot dispatch RECORD_DRILL_OUTCOME per I-SM-3 reducer enforcement (defense-in-depth third layer on top of surface design + route discipline). Three-separate-surfaces and per-descriptor-container refused."
  d3_conformance_enforcement: "Hybrid per-red-line. CI-grep for syntactic violations (forbidden field names like masteryScore, forbidden copy strings like 'streak'); DOM-assert for behavioral violations (mute exclusion, intent-mode gating, dispatch behavior). Matrix specifies enforcement method per cell. Aggregate test catalog at docs/design/audits/2026-05-11-sls-g4-redline-conformance.md."

