          leaks of various types")

      Phase C — Framework + first rule (extensible-by-design):
        - src/utils/skillAssessment/CLAUDE.md (domain rules + 5 anti-patterns +
          source-util-policy whitelist + n≥30 floor + CD-5 discipline)
        - src/utils/skillAssessment/heroDecisionAccumulator.js (~270 LoC; generic
          hero-side bucketer + Wilson 95% CI + situation-key derivation mirroring
          villain-side)
        - src/utils/skillAssessment/solverBaselines.js (~50 LoC; extensible lookup;
          v1 has 6 entries for IP cbet rule)
        - src/utils/skillAssessment/heroLeakDetector.js (~80 LoC; registry pattern
          via import.meta.glob — auto-loads leakRules/*.js excluding _template.js)
        - src/utils/skillAssessment/leakRules/_template.js (authoring template
          documenting the standard interface — copy when shipping a catalog entry)
        - src/utils/skillAssessment/leakRules/heroIpCbetOverfold.js (the first
          rule; CD-5 compliant; n≥30 + delta + CI-agreement + severity gates)
        - 47 framework tests across 4 test files (heroDecisionAccumulator,
          solverBaselines, heroLeakDetector, heroIpCbetOverfold)

      Phase D — IDB migration + hook + badge wire:
        - IDB v21 → v22 migration (heroLeaks store, composite keypath
          [playerId, situationKey], 3 indexes)
        - src/utils/persistence/heroLeaksStore.js (CRUD: getLeak, getLeaksForPlayer,
          putLeak, snoozeLeak, replacePlayerLeaks — preserves snoozedUntil
          across re-detection)
        - src/hooks/useHeroLeaks.js (reads + honors snoozedUntil + session-local
          dismissedAt; provides snooze/dismiss callbacks)
        - HeroCoachingCard.jsx extended with HeroLeakBadge sub-component:
          collapsed ⚑ glyph + label / expanded CD-5 4-field card + Drill /
          Dismiss / Snooze affordances. Optional callbacks; surfaces compose
          neutral copy from factual fields.
        - Updated 2 pre-existing tests (anchorLibraryStores + database) for v22 +
          21-store count
        - 13 HeroCoachingCard.leak.test.jsx tests (badge rendering, CD-5
          4-field discipline, affordances, autonomy red line #5 lint test —
          forbids wrong / missed / score / streak / level up / master / grade /
          great job / well done / excellent copy)

      Total: 60 net new tests across 5 new files. Full smart-test-runner
      9680/9710 passed (30 skipped, 0 regressions). Build clean.

      Doc updates: HERO_STATE_DESIGN.md §12 + leak-catalog.md (the catalog
      is itself a deliverable + roadmap). hand-replay-view.md surface artifact
