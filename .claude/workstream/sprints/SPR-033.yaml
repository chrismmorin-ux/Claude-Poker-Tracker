id: "SPR-033"
title: "SCF G5 child 4 — curriculum infrastructure (mastery + composite + descriptor + tier map)"
status: completed
goal: |
  The SCF curriculum spine lands as INFRASTRUCTURE ONLY: per-concept mastery
  + composite signal + learning-state descriptor + tier authoring map +
  signal-source toggle settings. The Drill-this path continues to validate
  the chain end-to-end. The SelfCoachView surface splits to a focused
  follow-up sprint (WS-159 to be authored at SPR-033 close-out) with its
  own Gate 1/4 audit.

  Three pre-execution decisions baked in (no further pause):
    1. Concept granularity: HIGH — one concept per coherent solver-baseline
       region in situation-key space. cbet-defense → ip-cbet-defense +
       oop-cbet-defense (texture-conditioned where divergent). bb-defense
       → split per-opener-position. WS-148 includes migration of the 2
       lessons + 2 leak rules shipped in SPR-031/SPR-032 to fine-grained IDs.
    2. Learning-state descriptor (not tier rank): per-concept mastery is
       the truth; user-facing label is a derived descriptor with transparent
       composition + user-toggleable signal sources (W_leak/W_drill/W_test/
       W_recent become configurable). 6-tier ladder survives as authoring
       metadata only.
    3. Surface scope: infrastructure-only this sprint. SelfCoachView
       Curriculum surface follows up under WS-159 (authored at WS-148
       close-out).

  Master Plan rhythm:
    SPR-030: WS-145 — SCF framework + catalog + first leak rule
    SPR-031: WS-158 + WS-146 first claim — chain activation + 2nd rule
    SPR-032: WS-147 — lesson framework + 2 reference lessons + Drill-this nav
    SPR-033: WS-148 — curriculum infrastructure (this sprint)
    SPR-034+: WS-159 (SelfCoachView Curriculum surface, with Gate 1 audit)
              + WS-149 (≥10 reference lessons) + WS-146 ongoing

