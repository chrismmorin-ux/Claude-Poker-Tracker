composition_notes: |
  Anchor selection rationale:
    - Master Plan rhythm: 3 engineering sprints in a row (SPR-043/044/045
      sidebar-recurrence boundary-hardening cluster); product alternation
      due. SPR-042 was D-line (curriculum surface), SPR-041 was A-line
      (IdentityAvatar v2 with rollback). D-line continuation matches the
      SPR-040 exit note's explicit pointer at preflop-fold-equity gap
      closure.
    - Cluster status 4/5 done. WS-101 (replay corpus extension) is the
      remaining sibling but is a structurally different shape (test-corpus
      authoring, ~1.5 sessions actual vs surgical-fix shape of WS-103/104/
      105/102) — better as its own focused sprint than trailing this
      cluster.
    - WS-146 has known velocity from SPR-031 (1 rule) + SPR-040 (2 rules);
      M-tagged, ~1 session actual per claim. Pure framework-driven
      authoring within established skillAssessment/ structure — no new
      architectural work.
    - Highest-coverage gap. Preflop fold-equity is a 0-shipped category
      in a high-volume decision class (every preflop-facing-bet hand).
      Closing 2 of 4 here gives the coaching surface its first preflop
      coverage; flop-continuation closed 3/3 in SPR-040.
    - A-line tickets named in SPR-041 close-out (DistinguishingMarksSection,
      accessory entry flow, headwearOverride) don't have queue YAMLs yet
      — would need ticket-authoring overhead before any sprint. WS-146 is
      immediately ready.

  Rule selection (SPR-040 close-out explicitly suggested these two):
    1. hero-pf-open-overfold — hero faces a preflop open-raise and folds
       too often (defense from blinds and IP cold-call positions vs
       opens). Fold-equity miscalibration; villain over-rewarded for
       open-raises.
    2. hero-oop-3bet-underfold — hero faces a 3bet OOP and continues
       too often (calls/4bets) vs villain's 3bet range. Mirror direction
       to #1 — under-folding rather than over-folding.

  These give us symmetric coverage on the two most common preflop facing-
  bet shapes (open vs 3bet) and exercise both directions of the
  fold-equity miscalibration axis (over-fold + under-fold).

