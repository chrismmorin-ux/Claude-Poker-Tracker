    progress_notes: |
      Mid-sprint pivot ratified by founder 2026-05-07: original anchor
      pair (hero-pf-open-overfold + hero-oop-3bet-underfold) replaced with
      (hero-pf-3bet-overfold + hero-oop-3bet-underfold) after structural
      discovery during execution.

      Discovery: deriveSituationKey:DERIVE_CONTEXT_ACTION buckets RFI fold
      and RFI open under different keys. For hero RFI fold (verb='fold',
      raisesBefore=0), contextAction returns 'limp' (the raisesBefore===0
      branch returns 'open' for raise/bet, else 'limp'). For RFI open
      (verb='raise'), contextAction returns 'open'. The accumulator buckets
      each hero action by its own derived contextAction → fold + open land
      under different situation keys. Computing fold-rate over the RFI
      decision space requires a single bucket containing both → can't be
      done with the current accumulator design.

      Why this didn't surface earlier: all 4 prior shipped rules
      (hero-ip-cbet-overfold, hero-bb-defense-width, hero-oop-cbet-overfold,
      hero-flop-vs-donk-misresponse) bucket vs-bet defense decisions where
      fold + call + raise all share contextAction (vsBet / vsopen / vs3bet).
      RFI is the first decision class where the action verb itself drives
      the contextAction bucketing.

      Pivot rationale: hero-pf-3bet-overfold is structurally clean (vs3bet
      bucket holds folds + calls; 4bets land in :4bet:na bucket; foldRate
      is well-defined). Same category (preflop-fold-equity), same sprint
      goal in spirit (catalog +2 rules; gap closure 1/4 → 3/4; 25 → 25
      total catalog + 1 entry status changed PLANNED → DEFERRED).

      Implementation:
        - src/utils/skillAssessment/leakRules/heroPf3betOverfold.js (~120 LoC)
          • Matches preflop:none:{EARLY|MIDDLE|LATE|BUTTON}:agg:{ip|oop}:raise:vs3bet:na
          • solverBaselineKey() normalizes isIP axis to 'ip' (single
            per-position baseline serves both ip + oop bucket configs)
          • Detect: over-fold direction (delta > 5pp + ci.lower > baseline)
          • relatedConceptId: pf-3bet-defense-cluster
        - src/utils/skillAssessment/leakRules/heroOop3betUnderfold.js (~120 LoC)
          • Matches preflop:none:{SMALL_BLIND|BIG_BLIND}:def:oop:raise:vs3bet:na
          • Detect: UNDER-fold direction (mirror — delta = baseline - observed
            > 5pp + ci.upper < baseline). First under-fold rule in catalog;
            establishes the mirror detection pattern for future under-fold rules.
          • relatedConceptId: oop-3bet-defense-cluster
        - src/utils/skillAssessment/solverBaselines.js — +6 baselines
          (4 pf-3bet position-keyed + 2 oop-3bet SB/BB)
        - src/utils/skillAssessment/tierConceptMap.js — 2 new umbrellas
          (Tier 4) + 6 sub-concepts + 10 SITUATION_KEY_TO_CONCEPT entries
          (8 pf-3bet covering both isIP variants per position + 2 oop-3bet)
        - docs/projects/self-coach-foundation/lessons/pf-3bet-defense-cluster.md
          (~70 lines: exposition + worked example + success criteria)
        - docs/projects/self-coach-foundation/lessons/oop-3bet-defense-cluster.md
          (~85 lines: first under-fold lesson; explains why over-defense
          OOP after flat-call is structurally bad)
        - docs/projects/self-coach-foundation/leak-catalog.md
          • hero-pf-3bet-overfold: PLANNED → SHIPPED ★ v1
          • hero-oop-3bet-underfold: PLANNED → SHIPPED ★ v1 (first under-fold)
          • hero-pf-open-overfold: PLANNED → DEFERRED (with resolution path)
          • Coverage table: preflop-fold-equity 1/4 → 3/4; total 4/25 → 6/25;
            new "Deferred" column added
        - 2 new test files (heroPf3betOverfold.test.js: 17 tests;
          heroOop3betUnderfold.test.js: 18 tests covering matchesBucket
          parity, solverBaselineKey normalization, gating, and the under-fold
          direction)
        - 2 hardcoded count tests adjusted (conceptMastery 32 → 40;
          solverBaselines 19 → 25)

      Verification:
