goal: |
  Every modeled decision-node in a recorded hand carries the model's belief —
  range-engine queries fill villain action-points (using existing
  rangeAccessors), exploitEngine queries fill hero action-points (stateless
  evaluateGameTree) — closing the predicted-vs-observed gap that Phase 5a
  intentionally left as an empty array.

  Ships PMC charter §Phase 5a deferred portion: extends
  `src/utils/predictionAudit/reconstruct.js` so `predictedDistribution[]`
  is populated 1:1 with modeled decision-nodes in actionSequence. No new
  engine math — read-only consumption of existing engine outputs.

