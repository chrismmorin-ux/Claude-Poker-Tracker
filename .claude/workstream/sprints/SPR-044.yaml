items:
  - id: "WS-103"
    title: "Freeze incoming live_context at SW boundary"
    mode: execute
    effort: M
    status: done
    completed_at: "2026-05-07T03:25:00Z"
    progress_notes: |
      Single-file SW handler change (1 deepFreeze call + comment) +
      new shared/freeze-utils.js helper (31 LoC) + 9 unit tests.
      Actual effort ~20 min (well under typed M=1.5 sessions; matches
      the WS-105 sibling pattern of S-actual despite M tag).

      Implementation:
        - shared/freeze-utils.js — `deepFreeze(value)` recursive freezer.
          Idempotent. No-op on null/primitives. Returns same reference.
        - background/service-worker.js:16 — import deepFreeze.
        - background/service-worker.js:199-204 — `deepFreeze(msg.context)`
          inside the `live_context` capture-port case, immediately after
          the validateMessage gate (WS-105) passes and before any of
          the four consumers (writeLiveContext, pushToAppBridge, the
          throttle queue _pendingLiveCtx, side-panel push) take the
          reference. Block comment ties the pair: validate → freeze →
          forward.
        - shared/__tests__/freeze-utils.test.js — 9 tests covering:
          top-level Object.isFrozen; strict-mode mutation throws on
          assignment / new key / delete (top, nested, array, array
          element); same-reference invariant; idempotence; null /
          primitive no-op; structured-clone survival (proves the
          frozen sender object produces a mutable receiver, so
          writeLiveContext's spread `{ ...ctx, _persistedAt }` and
          postMessage on the side-panel side keep working); a
          live_context-shaped graph (tableId / board / seats with
          hole arrays / meta) where every depth throws on mutation.

      Verification:
        - npx vitest run shared/__tests__/freeze-utils.test.js → 9/9
        - npx vitest run (full extension) → 68 files / 2263 tests pass
          (was 2254 baseline per SPR-043 dist-test history; +9 net,
          0 regressions)
        - npm run build → clean

      Cluster siblings remaining (sidebar-recurrence boundary cluster,
      3 of 5): WS-101 (replay corpus sequence extension), WS-102
      (betweenHandsFsm debounce + modeAExpired symmetry), WS-104
      (microtask-deferred timer registration leak). WS-104 is the
      most natural next sibling — same file scope (side-panel.js
      timer registry), same surgical-bug-fix shape; WS-102 is
      similarly scoped to a single FSM module.

