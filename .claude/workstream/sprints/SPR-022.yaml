items:
  - id: "WS-076"
    title: "Version-mismatch reload: diagnostic + confirm (DCOMP-W4-A3-F4) — replace silent window.location.reload() at OnlineView.jsx:86 with diagnostic surface + user confirm + post-reload sessionStorage verify flag"
    mode: plan-first
    effort: M
    status: done
    completion_notes: |
      Plan-mode design captured 3 owner decisions (plan-mode AskUserQuestion 2026-05-02): (1) ConfirmDeleteModal-pattern modal for diagnostic; (2) version-only v1 (contract fingerprint deferred — PROTOCOL_VERSION already increments on contract change, fingerprint duplicates the signal); (3) thread extension manifest version through STATUS message for legible "0.9.0 vs 0.9.0" rather than "v2 vs v3".

      Implementation across 8 files (4 app + 2 extension + 2 test files):
        EXTENSION:
          - shared/wire-schemas.js — buildStatus() accepts optional extensionVersion field (additive, validateStatus unchanged)
          - content/app-bridge.js — passes EXTENSION_VERSION (already imported via shared/constants.js) into both STATUS-relay sites (case 'status' + push_connection_state)
        APP:
          - src/utils/versionMismatchStorage.js NEW — writeReloadFlag/readReloadFlag/clearReloadFlag with JSON-encoded payload, 60s TTL (matches HEARTBEAT_INTERVAL), try/catch swallow per UpdateBanner.jsx convention
          - src/hooks/useSyncBridge.js — captures both versions in state, exposes them + appProtocolVersion + postReloadStatus + clearPostReloadStatus on bridge return; resolves post-reload flag on first STATUS comparison ('recovered' / 'still-mismatched' / null)
          - src/contexts/SyncBridgeContext.jsx — adds new fields to useMemo dep array
          - src/components/ui/VersionMismatchModal.jsx NEW — ConfirmDeleteModal-pattern (Tailwind, AlertTriangle icon, click-backdrop-to-cancel); version table rendering both protocolVersion + extensionVersion; conditional 'still-mismatched' warning copy
          - src/components/views/OnlineView/OnlineView.jsx — banner button now opens modal instead of silent reload; mounts VersionMismatchModal; useEffect on postReloadStatus → success toast on 'recovered' or auto-open modal on 'still-mismatched'; Continue Anyway path preserved for WS-077 follow-up
        TESTS:
          - src/utils/__tests__/versionMismatchStorage.test.js NEW — 10 tests (round-trip, TTL expiration, malformed JSON, swallowed sessionStorage failures)
          - src/components/views/OnlineView/__tests__/OnlineView.invariants.fixture.js — defaultSyncBridge extended with new fields; 2 new fixture rows OV-VM-004/005 covering still-mismatched auto-open + version-rendering
          - src/components/views/OnlineView/__tests__/OnlineView.invariants.test.jsx — 3 new interaction tests (Reload Page click → modal opens; postReloadStatus='recovered' → toast + clear; cancel auto-opened modal → clear status); imports fireEvent for React 18 act() flush
          - ignition-poker-tracker/shared/__tests__/wire-schemas.test.js — 2 new buildStatus tests (extensionVersion threaded; omitted-when-undefined backward compat)

      Verification:
        - 10/10 storage util tests
        - 31/31 OnlineView invariants (37 total minus 6 pre-existing skipped gap rows)
        - 80/80 wire-schemas (extension)
        - 20/20 integration-pipeline (extension)
        - 2251/2251 full extension test suite (single-fork)
        - 7/7 SyncBridgeContext consumer tests (SyncBridgeContext + OnlineAnalysisContext + OnlineSessionContext + TournamentBridge)
        - 7587/7587 app smart-test-runner (24 pre-existing skipped) — note: 106 "failed test files" reported by parallel runner are Windows worker-spawn errors (errno -4094 UNKNOWN spawn), not test failures; targeted re-runs confirm 0 actual test failures
        - npm run build clean (7.25s)

      Out of scope:
        - Contract fingerprint (PROTOCOL_VERSION already conveys the same signal; would duplicate)
        - WS-077 graceful degradation (sibling P1 ticket; modal preserves the existing dismissVersionMismatch hook point)
        - Older app build compatibility (extensionVersion is additive, optional; older builds ignore it)
        - Visual regression Playwright shot (deferred to a routine sweep; not blocking)
    finding_id: null
    decision_flags:
      - "Diagnostic surface shape (where + what): modal vs banner vs inline panel in OnlineView; what data renders before reload — extension version, app version, contract delta in plain English, session-at-risk warning, link to release notes"
      - "Extension handshake protocol: how does the extension carry version + contract fingerprint into the app — new chrome.runtime port message field, sidebar manifest version field (mv3 manifest_version is already the schema version), or sessionStorage handoff on connect; also where the contract fingerprint is computed (extension-side hash of the message-shape contract vs app-side computed reference)"
      - "Post-reload verify flag: sessionStorage schema (key name, payload shape — `{ reason, fromExtVersion, toExtVersion, fromAppVersion, toAppVersion, ts }`); TTL (clear on next clean handshake or after N seconds); failure path if post-reload versions still mismatch (surface persistent banner? fall back to disconnect?); whether the flag is observable in dev-tools for debugging"
      - "Failure-mode coverage: what happens if user dismisses diagnostic (reload anyway? leave at-risk? Continue Anyway path coordinated with WS-077?); what happens if extension is force-killed mid-handshake; what happens if app and extension versions match but contract fingerprint diverges (stricter check)"
      - "Verification surface: how do we visually confirm the change works in dev — script the version mismatch via DevTools, test extension reload triggers diagnostic not silent reload; what counts as 'fixed' for a future regression test"
    depends_on: []
    started_at: null
    completed_at: null
    notes: ""
    finding_id: null

