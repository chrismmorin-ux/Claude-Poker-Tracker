retro_findings:
  - id: "RETRO-SPR-028-001"
    surfaced_by: "WS-115 plan-mode investigation"
    finding: |
      BACKLOG migration miss: WS-115 (legacy_id SR-6) was migrated 2026-05-01
      from BACKLOG.md § "NEXT — Sidebar Recurrence Program 2026-04-15
      (owner-approved)" as a P0 work item. Plan-mode discovered the underlying
      SR-6 program RESOLVED 2026-04-15 (per .claude/failures/SIDEBAR_REBUILD_PROGRAM.md).
      The migration script took the BACKLOG header at face value without
      cross-checking .claude/failures/*.md post-mortems.
    mitigation_suggestion: |
      Future migration runs (or an /audit engine pass on the existing migrated
      queue) should cross-check legacy_section headers against the failures
      directory. Heuristic: any queue item with source.origin ==
      "backlog-md-migration-2026-05-01" whose legacy_section header references
      a date BEFORE the migration date AND a topic name matching a
      .claude/failures/*.md filename should be flagged for verification before
      sitting at full priority. May surface other stale items that the
      decomposition attempt would catch case-by-case.
    severity: "low"
    blast_radius: "queue-hygiene only — no production code or behavior impact"
    deferred_to: "future /audit engine pass; not blocking SPR-029"

