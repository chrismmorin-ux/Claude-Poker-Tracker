id: "SPR-028"
title: "WS-115 (SR-6) decomposition — break umbrella into 16 dependency-ordered child tickets"
status: completed
goal: |
  Stage 6 sidebar rebuild ("16 PRs, dependency-ordered" per WS-115) is
  decomposed into actionable child WS tickets. Each child has its own
  scope, accept_criteria, blocked_by chain, and effort tag. WS-115 itself
  is repositioned as a tracking parent that points at the children.

  Why this matters: WS-115 is currently a P0 umbrella that algorithmically
  anchors /next every cycle but can't be productively executed as a single
  sprint — a sprint anchored on it just produces ambiguity. Decomposition
  unblocks the SR program for real execution (single-PR sprints) and
  resolves the priority-drift where a vague P0 dominates the queue.

  Master Plan rhythm interruption: 4 consecutive HSP sprints (SPR-024..
  SPR-027) closed the HSP build phase. WS-143 (HSP-W1 HandReplay wire) is
  unblocked but P2; founder picked WS-115 decomposition over WS-143
  continuation to clear the long-standing P0 umbrella before resuming
  HSP-to-SCF chain work.

