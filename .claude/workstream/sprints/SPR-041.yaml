id: "SPR-041"
title: "PIO IdentityAvatar v2 — visual-design pass + mobile optimization (A-line continuation; WS-166)"
status: completed
goal: |
  PIO IdentityAvatar — replace engineer-art SVG primitives with library-quality
  visuals optimized for 24px mobile recognition. The recognition workflow
  depends on this primitive (PIO Gate 4 v2 audit §0 / §14); aesthetic quality
  is load-bearing for every PIO Gate 5 surface that consumes it.

  Founder direct flag (2026-05-04, end of Phase 1.8 review): "drop an item in
  the backlog to revisit this entire thing with the aesthetics and more
  attention to creating a better visual set of images optimizing for mobile
  view. This really didn't get a proper treatment for being such a huge visual
  element relied upon because of its usefulness as a feature."

