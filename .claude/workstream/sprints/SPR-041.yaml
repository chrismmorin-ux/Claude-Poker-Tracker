      2026-05-06 (session 3, mid-session founder review): four
      regressions surfaced after first eye-test of avataaars output —
        (1) DiceBear randomized into winks / surprise / grimace mouth
            shapes, breaking identification neutrality;
        (2) salt-pepper hex shift lost the v1 streak overlay signature;
        (3) hair tops rendered sex-inappropriate (man with miaWallace,
            woman with theCaesar);
        (4) dev corpus enumerated all 28 hair / 5 mustache / 7 accessory
            avataaars variants, misleadingly suggesting production
            exposed all of them.
      Fixes shipped:
        - mapIdentityToAvataaarsOptions pins eyes/mouth/eyebrows/nose
          to ['default'] — DiceBear stops randomizing facial expression.
        - HAIR_TOP_BY_LENGTH_AND_TEXTURE split into HAIR_TOP_MALE
          + HAIR_TOP_FEMALE; pickHairTop now takes sex; female-coded
          variants (bob/bun/curly/curvy/longButNotTooLong/miaWallace)
          stay out of male renders, vice versa. Non-binary defaults
          to male map (closer to neutral silhouette).
        - Salt-pepper restored as actual STREAK SVG OVERLAY: new
          SaltPepperOverlay component in AvatarRenderer renders
          white-streak paths over hair (crown) and beard (jawline)
          regions when treatments.hairSaltPepper / beardSaltPepper
          are set. Mid-gray hex shift removed; base color preserved.
        - mapIdentityToTreatments(player) new exported helper returns
          { hairSaltPepper, beardSaltPepper } — same v1 semantics
          (independent hair + beard toggles, age-decade auto-derivation
          for dark base colors).
        - IdentityAvatar wires both functions through to AvatarRenderer.
        - Dev corpus catalog rewritten: shows only the variants
          production actually emits per identification field, organized
          by sex (HAIR_TOPS_MALE 8 / HAIR_TOPS_FEMALE 7 / HATS 3 /
          FACIAL_HAIR 4 / EYEWEAR 4) plus a salt-pepper streak demo
          rendered through the full IdentityAvatar pipeline.
        - Test file updated: 50 → 64 mapping tests (+14 for sex-aware
          + neutral-features + treatments + salt-pepper-as-overlay
          contract). Total avatar trio: 164 tests pass.
