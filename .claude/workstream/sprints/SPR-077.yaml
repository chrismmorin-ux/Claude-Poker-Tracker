  predicate for "who acts next," consumed by 10 files. Disagreement with the
  ICP 47-row matrix would make both surfaces wrong. Phase 1 surfaces the
  disagreement (if any) on the next live session.

  Charter alignment: bug-class WS, exempt from Refactor Sprint "no new
  features" charter per WS-189 status_note. Phase 1 ships and closes; the
  L-effort fix work is deliberately deferred to a follow-up WS.

  Couples with WS-182 (shipped 2026-05-13, primitive collapse): the rest-batch
  helpers (checkAround / restFold) need a sound first-action-seat contract
  before they migrate to recordSeatAction per-seat. Phase 1 telemetry
  documents that contract by recording every autoselect firing's inputs +
  outputs.

  Cross-program rotation: last 3 anchors = design (SPR-076) + DC (SPR-075) +
  design (SPR-074). DC returns. No source-class saturation (anchor =
  user-request founder-driven).

