composition_notes: |
  Two-item sprint: S (execute) + M (plan-first) ≈ 2 sessions. Within standard
  2-session cap.

  Pairing rationale: WS-165 builds the toggle that WS-161's camera button
  reads to decide visibility. Shipping separately means SPR-036 ships a
  camera button that's never visible (toggle defaults OFF) OR the toggle
  ships without anything reading it. Pairing keeps the privacy-first default
  intact end-to-end.

  Sequence: WS-165 first (S, no UI ambiguity — settings field + reducer +
  minimal UI in SettingsView), WS-161 second (M, plan-mode for crop +
  placement + display decisions).

  Source-class damping (Step 2d): last 3 anchors WS-148, WS-008 (decomposition),
  WS-162 — all spr-followup (founder-driven, never damped). WS-165 + WS-161
  source: ws-008-decomposition → spr-followup → not damped.

  Note for SPR-037+ planning: 1 PIO G5 child remaining:
