closing_notes: |
  This sprint composition surfaced a structural drift pattern worth naming:
  the queue contains 5+ tickets (WS-038 confirmed today; WS-080 / WS-105 /
  WS-135 / WS-159 carried forward from SPR-066/067/068 composition_notes)
  that were authored as "future work" via legacy backlog migration on
  2026-05-01, but whose actual deliverables had already shipped earlier in
  same-session bursts. The migration process didn't reconcile against the
  project docs at the time, so stale tickets entered the queue at full
  priority.

  Recommended follow-up (NOT this sprint): a `/workstream reconcile`
  pass that walks `docs/projects/*/...project.md` files, parses the
  Stream/Phase status grids, and cross-references against queue-index.
  Tickets whose accept criteria are documented as shipped should be
  closed with done_provenance pointers. This is the same shape as the
  WS-038 close-out done here, applied at scale.

  Rotation note: WS-178 (DC, P=18, PMC Phase 5a-2) remains the strongest
  unblocked-and-uncontested workable candidate. Engineering rotation
  candidate WS-053 (Ready-to-Start Gate 2) and design candidate WS-047
  (Preflop Refresher Phase A) are both substantively workable. Founder
  picks at next /next.
