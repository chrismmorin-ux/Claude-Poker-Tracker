  - id: "WS-192"
    title: "SLS Stream B2 data wiring — thread perCombo + evByFraction through villainAnalysis for HandReplay B2 sections"
    mode: plan-first
    effort: M
    program: engineering
    category: shape-language
    status: done
    started_at: "2026-05-17T11:00:00Z"
    completed_at: "2026-05-17T11:20:00Z"
    decision_flags:
      - "perCombo attachment location — [RESOLVED 2026-05-17 by recon: sibling of bucketEquities on per-action analysis result. Rationale: comboDistribution is the same computation source that produces bucketEquities; both belong at the same nesting level. Implementation: evaluateGameTree return + replayAnalysis pass-through + useHandReplayAnalysis promotion from result.counterfactualTree to result top-level so ReviewPanel reads villainAnalysis.perCombo directly per SPR-084 section contract.]"
      - "evByFraction derivation strategy — [RESOLVED 2026-05-17 by recon: extract from existing recommendations[].sizing.betFraction. No expensive multi-sizing eval pass needed. heroActionBuilder.js already emits multiple bet candidates; gameTreeEvaluator.js:491 propagates sizing through. Sizing Curve Tag wires this sprint after all. deriveEvByFraction helper filters bet/raise + sorts ascending; null when < MIN_SAMPLES_FOR_CLASSIFICATION=3.]"
    notes: |
      Accept criteria (per WS-192.yaml):
        - replayAnalysis.js extends per-action analysis with perCombo
          attachment via computeComboEquityDistribution
        - evByFraction extracted from recommendations[] if multi-sizing;
          else defer Sizing Curve Tag with explicit follow-up
        - 3 B2 sections render real data at 1600×720 on a real postflop
          hero-action step
        - smart-test-runner green + Vite build clean
        - New tests cover perCombo path + section integration with
          non-mock data
        - Cross-domain grep guard clean
        - Project doc Session Log updated

      Bindings:
        - INV-SLS-B2-SECTION-NULL-DEGRADATION — sections already
          accept null prop; wiring just provides the data
        - INV-SLS-B2-CROSS-DOMAIN — wiring lives in
          handAnalysis/ (neutral domain) and exploitEngine/ →
          shapeLanguage/ direction is permitted
        - INV-SLS-B2-EDC-DATA-ONLY — perCombo is data structure,
          not classifier label
        - feedback_first_principles_decisions.md — perCombo is
          consumed by descriptor classifiers (presentation), never
          fed back into decision engines

      Open question to resolve in plan mode:
        - Whether evaluateGameTree's recommendations[] currently
          emits multiple bet-sizing entries per decision (needed
          to derive evByFraction cheaply). Inspect at plan-mode start;
          if not, EDC + Spire+Polarization ship this sprint, Sizing
          Curve Tag wiring defers to a follow-up ticket.

