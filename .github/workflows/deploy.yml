name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}

      # Stamp build with commit SHA so we can verify deployment
      - name: Stamp build version
        run: echo '{"version":"${{ github.sha }}","built":"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}' > dist/version.json

      - name: Deploy to Firebase
        run: npx firebase-tools deploy --only hosting --token "$FIREBASE_TOKEN"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      # Verify the deployed site serves the new version
      - name: Verify deployment
        run: |
          sleep 10
          DEPLOYED=$(curl -sf https://${{ secrets.VITE_FIREBASE_PROJECT_ID }}.web.app/version.json || echo '{}')
          EXPECTED="${{ github.sha }}"
          ACTUAL=$(echo "$DEPLOYED" | python3 -c "import sys,json; print(json.load(sys.stdin).get('version',''))" 2>/dev/null || echo "")
          if [ "$ACTUAL" = "$EXPECTED" ]; then
            echo "✅ Deployment verified: $ACTUAL"
          else
            echo "❌ Version mismatch! Expected $EXPECTED, got: $ACTUAL"
            echo "Response: $DEPLOYED"
            exit 1
          fi
