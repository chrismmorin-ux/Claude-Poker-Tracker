<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Poker Session Notes — Settings</title>
  <style>
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #1a1d23;
      color: #e6e6e6;
      max-width: 560px;
      margin: 32px auto;
      padding: 24px;
    }
    h1 { color: #d4a847; font-size: 18px; margin: 0 0 8px; }
    p.lede { color: #9aa0a6; font-size: 13px; margin: 0 0 24px; }
    .row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 16px;
      background: #252932;
      border: 1px solid #323742;
      border-radius: 8px;
      margin-bottom: 10px;
    }
    .row input[type="checkbox"] { margin-top: 3px; width: 18px; height: 18px; }
    .row label { flex: 1; cursor: pointer; }
    .row .title { font-size: 14px; font-weight: 600; color: #e6e6e6; }
    .row .desc { color: #9aa0a6; font-size: 12px; margin-top: 4px; }
    .status {
      font-size: 12px;
      color: #6ab04c;
      margin-top: 12px;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <h1>Poker Session Notes — Settings</h1>
  <p class="lede">Developer flags. Defaults off.</p>

  <div class="row">
    <input type="checkbox" id="debugDiagnostics">
    <label for="debugDiagnostics">
      <div class="title">Show developer diagnostics</div>
      <div class="desc">Unlocks the diagnostics link (0.7 footer) and the model audit panel (4.3) inside the sidebar.</div>
    </label>
  </div>

  <div class="status" id="status"></div>

  <script src="options.js"></script>
</body>
</html>
